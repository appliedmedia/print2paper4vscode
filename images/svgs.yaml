# SVG badge templates for CI workflow
# Processed by templateDictReplace.mjs with --dict flag

coverage: |
  <svg xmlns="http://www.w3.org/2000/svg" width="114" height="20" role="img" aria-label="coverage: {{coverage}}%"><title>coverage: {{coverage}}%</title><linearGradient id="s" x2="0" y2="100%"><stop offset="0" stop-color="#bbb" stop-opacity=".1"/><stop offset="1" stop-opacity=".1"/></linearGradient><clipPath id="r"><rect width="114" height="20" rx="3" fill="#fff"/></clipPath><g clip-path="url(#r)"><rect width="61" height="20" fill="#555"/><rect x="61" width="53" height="20" fill="#{{colorHex}}"/><rect width="114" height="20" fill="url(#s)"/></g><g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="110"><text aria-hidden="true" x="315" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="510">coverage</text><text x="315" y="140" transform="scale(.1)" fill="#fff" textLength="510">coverage</text><text aria-hidden="true" x="865" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="430">{{coverage}}%</text><text x="865" y="140" transform="scale(.1)" fill="#fff" textLength="430">{{coverage}}%</text></g></svg>

ci: |
  <svg xmlns="http://www.w3.org/2000/svg" width="80" height="20" role="img" aria-label="CI: passing"><title>CI: passing</title><linearGradient id="s" x2="0" y2="100%"><stop offset="0" stop-color="#bbb" stop-opacity=".1"/><stop offset="1" stop-opacity=".1"/></linearGradient><clipPath id="r"><rect width="80" height="20" rx="3" fill="#fff"/></clipPath><g clip-path="url(#r)"><rect width="27" height="20" fill="#555"/><rect x="27" width="53" height="20" fill="#97ca00"/><rect width="80" height="20" fill="url(#s)"/></g><g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="110"><text aria-hidden="true" x="145" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="130">CI</text><text x="145" y="140" transform="scale(.1)" fill="#fff" textLength="130">CI</text><text aria-hidden="true" x="525" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="430">passing</text><text x="525" y="140" transform="scale(.1)" fill="#fff" textLength="430">passing</text></g></svg>

license: |
  <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="{{width}}" height="20" role="img" aria-label="License: {{licenseName}}">
    <title>License: {{licenseName}}</title>
    <linearGradient id="s" x2="0" y2="100%">
      <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
      <stop offset="1" stop-opacity=".1"/>
    </linearGradient>
    <clipPath id="r">
      <rect width="{{width}}" height="20" rx="3" fill="#fff"/>
    </clipPath>
    <g clip-path="url(#r)">
      <rect width="51" height="20" fill="#555"/>
      <rect x="51" width="{{valueWidth}}" height="20" fill="#007ec6"/>
      <rect width="{{width}}" height="20" fill="url(#s)"/>
    </g>
    <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="110">
      <text aria-hidden="true" x="265" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="410">License</text>
      <text x="265" y="140" transform="scale(.1)" fill="#fff" textLength="410">License</text>
      <text aria-hidden="true" x="{{valueX}}" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="{{valueTextLength}}">{{licenseName}}</text>
      <text x="{{valueX}}" y="140" transform="scale(.1)" fill="#fff" textLength="{{valueTextLength}}">{{licenseName}}</text>
    </g>
  </svg>
