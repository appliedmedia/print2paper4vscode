name: Reviewer Bot Comment

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR Number'
        required: true
      message:
        description: 'Comment Body'
        required: true
      reply_to_comment_id:
        description: 'Comment ID to reply to (Optional)'
        required: false

jobs:
  post-comment:
    uses: appliedmedia/.github/.github/workflows/reviewer-bot-comment-action.yml@main
    with:
      pr_number: ${{ inputs.pr_number }}
      message: ${{ inputs.message }}
      reply_to_comment_id: ${{ inputs.reply_to_comment_id || '' }}
    secrets: inherit
