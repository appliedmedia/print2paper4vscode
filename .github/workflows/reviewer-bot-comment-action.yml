name: Reviewer Bot Comment

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR Number'
        required: true
      message:
        description: 'Comment Body'
        required: true
      reply_to_comment_id:
        description: 'Comment ID to reply to (Optional - for threaded replies)'
        required: false

permissions:
  pull-requests: write
  issues: write

jobs:
  post-comment:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Post Comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
          MESSAGE: ${{ inputs.message }}
          REPLY_TO_ID: ${{ inputs.reply_to_comment_id }}
        run: |
          if [ -z "$REPLY_TO_ID" ]; then
            # No reply ID provided, post as a general top-level comment
            echo "Posting top-level comment to PR #$PR_NUMBER..."
            gh pr comment "$PR_NUMBER" --body "$MESSAGE" --repo ${{ github.repository }}
          else
            # Reply ID provided, attempt to reply to a review comment thread
            echo "Replying to comment ID $REPLY_TO_ID..."
            
            # First, try replying to a pull request review comment (inline code comment)
            # The in_reply_to parameter automatically threads it - no need to specify line/path
            gh api --method POST \
              "/repos/${{ github.repository }}/pulls/$PR_NUMBER/comments" \
              -f body="$MESSAGE" \
              -F in_reply_to="$REPLY_TO_ID" 2>/dev/null && {
                echo "Successfully replied to review comment $REPLY_TO_ID"
                exit 0
              } || {
                echo "in_reply_to failed. Checking if it's a review comment that needs explicit positioning..."
              }
            
            # Try to fetch the parent review comment to get its position data
            PARENT_COMMENT=$(gh api "/repos/${{ github.repository }}/pulls/comments/$REPLY_TO_ID" 2>/dev/null || echo "")
            
            if [ -n "$PARENT_COMMENT" ]; then
              echo "Found parent review comment. Extracting position data..."
              COMMIT_ID=$(echo "$PARENT_COMMENT" | jq -r '.commit_id')
              PATH=$(echo "$PARENT_COMMENT" | jq -r '.path')
              POSITION=$(echo "$PARENT_COMMENT" | jq -r '.position // empty')
              LINE=$(echo "$PARENT_COMMENT" | jq -r '.line // empty')
              SIDE=$(echo "$PARENT_COMMENT" | jq -r '.side // "RIGHT"')
              
              # Try posting as a new comment on the same line
              if [ -n "$POSITION" ]; then
                echo "Posting new comment at position $POSITION in $PATH..."
                gh api --method POST \
                  "/repos/${{ github.repository }}/pulls/$PR_NUMBER/comments" \
                  -f body="$MESSAGE" \
                  -f commit_id="$COMMIT_ID" \
                  -f path="$PATH" \
                  -F position="$POSITION" && {
                    echo "Successfully posted comment at same position"
                    exit 0
                  }
              elif [ -n "$LINE" ]; then
                echo "Posting new comment at line $LINE in $PATH..."
                gh api --method POST \
                  "/repos/${{ github.repository }}/pulls/$PR_NUMBER/comments" \
                  -f body="$MESSAGE" \
                  -f commit_id="$COMMIT_ID" \
                  -f path="$PATH" \
                  -F line="$LINE" \
                  -f side="$SIDE" && {
                    echo "Successfully posted comment at same line"
                    exit 0
                  }
              fi
            fi
            
            echo "Not a review comment or positioning failed. Trying issue comment..."
            
            # If that fails, try replying to an issue comment (PR-level timeline comment)
            # Issue comments don't support threading, so we quote instead
            
            # Capture the API call result and exit code separately
            set +e
            ORIG_BODY=$(gh api "/repos/${{ github.repository }}/issues/comments/$REPLY_TO_ID" --jq '.body' 2>&1)
            API_EXIT_CODE=$?
            set -e
            
            if [ $API_EXIT_CODE -eq 0 ] && [ -n "$ORIG_BODY" ]; then
              echo "Found issue comment. Posting quoted reply..."
              # Use printf for safe output of user-controlled content
              # Quote the original comment using a here-doc to avoid command injection
              QUOTED_MESSAGE=$(cat <<EOF
$(printf '%s' "$ORIG_BODY" | sed 's/^/> /')

$MESSAGE
EOF
)
              gh pr comment "$PR_NUMBER" --body "$QUOTED_MESSAGE" --repo ${{ github.repository }}
            elif [ $API_EXIT_CODE -ne 0 ]; then
              echo "ERROR: API call failed with exit code $API_EXIT_CODE"
              echo "API error output: $ORIG_BODY"
              exit 1
            else
              echo "ERROR: Comment ID $REPLY_TO_ID not found in review comments or issue comments"
              exit 1
            fi
          fi
