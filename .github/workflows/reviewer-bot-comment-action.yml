name: Reviewer Bot Comment

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR Number'
        required: true
      message:
        description: 'Comment Body'
        required: true
      reply_to_comment_id:
        description: 'Comment ID to reply to (Optional - for threaded replies)'
        required: false

permissions:
  pull-requests: write
  issues: write

jobs:
  post-comment:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Post Comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
          MESSAGE: ${{ inputs.message }}
          REPLY_TO_ID: ${{ inputs.reply_to_comment_id }}
        run: |
          if [ -z "$REPLY_TO_ID" ]; then
            # No reply ID provided, post as a general top-level comment
            echo "Posting top-level comment to PR #$PR_NUMBER..."
            gh pr comment "$PR_NUMBER" --body "$MESSAGE" --repo ${{ github.repository }}
          else
            # Reply ID provided, attempt to reply to a review comment thread
            echo "Replying to comment ID $REPLY_TO_ID..."
            
            # First, try replying to a pull request review comment (inline code comment)
            # Use in_reply_to parameter to thread the reply
            gh api --method POST \
              "/repos/${{ github.repository }}/pulls/$PR_NUMBER/comments" \
              -f body="$MESSAGE" \
              -F in_reply_to="$REPLY_TO_ID" && {
                echo "Successfully replied to review comment $REPLY_TO_ID"
                exit 0
              } || {
                echo "Not a review comment. Trying issue comment reply..."
              }
            
            # If that fails, try replying to an issue comment (PR-level timeline comment)
            # Issue comments don't support threading, so we quote instead
            ORIG_BODY=$(gh api "/repos/${{ github.repository }}/issues/comments/$REPLY_TO_ID" --jq '.body' 2>/dev/null || echo "")
            
            if [ -n "$ORIG_BODY" ]; then
              echo "Found issue comment. Posting quoted reply..."
              # Quote the original comment
              QUOTED_BODY=$(echo "$ORIG_BODY" | sed 's/^/> /')
              QUOTED_MESSAGE="$QUOTED_BODY"$'\n\n'"$MESSAGE"
              gh pr comment "$PR_NUMBER" --body "$QUOTED_MESSAGE" --repo ${{ github.repository }}
            else
              echo "ERROR: Could not find comment ID $REPLY_TO_ID in either review comments or issue comments"
              exit 1
            fi
          fi
