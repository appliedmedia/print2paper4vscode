name: Publish Extension

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (patch, minor, major, or explicit like 1.2.3)'
        required: true
        default: 'patch'

jobs:
  publish:
    name: Publish to VS Code Marketplace
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Generate package.json
        run: node scripts/generate-package-json.mjs

      - name: Install dependencies
        run: npm ci
      
      - name: Compile TypeScript
        run: npm run compile

      - name: Run tests
        run: npm test
      
      - name: Install vsce
        run: npm install -g @vscode/vsce
      
      - name: Verify secret configured
        if: "${{ secrets.VSCE_PAT == '' }}"
        run: |
          echo "::error::VSCE_PAT secret is not configured"
          exit 1

      - name: Publish to VS Code Marketplace
        if: "${{ secrets.VSCE_PAT != '' }}"
        run: vsce publish ${{ github.event.inputs.version || 'patch' }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
