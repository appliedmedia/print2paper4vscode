name: Publish Extension

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (patch, minor, major, or explicit like 1.2.3)'
        required: true
        default: 'patch'

jobs:
  publish:
    name: Publish to VS Code Marketplace
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://marketplace.visualstudio.com/items?itemName=${{ github.repository }}
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
    
    steps:
      - name: Check repository ownership
        if: github.repository_owner != 'appliedmedia'
        run: |
          echo "::error::This workflow can only publish from the official repository"
          echo "::error::Current repository: ${{ github.repository }}"
          echo "::error::This appears to be a fork. Forks cannot publish to the VS Code Marketplace."
          exit 1
      
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Generate package.json
        run: node scripts/generate-package-json.mjs

      - name: Install dependencies
        run: npm ci
      
      - name: Compile TypeScript
        run: npm run compile

      - name: Run tests
        run: npm test
      
      - name: Install vsce
        run: npm install -g @vscode/vsce
      
      - name: Verify secret configured
        if: env.VSCE_PAT == ''
        run: |
          echo "::error::VSCE_PAT secret is not configured"
          exit 1

      - name: Publish to VS Code Marketplace
        if: env.VSCE_PAT != ''
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ] && [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          fi
          vsce publish ${VERSION:-patch} --readme-path docs/MARKETPLACE.md --changelog-path docs/MARKETPLACE_CHANGELOG.md
