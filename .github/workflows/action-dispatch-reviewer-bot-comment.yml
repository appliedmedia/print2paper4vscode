# Reviewer Bot Comment Dispatch
#
# This workflow receives dispatch calls and forwards them to the
# central action-reviewer-bot-comment in appliedmedia/.github
#
# Triggered via API by Cursor agents or other automation.
# Deployed as action-dispatch-reviewer-bot-comment.yml to repos.
#
# Note: CROSS_REPO_PAT is an org-level secret shared across all repos.

name: Reviewer Bot Comment

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR Number'
        required: true
      message:
        description: 'Comment Body'
        required: true
      from:
        description: 'Comment author attribution'
        required: false
        default: '🤖 Cursor Agent'
      reply_to_comment_id:
        description: 'Comment ID to reply to (Optional)'
        required: false

jobs:
  post-comment:
    uses: appliedmedia/.github/.github/workflows/action-reviewer-bot-comment.yml@main
    with:
      pr_number: ${{ inputs.pr_number }}
      message: ${{ inputs.message }}
      from: ${{ inputs.from }}
      reply_to_comment_id: ${{ inputs.reply_to_comment_id || '' }}
    secrets: inherit
