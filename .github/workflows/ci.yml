name: CI

on: # yamllint disable-line rule:truthy
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Default to read-only permissions
permissions:
  contents: read

jobs:
  test:
    name: Test on Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Generate package.json
        run: node scripts/generate-package-json.mjs

      - name: Install dependencies
        run: npm ci
      
      - name: Compile TypeScript
        run: npm run compile
      
      - name: Run linters
        run: |
          npm run lint
          npm run lint:md
          npm run lint:yaml
      
      - name: Run tests with coverage
        run: |
          set -o pipefail
          npm run test:coverage | tee coverage.txt
      
      - name: Extract coverage percentage
        id: coverage
        if: always()
        run: |
          if [ -f coverage.txt ] && grep -q "All files" coverage.txt; then
            COVERAGE=$(grep "All files" coverage.txt | awk '{print $5}' | sed 's/%//' || echo "0")
            echo "percentage=${COVERAGE:-0}" >> $GITHUB_OUTPUT
            echo "Coverage: ${COVERAGE:-0}%"
          else
            echo "percentage=0" >> $GITHUB_OUTPUT
            echo "Coverage data not found"
          fi
      
      - name: Report coverage in job summary
        if: always()
        run: |
          echo "## Test Coverage Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage.txt ]; then
            echo "**Overall Coverage: ${{ steps.coverage.outputs.percentage }}%**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -20 coverage.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Coverage data not available" >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Comment coverage on PR
        if: github.event_name == 'pull_request' && steps.coverage.outputs.percentage != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          COVERAGE_PCT: ${{ steps.coverage.outputs.percentage }}
        run: |
          COVERAGE_TABLE=$(tail -20 coverage.txt)
          gh pr comment ${{ github.event.pull_request.number }} --body "## 📊 Test Coverage Report

**Overall Coverage: ${COVERAGE_PCT}%**

<details>
<summary>View detailed coverage</summary>

\`\`\`
${COVERAGE_TABLE}
\`\`\`

</details>

View full report in the [Actions run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"

  # Separate job for badge updates to isolate write permissions
  update-badge:
    name: Update Coverage Badge
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Generate package.json
        run: node scripts/generate-package-json.mjs

      - name: Install dependencies
        run: npm ci
      
      - name: Compile TypeScript
        run: npm run compile
      
      - name: Run tests with coverage
        run: |
          set -o pipefail
          npm run test:coverage | tee coverage.txt
      
      - name: Extract coverage percentage
        id: coverage
        run: |
          if [ -f coverage.txt ] && grep -q "All files" coverage.txt; then
            COVERAGE=$(grep "All files" coverage.txt | awk '{print $5}' | sed 's/%//' || echo "0")
            echo "percentage=${COVERAGE:-0}" >> $GITHUB_OUTPUT
            echo "Coverage: ${COVERAGE:-0}%"
          else
            echo "percentage=0" >> $GITHUB_OUTPUT
            echo "Coverage data not found"
          fi
      
      - name: Generate coverage badge
        run: |
          COVERAGE=${{ steps.coverage.outputs.percentage }}
          # Color thresholds: green>=80%, yellow>=60%, orange>=40%, red<40%
          # Using awk for floating-point comparison (bc not available by default)
          COLOR="red"
          if awk "BEGIN {exit !($COVERAGE >= 80)}"; then
            COLOR="green"
          elif awk "BEGIN {exit !($COVERAGE >= 60)}"; then
            COLOR="yellow"
          elif awk "BEGIN {exit !($COVERAGE >= 40)}"; then
            COLOR="orange"
          fi
          
          mkdir -p .github/badges
          curl -s "https://img.shields.io/badge/coverage-${COVERAGE}%25-${COLOR}" > .github/badges/coverage.svg
      
      - name: Commit and push badge
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Check if badge actually changed
          git add .github/badges/coverage.svg
          if git diff --staged --quiet; then
            echo "Badge unchanged, skipping commit"
            exit 0
          fi
          
          # Pull latest changes to avoid race conditions
          if ! git pull --rebase origin main; then
            echo "Failed to rebase, attempting merge"
            git rebase --abort 2>/dev/null || true
            if ! git pull origin main; then
              echo "⚠️ Failed to sync with remote, skipping badge update"
              echo "Badge will be updated on next successful push to main"
              exit 0
            fi
          fi
          
          git commit -m "Update coverage badge [skip ci]"
          git push origin main
