name: CI

on: # yamllint disable-line rule:truthy
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Default to read-only permissions
permissions:
  contents: read

jobs:
  test:
    name: Test on Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Compile TypeScript
        run: npm run compile
      
      - name: Run linters
        run: |
          npm run lint
          npm run lint:md
          npm run lint:yaml
      
      - name: Run tests with coverage
        run: |
          set -o pipefail
          npm run test:coverage | tee coverage.txt
      
      - name: Extract coverage percentage
        id: coverage
        if: always()
        run: |
          if [ -f coverage.txt ] && grep -q "All files" coverage.txt; then
            COVERAGE=$(grep "All files" coverage.txt | awk '{print $4}' | sed 's/%//' || echo "0")
            echo "percentage=${COVERAGE:-0}" >> $GITHUB_OUTPUT
            echo "Coverage: ${COVERAGE:-0}%"
          else
            echo "percentage=0" >> $GITHUB_OUTPUT
            echo "Coverage data not found"
          fi
      
      - name: Report coverage in job summary
        if: always()
        run: |
          echo "## Test Coverage Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage.txt ]; then
            echo "**Overall Coverage: ${{ steps.coverage.outputs.percentage }}%**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -20 coverage.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Coverage data not available" >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Comment coverage on PR
        # Only comment on first commit - use a unique marker to check if we've commented
        if: |
          github.event_name == 'pull_request' &&
          steps.coverage.outputs.percentage != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          COVERAGE_PCT: ${{ steps.coverage.outputs.percentage }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Check if we've already posted a coverage comment
          EXISTING=$(gh pr view $PR_NUMBER --json comments --jq '[.comments[] | select(.author.login == "github-actions" and (.body | contains("Test Coverage Report")))] | length')
          
          if [ "$EXISTING" -gt "0" ]; then
            echo "Coverage comment already exists, skipping"
            exit 0
          fi
          
          COVERAGE_TABLE=$(tail -20 coverage.txt)
          {
            echo "## 📊 Test Coverage Report"
            echo ""
            echo "**Overall Coverage: ${COVERAGE_PCT}%**"
            echo ""
            echo "<details>"
            echo "<summary>View detailed coverage</summary>"
            echo ""
            echo "\`\`\`"
            echo "${COVERAGE_TABLE}"
            echo "\`\`\`"
            echo ""
            echo "</details>"
            echo ""
            echo "View full report in the [Actions run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          } | gh pr comment ${{ github.event.pull_request.number }} --body-file -
      
      - name: Upload coverage for badge job
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data
          path: coverage.txt
          retention-days: 1

  # Separate job for badge updates to isolate write permissions
  update-badge:
    name: Update Coverage Badge
    runs-on: ubuntu-latest
    needs: test
    # Only run on main branch pushes that are merge commits (PR merges)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && github.event.head_commit.message != 'Update badges [skip ci]'
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
      
      - name: Download coverage data
        uses: actions/download-artifact@v4
        with:
          name: coverage-data
      
      - name: Extract coverage percentage
        id: coverage
        run: |
          if [ -f coverage.txt ] && grep -q "All files" coverage.txt; then
            COVERAGE=$(grep "All files" coverage.txt | awk '{print $4}' | sed 's/%//' || echo "0")
            echo "percentage=${COVERAGE:-0}" >> $GITHUB_OUTPUT
            echo "Coverage: ${COVERAGE:-0}%"
          else
            echo "percentage=0" >> $GITHUB_OUTPUT
            echo "Coverage data not found"
          fi
      
      - name: Generate coverage badge
        run: |
          COVERAGE=${{ steps.coverage.outputs.percentage }}
          # Color thresholds: green>=80%, yellow>=60%, orange>=40%, red<40%
          COLOR_HEX="e05d44"  # red
          if awk "BEGIN {exit !($COVERAGE >= 80)}"; then
            COLOR_HEX="97ca00"  # green
          elif awk "BEGIN {exit !($COVERAGE >= 60)}"; then
            COLOR_HEX="dfb317"  # yellow
          elif awk "BEGIN {exit !($COVERAGE >= 40)}"; then
            COLOR_HEX="fe7d37"  # orange
          fi
          
          # Generate coverage badge from template (pure bash, no dependencies)
          cat > images/coverage.svg << EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="114" height="20" role="img" aria-label="coverage: ${COVERAGE}%"><title>coverage: ${COVERAGE}%</title><linearGradient id="s" x2="0" y2="100%"><stop offset="0" stop-color="#bbb" stop-opacity=".1"/><stop offset="1" stop-opacity=".1"/></linearGradient><clipPath id="r"><rect width="114" height="20" rx="3" fill="#fff"/></clipPath><g clip-path="url(#r)"><rect width="61" height="20" fill="#555"/><rect x="61" width="53" height="20" fill="#${COLOR_HEX}"/><rect width="114" height="20" fill="url(#s)"/></g><g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="110"><text aria-hidden="true" x="315" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="510">coverage</text><text x="315" y="140" transform="scale(.1)" fill="#fff" textLength="510">coverage</text><text aria-hidden="true" x="865" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="430">${COVERAGE}%</text><text x="865" y="140" transform="scale(.1)" fill="#fff" textLength="430">${COVERAGE}%</text></g></svg>
          EOF
          
          # Generate CI badge (static)
          cat > images/ci.svg << EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="80" height="20" role="img" aria-label="CI: passing"><title>CI: passing</title><linearGradient id="s" x2="0" y2="100%"><stop offset="0" stop-color="#bbb" stop-opacity=".1"/><stop offset="1" stop-opacity=".1"/></linearGradient><clipPath id="r"><rect width="80" height="20" rx="3" fill="#fff"/></clipPath><g clip-path="url(#r)"><rect width="27" height="20" fill="#555"/><rect x="27" width="53" height="20" fill="#97ca00"/><rect width="80" height="20" fill="url(#s)"/></g><g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="110"><text aria-hidden="true" x="145" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="170">CI</text><text x="145" y="140" transform="scale(.1)" fill="#fff" textLength="170">CI</text><text aria-hidden="true" x="525" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="430">passing</text><text x="525" y="140" transform="scale(.1)" fill="#fff" textLength="430">passing</text></g></svg>
          EOF
      
      - name: Commit and push badge updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Check if badge files exist before adding
          if [[ ! -f images/coverage.svg ]] || [[ ! -f images/ci.svg ]]; then
            echo "⚠️ Badge files missing, skipping commit"
            exit 1
          fi
          
          # Check if badges actually changed
          git add images/coverage.svg images/ci.svg
          if git diff --staged --quiet; then
            echo "Badges unchanged, skipping commit"
            exit 0
          fi
          
          # Pull latest changes to avoid race conditions
          if ! git pull --rebase origin main; then
            echo "Failed to rebase, attempting merge"
            git rebase --abort 2>/dev/null || true
            if ! git pull origin main; then
              echo "⚠️ Failed to sync with remote, skipping badge update"
              echo "Badge will be updated on next successful push to main"
              exit 0
            fi
          fi
          
          git commit -m "Update badges [skip ci]"
          git push origin main
