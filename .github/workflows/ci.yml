name: CI

on: # yamllint disable-line rule:truthy
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Default to read-only permissions
permissions:
  contents: read

# For CI status badge, use GitHub's dynamic URL in your README:
#   ![CI](https://github.com/appliedmedia/print2paper4vscode/actions/workflows/ci.yml/badge.svg)

jobs:
  test:
    name: Test on ${{ matrix.os }} / Node.js ${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      pull-requests: write

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [20.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Compile TypeScript
        run: npm run compile
      
      - name: Run linters
        if: matrix.os == 'ubuntu-latest'
        run: |
          npm run lint
          npm run lint:md
          npm run lint:yaml

      - name: Run tests with coverage
        shell: bash
        run: |
          set -o pipefail
          npm run test:coverage | tee coverage.txt
      
      - name: Extract coverage percentage
        id: coverage
        if: always() && matrix.os == 'ubuntu-latest'
        run: |
          if [ -f coverage.txt ] && grep -q "All files" coverage.txt; then
            COVERAGE=$(grep "All files" coverage.txt | awk '{print $4}' | sed 's/%//' || echo "0")
            echo "percentage=${COVERAGE:-0}" >> $GITHUB_OUTPUT
            echo "Coverage: ${COVERAGE:-0}%"
          else
            echo "percentage=0" >> $GITHUB_OUTPUT
            echo "Coverage data not found"
          fi
      
      - name: Report coverage in job summary
        if: always() && matrix.os == 'ubuntu-latest'
        run: |
          echo "## Test Coverage Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage.txt ]; then
            echo "**Overall Coverage: ${{ steps.coverage.outputs.percentage }}%**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -20 coverage.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Coverage data not available" >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Comment coverage on PR
        # Only comment on first commit - use a unique marker to check if we've commented
        if: |
          matrix.os == 'ubuntu-latest' &&
          github.event_name == 'pull_request' &&
          steps.coverage.outputs.percentage != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          COVERAGE_PCT: ${{ steps.coverage.outputs.percentage }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Check if we've already posted a coverage comment
          EXISTING=$(gh pr view $PR_NUMBER --json comments --jq '[.comments[] | select(.author.login == "github-actions" and (.body | contains("Test Coverage Report")))] | length')
          
          if [ "$EXISTING" -gt "0" ]; then
            echo "Coverage comment already exists, skipping"
            exit 0
          fi
          
          COVERAGE_TABLE=$(tail -20 coverage.txt)
          {
            echo "## 📊 Test Coverage Report"
            echo ""
            echo "**Overall Coverage: ${COVERAGE_PCT}%**"
            echo ""
            echo "<details>"
            echo "<summary>View detailed coverage</summary>"
            echo ""
            echo "\`\`\`"
            echo "${COVERAGE_TABLE}"
            echo "\`\`\`"
            echo ""
            echo "</details>"
            echo ""
            echo "View full report in the [Actions run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          } | gh pr comment ${{ github.event.pull_request.number }} --body-file -
      
      - name: Upload coverage for badge job
        if: matrix.os == 'ubuntu-latest' && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data
          path: coverage.txt
          retention-days: 1

  # Separate job for badge updates to isolate write permissions
  update-badge:
    name: Update Coverage & License Badges
    runs-on: ubuntu-latest
    needs: test
    # Only run on main branch pushes that are merge commits (PR merges)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && github.event.head_commit.message != 'Update badges [skip ci]'
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Download coverage data
        uses: actions/download-artifact@v4
        with:
          name: coverage-data
      
      - name: Extract coverage percentage
        id: coverage
        run: |
          if [ -f coverage.txt ] && grep -q "All files" coverage.txt; then
            COVERAGE=$(grep "All files" coverage.txt | awk '{print $4}' | sed 's/%//' || echo "0")
            echo "percentage=${COVERAGE:-0}" >> $GITHUB_OUTPUT
            echo "Coverage: ${COVERAGE:-0}%"
          else
            echo "percentage=0" >> $GITHUB_OUTPUT
            echo "Coverage data not found"
          fi
      
      - name: Extract license info
        id: license
        run: |
          if [ -f LICENSE ]; then
            # Extract license name from first line containing "license"
            # Supported comment formats:
            #   # License: Name      (shell, python, ruby, yaml)
            #   // License: Name     (c, c++, java, js, go, rust)
            #   /* License: Name */  (c block comment)
            #   <!-- License: Name -->(html, xml)
            #   -- License: Name     (sql, lua, haskell)
            #   ; License: Name      (ini, lisp, assembly)
            #   REM License: Name    (batch)
            #   License: Name        (plain text)
            LICENSE_LINE=$(grep -i "^[[:space:]]*\(#\|//\|/\*\|<!--\|--\|;\|REM\)\?[[:space:]]*License" LICENSE | head -1)
            
            if [ -z "$LICENSE_LINE" ]; then
              echo "name=Unknown" >> $GITHUB_OUTPUT
              echo "No license line found in LICENSE file"
              exit 0
            fi
            
            # Strip comment markers
            LICENSE_NAME=$(echo "$LICENSE_LINE" | \
              sed 's/^[[:space:]]*//' | \
              sed 's/^#[[:space:]]*//' | \
              sed 's/^\/\/[[:space:]]*//' | \
              sed 's/^\/\*[[:space:]]*//' | \
              sed 's/[[:space:]]*\*\/$//' | \
              sed 's/^<!--[[:space:]]*//' | \
              sed 's/[[:space:]]*-->$//' | \
              sed 's/^--[[:space:]]*//' | \
              sed 's/^;[[:space:]]*//' | \
              sed 's/^REM[[:space:]]*//' | \
              sed 's/^[Ll]icense:[[:space:]]*//' | \
              sed 's/^"//' | \
              sed 's/"$//' | \
              xargs)
            
            # Validate extraction
            if [ -z "$LICENSE_NAME" ] || [ "$LICENSE_NAME" = "License" ]; then
              echo "name=Unknown" >> $GITHUB_OUTPUT
              echo "Could not parse license name from: $LICENSE_LINE"
            else
              echo "name=$LICENSE_NAME" >> $GITHUB_OUTPUT
              echo "Extracted license: $LICENSE_NAME"
            fi
          else
            echo "name=Unknown" >> $GITHUB_OUTPUT
            echo "No LICENSE file found"
          fi
      
      - name: Generate badges
        run: |
          COVERAGE=${{ steps.coverage.outputs.percentage }}
          LICENSE_NAME="${{ steps.license.outputs.name }}"
          
          # Color thresholds: green>=80%, yellow>=60%, orange>=40%, red<40%
          COLOR_HEX="e05d44"  # red
          if awk "BEGIN {exit !($COVERAGE >= 80)}"; then
            COLOR_HEX="97ca00"  # green
          elif awk "BEGIN {exit !($COVERAGE >= 60)}"; then
            COLOR_HEX="dfb317"  # yellow
          elif awk "BEGIN {exit !($COVERAGE >= 40)}"; then
            COLOR_HEX="fe7d37"  # orange
          fi
          
          # Calculate license badge dimensions
          LICENSE_CHAR_COUNT=${#LICENSE_NAME}
          VALUE_TEXT_LENGTH=$((LICENSE_CHAR_COUNT * 65))
          VALUE_WIDTH=$((VALUE_TEXT_LENGTH / 10 + 6))
          TOTAL_WIDTH=$((51 + VALUE_WIDTH))
          VALUE_X=$((510 + VALUE_WIDTH * 5))
          
          # Generate coverage and license badges (CI badge now uses GitHub's dynamic URL)
          node scripts/templateDictReplace/templateDictReplace.mjs --dict "{\"coverage\":\"$COVERAGE\",\"colorHex\":\"$COLOR_HEX\",\"licenseName\":\"$LICENSE_NAME\",\"width\":\"$TOTAL_WIDTH\",\"valueWidth\":\"$VALUE_WIDTH\",\"valueX\":\"$VALUE_X\",\"valueTextLength\":\"$VALUE_TEXT_LENGTH\"}"
      
      - name: Commit and push badge updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Check if badge files exist before adding (CI badge no longer generated)
          if [[ ! -f images/coverage.svg ]] || [[ ! -f images/license.svg ]]; then
            echo "⚠️ Badge files missing, skipping commit"
            exit 1
          fi
          
          # Stage coverage and license badges (not ci.svg - using GitHub's dynamic badge)
          git add images/coverage.svg images/license.svg
          
          if git diff --staged --quiet; then
            echo "Badges unchanged, skipping commit"
            exit 0
          fi
          
          git commit -m "Update badges [skip ci]"
          
          # Retry push with rebase to handle concurrent commits
          MAX_RETRIES=3
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if git push origin main; then
              echo "✅ Badge update pushed successfully"
              exit 0
            fi
            
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "⚠️ Push failed (attempt $RETRY_COUNT/$MAX_RETRIES), rebasing..."
            
            # Fetch and rebase on latest main
            git fetch origin main
            if ! git rebase origin/main; then
              echo "⚠️ Rebase conflict, aborting and retrying fresh"
              git rebase --abort
              git reset --soft HEAD~1
              git pull --rebase origin main
              git add images/coverage.svg images/license.svg
              if git diff --staged --quiet; then
                echo "Badge changes already present after rebase, skipping"
                exit 0
              fi
              git commit -m "Update badges [skip ci]"
            fi
            
            sleep 2
          done
          
          echo "⚠️ Failed to push after $MAX_RETRIES attempts, badge will update on next run"
          exit 0
