name: CI

on: # yamllint disable-line rule:truthy
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Default to read-only permissions
permissions:
  contents: read

# For CI status badge, use GitHub's dynamic URL in your README:
#   ![CI](https://github.com/appliedmedia/print2paper4vscode/actions/workflows/ci.yml/badge.svg)

jobs:
  test:
    name: Test on ${{ matrix.os }} / Node.js ${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      pull-requests: write

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [20.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Compile TypeScript
        run: npm run compile
      
      - name: Run linters
        if: matrix.os == 'ubuntu-latest'
        run: |
          npm run lint
          npm run lint:md
          npm run lint:yaml

      - name: Run tests with coverage
        shell: bash
        run: |
          set -o pipefail
          npm run test:coverage | tee coverage.txt
      
      - name: Extract coverage percentage
        id: coverage
        if: always() && matrix.os == 'ubuntu-latest'
        run: |
          if [ -f coverage.txt ] && grep -q "All files" coverage.txt; then
            COVERAGE=$(grep "All files" coverage.txt | awk '{print $4}' | sed 's/%//' || echo "0")
            echo "percentage=${COVERAGE:-0}" >> $GITHUB_OUTPUT
            echo "Coverage: ${COVERAGE:-0}%"
          else
            echo "percentage=0" >> $GITHUB_OUTPUT
            echo "Coverage data not found"
          fi
      
      - name: Report coverage in job summary
        if: always() && matrix.os == 'ubuntu-latest'
        run: |
          echo "## Test Coverage Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage.txt ]; then
            echo "**Overall Coverage: ${{ steps.coverage.outputs.percentage }}%**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -20 coverage.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Coverage data not available" >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Comment coverage on PR
        # Only comment on first commit - use a unique marker to check if we've commented
        if: |
          matrix.os == 'ubuntu-latest' &&
          github.event_name == 'pull_request' &&
          steps.coverage.outputs.percentage != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          COVERAGE_PCT: ${{ steps.coverage.outputs.percentage }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Check if we've already posted a coverage comment
          EXISTING=$(gh pr view $PR_NUMBER --json comments --jq '[.comments[] | select(.author.login == "github-actions[bot]" and (.body | contains("## 📊 Test Coverage Report")))] | length')
          
          if [ "$EXISTING" -gt "0" ]; then
            echo "Coverage comment already exists, skipping"
            exit 0
          fi
          
          COVERAGE_TABLE=$(tail -20 coverage.txt)
          {
            echo "## 📊 Test Coverage Report"
            echo ""
            echo "**Overall Coverage: ${COVERAGE_PCT}%**"
            echo ""
            echo "<details>"
            echo "<summary>View detailed coverage</summary>"
            echo ""
            echo "\`\`\`"
            echo "${COVERAGE_TABLE}"
            echo "\`\`\`"
            echo ""
            echo "</details>"
            echo ""
            echo "View full report in the [Actions run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          } | gh pr comment ${{ github.event.pull_request.number }} --body-file -
      
      - name: Upload coverage for badge job
        if: matrix.os == 'ubuntu-latest' && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data
          path: coverage.txt
          retention-days: 1
