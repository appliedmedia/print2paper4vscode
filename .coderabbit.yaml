# CodeRabbit configuration for Print2Paper4VSCode
# Disable CodeRabbit for this workspace due to path issues
enabled: false

# Repository information (for reference)
repository:
  url: "https://github.com/appliedmedia/print2paper4vscode"
  path: "."

# Project-specific settings
project:
  type: "vscode-extension"
  language: "typescript"
  source_directories:
    - "src/"
    - "tests/"
  config_files:
    - "package.json"
    - "tsconfig.json"
    - "eslint.config.mjs"

# Disable all CodeRabbit features
code_review:
  enable_suggestions: false
  enable_explanations: false
  enabled: false

# Ignore all files (since disabled)
ignore:
  - "**/*"
