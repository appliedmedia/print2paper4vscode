# CodeRabbit configuration for Print2Paper4VSCode
# Use symlink path without spaces for better compatibility
enabled: true

# Repository information
repository:
  url: "https://github.com/appliedmedia/print2paper4vscode"

# Project-specific settings
project:
  type: "vscode-extension"
  language: "typescript"
  source_directories:
    - "src/"
    - "tests/"
  config_files:
    - "package.json"
    - ".config/tsconfig.json"
    - ".config/eslint.config.mjs"

# CodeRabbit behavior settings
code_review:
  enable_suggestions: true
  enable_explanations: true
  
  # Focus on TypeScript/JavaScript files
  file_patterns:
    - "**/*.ts"
    - "**/*.js"
    - "**/*.json"
    - "**/*.yaml"
    - "**/*.yml"

# Ignore certain files/directories
ignore:
  - "node_modules/"
  - "out/"
  - "build/"
  - "*.log"
  - ".git/"
