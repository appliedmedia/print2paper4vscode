# templateDictReplace configuration for build process
#
# Matches App.templateDictReplace() - same concept for build files
#
# Each entry specifies:
# - file: Target file to process (relative to project root)
# - output: Output file path (relative to project root)
# - yamlKey: If 'file' is YAML, extract this key's value before processing [OPTIONAL]
# - template: Template placeholder to replace (e.g., {{extId}}) [OPTIONAL for --dict mode]
# - source: Where to get the replacement value from [OPTIONAL - required for config mode]
#     - If .yaml/.yml: reads YAML file, requires 'yamlKey' to extract value
#     - If .js: imports JS module, requires 'variable' to extract value
# - yamlKey: Key to extract from YAML source file [OPTIONAL - required if source is YAML]
# - variable: Variable to import from JS source module [OPTIONAL - required if source is JS]
#
# Two modes:
# 1. Config mode (default): Requires 'source' + (variable OR yamlKey)
# 2. CLI mode (--dict): Skips entries without 'source', applies all {{placeholders}}

replacements:
  # Badge generation (requires --dict flag with runtime values)
  - file: images/svgs.yaml
    yamlKey: coverage
    output: images/coverage.svg
    # No 'source' = skipped in config mode, used in CLI mode with --dict
  
  - file: images/svgs.yaml
    yamlKey: ci
    output: images/ci.svg
    # No 'source' = skipped in config mode, used in CLI mode with --dict
  
  # Test: Extract from YAML file
  - file: .config/test-template.txt
    output: .config/test-output.txt
    template: "{{projectName}}"
    source: .config/test-metadata.yaml
    yamlKey: projectName
  
  # Example: Extract from JS module
  # - file: .config/template.package.json
  #   output: package.json
  #   template: "{{extId}}"
  #   source: out/src/types/_entrypoint_extId_t.js
  #   variable: kExtId
  
  # Example: Extract from YAML file
  # - file: .config/template.readme.md
  #   output: README.md
  #   template: "{{projectName}}"
  #   source: project-metadata.yaml
  #   yamlKey: name
