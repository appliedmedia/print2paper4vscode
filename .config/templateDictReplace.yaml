# templateDictReplace configuration for build process
#
# Matches App.templateDictReplace() - same concept for build files
#
# Each entry specifies:
# - file: Target file to process (relative to project root)
# - output: Output file path (relative to project root)
# - source: Compiled JS file to import from (for config mode) [OPTIONAL]
# - variable: Variable name to import (for config mode) [OPTIONAL]
# - template: Single template to replace (for config mode) [OPTIONAL]
#
# When using --dict flag, source/variable/template are ignored - all {{placeholders}}
# in the file are replaced with values from the CLI dictionary.

replacements:
  # Badge generation (requires --dict flag with runtime values)
  - file: images/coverage-template.svg
    output: images/coverage.svg
    # Requires: --dict coverage=84.83,colorHex=97ca00
  
  - file: images/ci-template.svg
    output: images/ci.svg
    # No replacements needed (static badge)
  
  # Example: Process template → root package.json (used by vsce and npm)
  # - file: .config/template.package.json
  #   output: package.json
  #   template: "{{extId}}"
  #   source: out/src/types/_entrypoint_extId_t.js
  #   variable: kExtId
