# UIMenu.yaml - Menu component templates (HTML/CSS/JS)
# ⚠️ Keep comments in this file minimal because it has to get copied at runtime. ⚠️

icon_external_link_svg: |
  <svg class="icon-external-link" width="1.4em" height="1.4em" viewBox="0 0 24 24" aria-hidden="true" focusable="false" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M19 13v6a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h6"/>
    <polyline points="14 4 20 4 20 10"/>
    <line x1="20" y1="4" x2="11" y2="13"/>
  </svg>

uimenu_css: |
  :root {
    --flyout-left: 97%;
  }

  .{{ns_}}menuBtn:hover { background: #e9e9e9; }

  /* Custom CSS-driven tooltip: replaces native title= which has a Chromium
     quirk where it won't re-show on the same element until the cursor leaves
     and re-enters. Generic [data-{{ns_}}tooltip] selector so the same rule
     covers menu top buttons, URL-bearing menu items, the toolbar grip, and
     anything else that opts in.

     Layout selector: menu items inside a dropdown render the bubble to the
     right (the dropdown opens downward, so below would overlap the next
     row). Everything else renders below — toolbar lives at the top of the
     webview, so there is room to drop the bubble down. */
  [data-{{ns_}}tooltip] {
    position: relative;
  }
  [data-{{ns_}}tooltip]::after {
    content: attr(data-{{ns_}}tooltip);
    position: absolute;
    background: #222;
    color: #fff;
    padding: 4px 8px;
    border-radius: 3px;
    font-size: 0.85em;
    line-height: 1.3;
    pointer-events: none;
    opacity: 0;
    z-index: 10000;
    transition: opacity 0.12s 0.5s;
    box-shadow: 0 2px 6px rgba(0,0,0,.25);
    top: calc(100% + 4px);
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    max-width: 320px;
  }
  .{{ns_}}menuItem[data-{{ns_}}tooltip]::after {
    top: 50%;
    left: calc(100% + 8px);
    transform: translateY(-50%);
    white-space: normal;
    word-break: break-word;
  }
  [data-{{ns_}}tooltip]:hover::after {
    opacity: 1;
  }
  .{{ns_}}menu {
    position: relative;
    display: inline-block;
  }
  .{{ns_}}menu.isHidden {
    display: none;
  }
  .{{ns_}}menuItems {
    position: absolute;
    background: #222;
    color: #fff;
    border-radius: 6px;
    box-shadow: 0 6px 18px rgba(0,0,0,.3);
    padding: 4px 3px;
    display: none;
    top: 100%;
    left: 0;
    z-index: 1000;
    width: max-content;
    min-width: 100%;
    pointer-events: auto;
  }
  .{{ns_}}menuItem {
    --gutter-before-width: 2ch;
    --gutter-after-width: 8ch;
    --gutter-off-width: 1ch;
    --gutter-before: var(--gutter-off-width);
    --gutter-after: var(--gutter-off-width);
    padding: 3px 3px;
    cursor: pointer;
    white-space: nowrap;
    display: grid;
    grid-template-columns: var(--gutter-before) 1fr var(--gutter-after);
    grid-template-areas: "gutter-before menu-text gutter-after";
    align-items: center;
    gap: 0 1ch;
    user-select: none;
    -webkit-user-select: none;
    position: relative;
    pointer-events: auto;
  }
  .{{ns_}}menuItem:hover, .{{ns_}}menuItem.isSelected {
    background: #444;
  }

  .{{ns_}}menuItem .gutter-after {
    grid-area: gutter-after;
    text-align: right;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 0.5ch;
  }

  .{{ns_}}menuItem .gutter-before {
    grid-area: gutter-before;
    text-align: left;
    display: flex;
    align-items: center;
    justify-content: flex-start;
  }

  .{{ns_}}menuItem .menu-item-text {
    grid-area: menu-text;
    text-align: left;
    display: flex;
    align-items: center;
  }

  .{{ns_}}menuItem .menu-item-text svg {
    vertical-align: middle;
    display: inline-block;
  }

  .{{ns_}}menuItem .menu-item-shortcut {
    opacity: 0.7;
    font-variant-numeric: tabular-nums;
  }

  .{{ns_}}menuItem.isFlyout .gutter-after::after {
    content: "▶" !important;
  }

  .{{ns_}}menuItem.isDefault .gutter-after::after {
    content: "📝" !important;
  }

  .{{ns_}}menuItem:not(.isFlyout):not(.isDefault) .gutter-after::after {
    content: "" !important;
  }

  /* External-link items render the box-with-arrow SVG inside .gutter-after,
     right-justified in the same gutter as ▶ for flyouts. */
  .{{ns_}}menuItem.isExternalLink .gutter-after svg {
    display: inline-block;
    vertical-align: middle;
  }

  /* Icon-only items (single-glyph displayName, no inline icon, no shortcut)
     get rendered ~37% larger so emoji like ⚙ are legible. */
  .{{ns_}}menuItem.isIconOnly .menu-item-text {
    font-size: 1.375em;
    line-height: 1;
  }

  /* .{{ns_}}menuItem.isSelected {} - removed empty block */
  .{{ns_}}menuItem.isSelected .gutter-before::before {
    content: "✓";
    display: inline-block;
    width: 100%;
    vertical-align: baseline;
    line-height: 1;
  }

  /* Icon slot prefix/suffix styling */
  .{{ns_}}menuItem .icon-slot-prefix,
  .{{ns_}}menuItem .icon-slot-suffix {
    display: inline-block;
    white-space: nowrap;
  }

  .{{ns_}}menuItem .text-edit-wrapper {
    display: inline-block;
    width: auto;
    flex-shrink: 0;
  }
  .{{ns_}}menuItem .{{ns_}}textEdit {
    border: 1px solid #888;
    background: #333;
    color: #fff;
    padding: 2px 4px;
    border-radius: 3px;
    font-size: 14px;
    font-weight: 500;
    text-align: center;
    width: 4ch;
    min-width: 4ch;
    pointer-events: auto;
    display: inline-block;
    box-sizing: border-box;
    flex-shrink: 0;
  }
  .{{ns_}}menuItem .{{ns_}}textEdit:focus {
    outline: 1px solid #007acc;
    border-color: #007acc;
  }

  .{{ns_}}menuBtn:has(.{{ns_}}textEdit) {
    pointer-events: none;
    cursor: default;
    width: auto !important;
    min-width: auto !important;
    max-width: fit-content;
    padding: 0 4px;
    flex-shrink: 0;
  }
  .{{ns_}}menuBtn:has(.{{ns_}}textEdit) * {
    pointer-events: auto;
  }
  .{{ns_}}menuBtn:has(.{{ns_}}textEdit) .{{ns_}}textEdit {
    cursor: text;
    width: 3ch !important;
    min-width: 3ch !important;
    max-width: 3ch !important;
  }
  .{{ns_}}menuBtn:has(.{{ns_}}textEdit) .text-edit-wrapper {
    width: auto !important;
    max-width: fit-content;
    flex-shrink: 0;
  }

  .{{ns_}}menuBtn .dropdown-arrow {
    display: inline-block;
    cursor: pointer;
    border-radius: 3px;
    padding: 0 1px;
    line-height: 1;
  }
  .{{ns_}}menuBtn .dropdown-arrow:focus {
    outline: 1px solid #007acc;
    outline-offset: 1px;
  }

  .{{ns_}}menu.has-gutter-before .{{ns_}}menuItem {
    --gutter-before: var(--gutter-before-width);
  }

  .{{ns_}}menu.has-gutter-after .{{ns_}}menuItem {
    --gutter-after: var(--gutter-after-width);
  }

  .{{ns_}}group { position: relative; }

  .{{ns_}}menu.isFlyout .{{ns_}}menuBtn {
    display: none;
  }

  .{{ns_}}menu.isFlyout {
    display: none;
    pointer-events: auto;
  }

  .{{ns_}}menu.isFlyout[style*="display: block"] .{{ns_}}menuItems {
    display: block !important;
  }

  .{{ns_}}menu.isFlyout:not([style*="display: none"]) .{{ns_}}menuItems {
    display: block !important;
  }

uimenu_html: |
  <div class="{{ns_}}menu {{menuClasses}}" id="{{menuId}}">
    <button class="{{ns_}}menuBtn" aria-label="{{displayName}}" data-{{ns_}}tooltip="{{displayName}}"{{shortcutCodeAttr}}{{menuBtnExtraAttrs}}>{{icon}}</button>
    {{menuItemsContainer}}
  </div>

uimenu_items_container: |
  <div class="{{ns_}}menuItems" id="{{menuId}}-items">{{menuItems}}</div>

uimenu_generic_handlers: |
  function closeAllMenus() {
    document.querySelectorAll('.{{ns_}}menuItems').forEach(items => {
      items.style.display = 'none';
    });
    document.querySelectorAll('.{{ns_}}menu.isFlyout').forEach(flyout => {
      flyout.style.display = 'none';
    });
  }

  function closeAllFlyouts() {
    document.querySelectorAll('.{{ns_}}menu.isFlyout').forEach(flyout => {
      flyout.style.display = 'none';
    });
  }

  const kContextDict_None = {};

  function postMenuItemSelected(menuId, menuItemId, _contextDict) {
    if (window.vscode && menuId && menuItemId) {
      // Use document.documentElement.clientWidth/Height instead of window.innerWidth/Height
      // because documentElement reflects the webview's layout viewport and accounts for
      // CSS/scrollbars and zooming in embed contexts where window.innerWidth can include
      // browser UI or not match the rendered document size.
      const windowWidth = document.documentElement.clientWidth;
      const windowHeight = document.documentElement.clientHeight;
      
      // Debug: log dimensions
      console.log(`Webview dimensions: ${windowWidth}px x ${windowHeight}px`);
      
      const contextDict = {
        windowWidth,
        windowHeight,
        ...(_contextDict || kContextDict_None)
      };
      
      window.vscode.postMessage({
        type: 'menuItemSelected',
        menuId,
        menuItemId,
        contextDict
      });
    }
  }

  function handleMenuButtonClick(e) {
    e.preventDefault();
    const btn = e.target.closest('.{{ns_}}menuBtn');
    const menu = btn?.closest('.{{ns_}}menu');
    const menuId = menu?.getAttribute('id');
    const menuItems = menu?.querySelector('.{{ns_}}menuItems');
    
    if (!menuItems) {
      const menuItemId = menuId;
      postMenuItemSelected(menuId, menuItemId, kContextDict_None);
      return;
    }
    
    const isOpen = menuItems.style.display === 'block';

    if (isOpen) {
      menuItems.style.display = 'none';
      btn.setAttribute('aria-expanded', 'false');
    } else {
      closeAllMenus();
      menuItems.style.display = 'block';
      btn.setAttribute('aria-expanded', 'true');
      requestDynamicValuesIn(menuItems);
    }
  }

  /* Ask the extension for a fresh value on every menu-item that was marked
     dynamic at toolbar render time. The dispatcher returns synchronously
     (round-trip in postMessage); the response handler below patches DOM. */
  function requestDynamicValuesIn(container) {
    if (!container || !window.vscode) return;
    const marked = container.querySelectorAll('[data-{{ns_}}dynamicMenuItemId]');
    marked.forEach(el => {
      const menuId = el.getAttribute('data-{{ns_}}dynamicMenuId');
      const menuItemId = el.getAttribute('data-{{ns_}}dynamicMenuItemId');
      if (!menuId || !menuItemId) return;
      window.vscode.postMessage({
        type: 'getDynamicValue',
        menuId,
        menuItemId,
      });
    });
  }

  function findFlyoutMenu(itemEl, flyoutMenuId) {
    if (!flyoutMenuId) return null;
    let flyoutMenu = itemEl.querySelector(`#${flyoutMenuId}`);
    if (flyoutMenu) return flyoutMenu;
    return document.getElementById(flyoutMenuId);
  }

  function getAncestorFlyouts(menu, excludeFlyout) {
    const ancestorFlyouts = [];
    let currentMenu = menu;
    while (currentMenu) {
      if (currentMenu.classList.contains('isFlyout') && currentMenu !== excludeFlyout) {
        ancestorFlyouts.push(currentMenu);
      }
      currentMenu = currentMenu.parentElement?.closest('.{{ns_}}menu.isFlyout') || null;
    }
    return ancestorFlyouts;
  }

  function showFlyoutMenu(flyoutMenu, itemEl, e, ancestorFlyouts) {
    if (flyoutMenu.parentElement !== itemEl) {
      itemEl.appendChild(flyoutMenu);
    }
    
    const itemRect = itemEl.getBoundingClientRect();
    const textElement = itemEl.querySelector('.menu-item-text');
    let lineY = e.clientY - itemRect.top;
    if (textElement) {
      const textRect = textElement.getBoundingClientRect();
      lineY = textRect.top - itemRect.top;
    }
    
    flyoutMenu.style.position = 'absolute';
    const flyoutLeft = getComputedStyle(document.documentElement)
      .getPropertyValue('--flyout-left')
      .trim() || '97%';
    flyoutMenu.style.left = flyoutLeft;
    flyoutMenu.style.top = `${lineY}px`;
    flyoutMenu.style.zIndex = String(1000 + ancestorFlyouts.length + 1);
    flyoutMenu.style.display = 'block';
    
    const flyoutMenuItems = flyoutMenu.querySelector('.{{ns_}}menuItems');
    if (flyoutMenuItems) {
      flyoutMenuItems.style.display = 'block';
      flyoutMenuItems.style.visibility = 'visible';
      flyoutMenuItems.style.opacity = '1';
      requestDynamicValuesIn(flyoutMenuItems);
    }
  }

  function handleFlyoutToggle(e, itemEl, menu, flyoutMenuId) {
    e.preventDefault();
    e.stopPropagation();
    
    const flyoutMenu = findFlyoutMenu(itemEl, flyoutMenuId);
    
    if (flyoutMenu) {
      const ancestorFlyouts = getAncestorFlyouts(menu, flyoutMenu);
      const wasVisible = flyoutMenu.style.display === 'block';
      
      document.querySelectorAll('.{{ns_}}menu.isFlyout').forEach(flyout => {
        if (flyout !== flyoutMenu && !ancestorFlyouts.includes(flyout)) {
          flyout.style.display = 'none';
        }
      });
      
      if (wasVisible) {
        flyoutMenu.style.display = 'none';
      } else {
        showFlyoutMenu(flyoutMenu, itemEl, e, ancestorFlyouts);
      }
    }
  }

  function handleMenuItemClick(e, itemEl) {
    e.preventDefault();
    e.stopPropagation();

    const menu = itemEl.closest('.{{ns_}}menu');
    const menuId = menu?.getAttribute('id');
    const menuItemId = itemEl.id;
    
    if (itemEl.classList.contains('isFlyout')) {
      const flyoutMenuId = itemEl.getAttribute('data-{{ns_}}flyoutMenuId');
      if (flyoutMenuId) {
        handleFlyoutToggle(e, itemEl, menu, flyoutMenuId);
      }
    } else {
      if (menu.classList.contains('has-gutter-before')) {
        menu.querySelectorAll('.{{ns_}}menuItem').forEach(item => {
          item.classList.remove('isSelected');
        });
        itemEl.classList.add('isSelected');
      }
      
      postMenuItemSelected(menuId, menuItemId, kContextDict_None);
      closeAllMenus();
    }
  }

  document.addEventListener('click', (e) => {
    if (!e || !e.target || !e.target.closest) return;

    const btn = e.target.closest('.{{ns_}}menuBtn');
    if (btn) {
      handleMenuButtonClick(e);
      return;
    }

    const itemEl = e.target.closest('.{{ns_}}menuItem');
    if (itemEl) {
      handleMenuItemClick(e, itemEl);
      return;
    }

    closeAllMenus();
  });

  /* Patch dynamic-marked items when the extension answers a getDynamicValue
     request. The element is located by the dynamicMenuId/dynamicMenuItemId
     pair on its data attrs. Empty-string / null / undefined collapse the
     span to mirror the at-render unbound-key behavior. */
  window.addEventListener('message', (event) => {
    const msg = event && event.data;
    if (!msg || msg.type !== 'dynamicValue') return;
    const selector =
      '[data-{{ns_}}dynamicMenuId="' + msg.menuId +
      '"][data-{{ns_}}dynamicMenuItemId="' + msg.menuItemId + '"]';
    const el = document.querySelector(selector);
    if (!el) return;
    if (msg.value === '' || msg.value === undefined || msg.value === null) {
      // Hide instead of remove so subsequent menu opens can still find the
      // marker and request a fresh value (e.g. user unbinds, then rebinds).
      el.textContent = '';
      el.style.display = 'none';
    } else {
      el.style.display = '';
      el.textContent = String(msg.value);
    }
  });

  function handleTextEditKeydown(e) {
    const input = e.target;
    if (!input.classList.contains('{{ns_}}textEdit')) return;
    
    e.stopPropagation();
    
    if (e.key === 'Enter' || e.key === 'Return') {
      e.preventDefault();
      input.blur();
      return;
    }
    
    const regexStr = input.dataset['{{ns_}}constrain_regex'];
    if (!regexStr) return;
    
    try {
      const currentValue = input.value;
      const selectionStart = input.selectionStart;
      const selectionEnd = input.selectionEnd;
      const key = e.key;
      let newValue = currentValue;
      if (key === 'Backspace') {
        if (selectionStart === selectionEnd && selectionStart > 0) {
          newValue = currentValue.slice(0, selectionStart - 1) + currentValue.slice(selectionStart);
        } else if (selectionStart !== selectionEnd) {
          newValue = currentValue.slice(0, selectionStart) + currentValue.slice(selectionEnd);
        }
      } else if (key === 'Delete') {
        if (selectionStart === selectionEnd && selectionStart < currentValue.length) {
          newValue = currentValue.slice(0, selectionStart) + currentValue.slice(selectionStart + 1);
        } else if (selectionStart !== selectionEnd) {
          newValue = currentValue.slice(0, selectionStart) + currentValue.slice(selectionEnd);
        }
      } else if (key.length === 1) {
        const before = currentValue.slice(0, selectionStart);
        const after = currentValue.slice(selectionEnd);
        newValue = before + key + after;
      } else {
        return;
      }
      
      const regex = new RegExp(regexStr);
      if (!regex.test(newValue)) {
        e.preventDefault();
        e.stopPropagation();
        return;
      }
    } catch (error) {
      console.error('Error validating text edit input:', error);
    }
  }

  function handleTextEditClick(e) {
    const input = e.target;
    if (!input.classList.contains('{{ns_}}textEdit')) return;
    closeAllMenus();
    e.stopPropagation();
  }

  function handleTextEditInput(e) {
    const input = e.target;
    if (!input.classList.contains('{{ns_}}textEdit')) return;
    e.stopPropagation();
  }

  function validateAndClampTextEdit(input) {
    const minStr = input.dataset['{{ns_}}constrain_min'];
    const maxStr = input.dataset['{{ns_}}constrain_max'];
    
    if (minStr !== null && maxStr !== null) {
      const value = parseFloat(input.value);
      const min = parseFloat(minStr);
      const max = parseFloat(maxStr);
      
      if (!isNaN(value) && !isNaN(min) && !isNaN(max)) {
        const clampedValue = Math.max(min, Math.min(max, value));
        if (clampedValue !== value) {
          input.value = clampedValue.toString();
        }
      }
    }
  }

  function handleTextEditBlur(e) {
    const input = e.target;
    if (!input.classList.contains('{{ns_}}textEdit')) return;
    e.stopPropagation();
    validateAndClampTextEdit(input);

    /* Skip post when value unchanged: a regen here destroys whatever element just received tab focus. */
    if (input.value === input.defaultValue) return;

    const menu = input.closest('.{{ns_}}menu');
    if (!menu) return;

    const menuId = menu.getAttribute('id');
    const displayValue = input.value; // Raw text_edit content (display value)

    // For text_edit, send menuItemId = menuId and display value in contextDict
    // Extension will apply transform.persist if needed
    postMenuItemSelected(menuId, menuId, { display: displayValue });
  }

  document.addEventListener('click', handleTextEditClick, true);
  document.addEventListener('keydown', handleTextEditKeydown, true);
  document.addEventListener('input', handleTextEditInput, true);
  document.addEventListener('blur', handleTextEditBlur, true);

  /* Keyboard activation for the dropdown arrow (a focusable span, not a real button). */
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter' && e.key !== ' ') return;
    const arrow = e.target && e.target.closest && e.target.closest('.dropdown-arrow');
    if (!arrow) return;
    const btn = arrow.closest('.{{ns_}}menuBtn');
    if (!btn) return;
    e.preventDefault();
    handleMenuButtonClick({ target: btn, preventDefault: () => {} });
  });

  function initKeyboardShortcuts() {
    document.addEventListener('keydown', function(e) {
      const isModifier = e.metaKey || e.ctrlKey;
      if (!isModifier) return;

      const menuButtons = document.querySelectorAll('.{{ns_}}menuBtn[data-{{ns_}}shortcutCode]');
      for (const btn of menuButtons) {
        const shortcutCode = btn.getAttribute('data-{{ns_}}shortcutCode');
        if (shortcutCode === e.code) {
          e.preventDefault();
          btn.click();
          return;
        }
      }

      const menuItems = document.querySelectorAll('.{{ns_}}menuItem[data-{{ns_}}shortcutCode]');
      for (const item of menuItems) {
        const shortcutCode = item.getAttribute('data-{{ns_}}shortcutCode');
        if (shortcutCode === e.code) {
          e.preventDefault();
          item.click();
          return;
        }
      }
    });
  }

  initKeyboardShortcuts();

uimenu_item: |
  <div class="{{ns_}}menuItem {{itemClasses}}" id="{{itemId}}"{{flyoutMenuId}}{{textEditConfigAttr}}{{shortcutCodeAttr}}{{tooltipAttr}}>
    <div class="gutter-before">{{contentGutterBefore}}</div>
    <div class="menu-item-text">
      {{iconSlotWithPrefixSuffix}}{{itemDisplayName}}
    </div>
    <div class="gutter-after">{{contentGutterAfter}}</div>
    {{flyout}}
  </div>

uimenu_text_edit: |
  <span class="text-edit-wrapper"><input type="text" class="{{ns_}}textEdit" data-{{ns_}}itemId="{{itemId}}"{{constrain}}{{width}}{{value}} /></span>

# end, UIMenu.yaml
