uimenu_css: |
  .p2p4vsc-menu-btn:hover { background: #e9e9e9; }
  .p2p4vsc-menu {
    position: relative;
    display: inline-block;
  }
  .p2p4vsc-menu-items {
    position: absolute;
    background: #222;
    color: #fff;
    border-radius: 6px;
    box-shadow: 0 6px 18px rgba(0,0,0,.3);
    padding: 4px 3px;
    display: none;
    top: 100%;
    left: 0;
    z-index: 1000;
    width: max-content; /* Ensure container expands to fit content */
    min-width: 100%; /* But at least as wide as the button */
  }
  .p2p4vsc-menu-item {
    --gutter-before-width: 2ch;
    --gutter-after-width: 4ch;
    --gutter-off-width: 1ch;
    --gutter-before: var(--gutter-off-width);
    --gutter-after: var(--gutter-off-width);
    padding: 3px 3px;
    cursor: pointer;
    white-space: nowrap;
    display: grid;
    grid-template-columns: var(--gutter-before) 1fr var(--gutter-after);
    grid-template-areas: "gutter-before menu-text gutter-after";
    align-items: center;
    gap: 0;
    user-select: none;
    -webkit-user-select: none;
  }
  .p2p4vsc-menu-item:hover, .p2p4vsc-menu-item.selected {
    background: #444;
  }

  .p2p4vsc-menu-item .gutter-after {
    grid-area: gutter-after;
    text-align: right;
    display: flex;
    align-items: center;
    justify-content: flex-end;
  }

  .p2p4vsc-menu-item .gutter-before {
    grid-area: gutter-before;
    text-align: left;
    display: flex;
    align-items: center;
    justify-content: flex-start;
  }

  .p2p4vsc-menu-item .menu-item-text {
    grid-area: menu-text;
    text-align: left;
    display: flex;
    align-items: center;
  }

  .p2p4vsc-menu-item .menu-item-text svg {
    vertical-align: middle;
    display: inline-block;
  }

  /* Ensure only items with is-flyout class get flyout arrows */
  .p2p4vsc-menu-item.is-flyout .gutter-after::after {
    content: "▶" !important;
  }

  /* Ensure only items with default-item class get editor icons */
  .p2p4vsc-menu-item.default-item .gutter-after::after {
    content: "📝" !important;
  }

  /* Explicitly clear content for items without special classes */
  .p2p4vsc-menu-item:not(.is-flyout):not(.default-item) .gutter-after::after {
    content: "" !important;
  }

  .p2p4vsc-menu-item.selected {
    /* Keep the same grid structure as default */
  }


  .p2p4vsc-menu-item.selected .gutter-before::before {
    content: "✓";
    display: inline-block;
    width: 100%;
    vertical-align: baseline;
    line-height: 1;
  }

  .p2p4vsc-menu.has-gutter-before .p2p4vsc-menu-item {
    --gutter-before: var(--gutter-before-width);
  }

  .p2p4vsc-menu.has-gutter-after .p2p4vsc-menu-item {
    --gutter-after: var(--gutter-after-width);
  }

  .p2p4vsc-group { position: relative; }

  /* Hide button for flyout menus */
  .p2p4vsc-menu.is-flyout .p2p4vsc-menu-btn {
    display: none;
  }

  /* Hide flyout menus by default */
  .p2p4vsc-menu.is-flyout {
    display: none;
  }

  /* Show menu items inside flyout menus when the flyout is visible */
  .p2p4vsc-menu.is-flyout[style*="display: block"] .p2p4vsc-menu-items {
    display: block !important;
  }

uimenu_html: |
  <div class="p2p4vsc-menu {{menuClasses}}" id="{{menuId}}">
    <button class="p2p4vsc-menu-btn" title="{{displayName}}">{{icon}}</button>
    <div class="p2p4vsc-menu-items" id="{{menuId}}-items">
      {{menuItems}}
    </div>
  </div>

uimenu_generic_handlers: |
  // Generic handlers for all menus - just pass events to extension
  document.addEventListener('click', (e) => {
    // Safety checks
    if (!e) return;
    if (!e.target) return;
    if (!e.target.closest) return;
    
    // Handle menu button clicks to show/hide dropdowns
    if (e?.target?.matches?.('.p2p4vsc-menu-btn')) {
      e.preventDefault();
      const menu = e.target?.closest?.('.p2p4vsc-menu');
      const menuItems = menu?.querySelector?.('.p2p4vsc-menu-items');

      // Close all other menus first
      document.querySelectorAll('.p2p4vsc-menu-items').forEach(items => {
        if (items !== menuItems) {
          items.style.display = 'none';
        }
      });

      // Close all flyout menus when switching to a different main menu
      document.querySelectorAll('.p2p4vsc-menu.is-flyout').forEach(flyout => {
        flyout.style.display = 'none';
      });

      // Toggle this menu
      const btn = e.target;
      if (menuItems.style.display === 'block') {
        menuItems.style.display = 'none';
        btn.setAttribute('aria-expanded', 'false');
      } else {
        menuItems.style.display = 'block';
        btn.setAttribute('aria-expanded', 'true');
      }
      return;
    }

    // Handle menu item clicks
    const itemEl = e.target?.closest?.('.p2p4vsc-menu-item');
    if (itemEl) {
      const menu = itemEl.closest('.p2p4vsc-menu');
      // Check if this item has a flyout (is a parent item with submenu)
      if (itemEl.classList.contains('is-flyout')) {
        // This item has a flyout - toggle it instead of selecting
        e.preventDefault();
        
        // Find the flyout menu for this item by checking flyout-menu-id-ref attribute
        const flyoutMenuId = itemEl.getAttribute('flyout-menu-id-ref');
        const flyoutMenu = flyoutMenuId ? document.getElementById(flyoutMenuId) : null;
        if (flyoutMenu) {
          // Close all other flyouts
          document.querySelectorAll('.p2p4vsc-menu.is-flyout').forEach(menu => {
            if (menu !== flyoutMenu) {
              menu.style.display = 'none';
            }
          });
          
          // Toggle this flyout
          if (flyoutMenu.style.display === 'block') {
            flyoutMenu.style.display = 'none';
          } else {
            // Position flyout relative to the clicked menu item
            // Make the flyout a child of the clicked menu item for relative positioning
            if (flyoutMenu.parentElement !== itemEl) {
              itemEl.appendChild(flyoutMenu);
            }
            
            flyoutMenu.style.position = 'absolute';
            flyoutMenu.style.left = '97%';
            flyoutMenu.style.top = '3%';
            flyoutMenu.style.zIndex = '1001';
            flyoutMenu.style.display = 'block';
          }
        }
        return;
      }
      
      // Regular menu item selection (works for both main menu and flyout items)
      // Only add selected class if this menu has gutter-before (state-based menus)
      // Action-only menus (like Print) have no gutter-before and shouldn't show selection
      if (menu.classList.contains('has-gutter-before')) {
        // Remove selected class from all items in this menu
        const menuItems = menu.querySelectorAll('.p2p4vsc-menu-item');
        menuItems.forEach(item => item.classList.remove('selected'));
        
        // Add selected class to clicked item
        itemEl.classList.add('selected');
      }

      // Send minimal selection data to extension
      window.vscode.postMessage({
        type: 'menuItemSelected',
        itemId: itemEl.id,
        menuId: menu?.getAttribute('id')
      });

        // Close all menus after selection unless the clicked item is a flyout trigger
        if (!itemEl.classList.contains('is-flyout')) {
          // Close all dropdown menus (keeps buttons visible)
          document.querySelectorAll('.p2p4vsc-menu-items').forEach(items => {
            items.style.display = 'none';
          });
          // Reset all flyout menus to closed state
          document.querySelectorAll('.p2p4vsc-menu.is-flyout').forEach(flyout => {
            flyout.style.display = 'none';
          });
        }
      return;
    }

    // Close all menus when clicking outside
    if (!e.target?.closest?.('.p2p4vsc-menu')) {
      document.querySelectorAll('.p2p4vsc-menu-items').forEach(items => {
        items.style.display = 'none';
      });
      document.querySelectorAll('.p2p4vsc-menu.is-flyout').forEach(flyout => {
        flyout.style.display = 'none';
      });
    }
  });

uimenu_item: |
  <div class="p2p4vsc-menu-item {{itemClasses}}" id="{{itemId}}"{{flyoutMenuIdRef}}>
    <div class="gutter-before">{{contentGutterBefore}}</div>
    <div class="menu-item-text">{{itemDisplayName}}</div>
    <div class="gutter-after">{{contentGutterAfter}}</div>
    {{flyout}}
  </div>
