ui_menu_css: |
  .p2p4vsc-menu-btn:hover { background: #e9e9e9; }
  .p2p4vsc-menu {
    position: relative;
    display: inline-block;
  }
  .p2p4vsc-menu-items {
    position: absolute;
    background: #222;
    color: #fff;
    border-radius: 6px;
    box-shadow: 0 6px 18px rgba(0,0,0,.3);
    padding: 4px 3px;
    display: none;
    top: 100%;
    left: 0;
    z-index: 1000;
    width: max-content; /* Ensure container expands to fit content */
    min-width: 100%; /* But at least as wide as the button */
  }
  .p2p4vsc-menu-item {
    --gutter-before-width: 2ch;
    --gutter-after-width: 4ch;
    --gutter-off-width: 1ch;
    padding: 3px 3px;
    cursor: pointer;
    white-space: nowrap;
    display: grid;
    grid-template-columns: var(--gutter-off-width) 1fr var(--gutter-off-width);
    grid-template-areas: "gutter-before menu-text gutter-after";
    align-items: center;
    gap: 0;
  }
  .p2p4vsc-menu-item:hover, .p2p4vsc-menu-item.selected {
    background: #444;
  }

  .p2p4vsc-menu-item .gutter-after {
    grid-area: gutter-after;
    text-align: right;
  }

  .p2p4vsc-menu-item .gutter-before {
    grid-area: gutter-before;
    text-align: left;
  }

  .p2p4vsc-menu-item .menu-item-text {
    grid-area: menu-text;
    text-align: left;
  }

  .p2p4vsc-menu-item.default-item .gutter-after::after {
    content: "📝";
  }

  .p2p4vsc-menu-item.flyout .gutter-after::after {
    content: "▶";
  }

  .p2p4vsc-menu-item.selected {
    grid-template-columns: 1ch 1fr 0;
  }

  .p2p4vsc-menu-item.selected .gutter-before::before {
    content: "✓";
    display: inline-block;
    width: 100%;
  }

  .p2p4vsc-menu.has-gutter-after .p2p4vsc-menu-item {
    grid-template-columns: 0 1fr var(--gutter-after-width);
  }

  .p2p4vsc-menu.has-selected .p2p4vsc-menu-item {
    grid-template-columns: var(--gutter-before-width) 1fr 0;
  }

  .p2p4vsc-menu.has-selected.has-gutter-after .p2p4vsc-menu-item {
    grid-template-columns: var(--gutter-before-width) 1fr var(--gutter-after-width);
  }

  /* Flyout submenu styling */
  .p2p4vsc-flyout {
    position: absolute;
    left: 100%;
    top: 0;
    background: #333;
    color: #fff;
    border-radius: 6px;
    box-shadow: 0 6px 18px rgba(0,0,0,.3);
    padding: 4px 0;
    display: none;
    z-index: 1001;
    margin-left: 0;
  }

  .p2p4vsc-flyout .p2p4vsc-menu-item {
    padding: 3px;
    cursor: pointer;
    white-space: nowrap;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    position: relative;
  }

  .p2p4vsc-flyout .p2p4vsc-menu-item:hover {
    background: #555;
  }

  .p2p4vsc-group { position: relative; }

ui_menu_html: |
  <div class="p2p4vsc-menu {{MENU_CLASSES}}" id="{{MENU_ID}}">
    <button class="p2p4vsc-menu-btn"
            title="{{TITLE}}">{{ICON}}</button>
    <div class="p2p4vsc-menu-items" id="{{MENU_ID}}-items">
      {{MENU_ITEMS}}
    </div>
  </div>

ui_menu_generic_handlers: |
  // Generic handlers for all menus - just pass events to extension
  document.addEventListener('click', (e) => {
    // Handle menu button clicks to show/hide dropdowns
    if (e.target && e.target.matches && e.target.matches('.p2p4vsc-menu-btn')) {
      e.preventDefault();
      const menu = e.target.closest && e.target.closest('.p2p4vsc-menu');
      const menuItems = menu.querySelector('.p2p4vsc-menu-items');

      // Close all other menus first
      document.querySelectorAll('.p2p4vsc-menu-items').forEach(items => {
        if (items !== menuItems) {
          items.style.display = 'none';
        }
      });

      // Toggle this menu
      const btn = e.target;
      if (menuItems.style.display === 'block') {
        menuItems.style.display = 'none';
        btn.setAttribute('aria-expanded', 'false');
      } else {
        menuItems.style.display = 'block';
        btn.setAttribute('aria-expanded', 'true');
      }
      return;
    }

    // Handle menu item clicks
    if (e.target.matches('.p2p4vsc-menu-item')) {
      const menu = e.target.closest && e.target.closest('.p2p4vsc-menu');
      
      // Check if this item has a flyout
      const flyout = e.target.querySelector('.p2p4vsc-flyout');
      if (flyout) {
        // This item has a flyout - toggle it instead of selecting
        e.preventDefault();
        
        // Close all other flyouts
        document.querySelectorAll('.p2p4vsc-flyout').forEach(f => {
          if (f !== flyout) f.style.display = 'none';
        });
        
        // Toggle this flyout
        if (flyout.style.display === 'block') {
          flyout.style.display = 'none';
        } else {
          flyout.style.display = 'block';
        }
        return;
      }
      
      // No flyout - proceed with normal selection
      // Remove active class from all items in this menu
      const menuItems = menu.querySelectorAll('.p2p4vsc-menu-item');
      menuItems.forEach(item => item.classList.remove('active'));
      
      // Add active class to clicked item
      e.target.classList.add('active');

      // Send minimal selection data to extension
      window.vscode.postMessage({
        type: 'menuItemSelected',
        targetId: e.target.id,
        parentId: e.target.closest && e.target.closest('.p2p4vsc-menu')?.getAttribute('id')
      });

      // Close the menu after selection
      const menuItemsContainer = menu.querySelector('.p2p4vsc-menu-items');
      menuItemsContainer.style.display = 'none';
      const btn = menu.querySelector('.p2p4vsc-menu-btn');
      btn?.setAttribute('aria-expanded', 'false');
      return;
    }

    // Close all menus when clicking outside
    if (!e.target.closest && e.target.closest('.p2p4vsc-menu')) {
      document.querySelectorAll('.p2p4vsc-menu-items').forEach(items => {
        items.style.display = 'none';
      });
      document.querySelectorAll('.p2p4vsc-flyout').forEach(flyout => {
        flyout.style.display = 'none';
      });
    }
  });

ui_menu_item: |
  <div class="p2p4vsc-menu-item {{ITEM_CLASSES}}" id="{{ITEM_ID}}">
    <div class="gutter-before">{{CONTENT_GUTTER_BEFORE}}</div>
    <div class="menu-item-text">{{ITEM_LABEL}}</div>
    <div class="gutter-after">{{CONTENT_GUTTER_AFTER}}</div>
    {{FLYOUT}}
  </div>

ui_flyout: |
  <div class="p2p4vsc-flyout" id="{{MENU_ID}}" style="width: {{MENU_WIDTH}};">{{MENU_ITEMS}}</div>
