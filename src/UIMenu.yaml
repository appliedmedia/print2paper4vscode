uimenu_css: |
  :root {
    /* Flyout positioning: 97% leaves 3% gap to prevent overlap with parent menu item gutters */
    /* The 3% provides visual spacing for gutter-before (2ch) and gutter-after (4ch) areas */
    --flyout-left: 97%;
  }

  .p2p4vsc-menu-btn:hover { background: #e9e9e9; }
  .p2p4vsc-menu {
    position: relative;
    display: inline-block;
  }
  .p2p4vsc-menu-items {
    position: absolute;
    background: #222;
    color: #fff;
    border-radius: 6px;
    box-shadow: 0 6px 18px rgba(0,0,0,.3);
    padding: 4px 3px;
    display: none;
    top: 100%;
    left: 0;
    z-index: 1000;
    width: max-content; /* Ensure container expands to fit content */
    min-width: 100%; /* But at least as wide as the button */
  }
  .p2p4vsc-menu-item {
    --gutter-before-width: 2ch;
    --gutter-after-width: 4ch;
    --gutter-off-width: 1ch;
    --gutter-before: var(--gutter-off-width);
    --gutter-after: var(--gutter-off-width);
    padding: 3px 3px;
    cursor: pointer;
    white-space: nowrap;
    display: grid;
    grid-template-columns: var(--gutter-before) 1fr var(--gutter-after);
    grid-template-areas: "gutter-before menu-text gutter-after";
    align-items: center;
    gap: 0;
    user-select: none;
    -webkit-user-select: none;
    position: relative; /* Required for absolutely positioned flyout children */
  }
  .p2p4vsc-menu-item:hover, .p2p4vsc-menu-item.selected {
    background: #444;
  }

  .p2p4vsc-menu-item .gutter-after {
    grid-area: gutter-after;
    text-align: right;
    display: flex;
    align-items: center;
    justify-content: flex-end;
  }

  .p2p4vsc-menu-item .gutter-before {
    grid-area: gutter-before;
    text-align: left;
    display: flex;
    align-items: center;
    justify-content: flex-start;
  }

  .p2p4vsc-menu-item .menu-item-text {
    grid-area: menu-text;
    text-align: left;
    display: flex;
    align-items: center;
  }

  .p2p4vsc-menu-item .menu-item-text svg {
    vertical-align: middle;
    display: inline-block;
  }

  /* Ensure only items with is-flyout class get flyout arrows */
  .p2p4vsc-menu-item.is-flyout .gutter-after::after {
    content: "▶" !important;
  }

  /* Ensure only items with default-item class get editor icons */
  .p2p4vsc-menu-item.default-item .gutter-after::after {
    content: "📝" !important;
  }

  /* Explicitly clear content for items without special classes */
  .p2p4vsc-menu-item:not(.is-flyout):not(.default-item) .gutter-after::after {
    content: "" !important;
  }

  .p2p4vsc-menu-item.selected {
    /* Keep the same grid structure as default */
  }


  .p2p4vsc-menu-item.selected .gutter-before::before {
    content: "✓";
    display: inline-block;
    width: 100%;
    vertical-align: baseline;
    line-height: 1;
  }

  .p2p4vsc-menu.has-gutter-before .p2p4vsc-menu-item {
    --gutter-before: var(--gutter-before-width);
  }

  .p2p4vsc-menu.has-gutter-after .p2p4vsc-menu-item {
    --gutter-after: var(--gutter-after-width);
  }

  .p2p4vsc-group { position: relative; }

  /* Hide button for flyout menus */
  .p2p4vsc-menu.is-flyout .p2p4vsc-menu-btn {
    display: none;
  }

  /* Hide flyout menus by default */
  .p2p4vsc-menu.is-flyout {
    display: none;
  }

  /* Show menu items inside flyout menus when the flyout is visible */
  .p2p4vsc-menu.is-flyout[style*="display: block"] .p2p4vsc-menu-items {
    display: block !important;
  }

  /* When flyout menu is visible, ensure menu items are shown */
  .p2p4vsc-menu.is-flyout:not([style*="display: none"]) .p2p4vsc-menu-items {
    display: block !important;
  }

uimenu_html: |
  <div class="p2p4vsc-menu {{menuClasses}}" id="{{menuId}}"{{flyoutItemsAttr}}>
    <button class="p2p4vsc-menu-btn" title="{{displayName}}">{{icon}}</button>
    {{menuItemsContainer}}
  </div>

uimenu_generic_handlers: |
  // Generic handlers for all menus - refactored into focused functions

  /**
   * Close all dropdown menus and flyout menus
   */
  function closeAllMenus() {
    document.querySelectorAll('.p2p4vsc-menu-items').forEach(items => {
      items.style.display = 'none';
    });
    document.querySelectorAll('.p2p4vsc-menu.is-flyout').forEach(flyout => {
      flyout.style.display = 'none';
    });
  }

  /**
   * Close all flyout menus (but keep dropdowns open)
   */
  function closeAllFlyouts() {
    document.querySelectorAll('.p2p4vsc-menu.is-flyout').forEach(flyout => {
      flyout.style.display = 'none';
    });
  }

  /**
   * Post menu item selection message to extension
   */
  function postMenuItemSelected(menuId, itemId) {
    if (window.vscode && menuId && itemId) {
      window.vscode.postMessage({
        type: 'menuItemSelected',
        itemId: itemId,
        menuId: menuId
      });
    }
  }

  /**
   * Handle menu button click - either show dropdown or trigger selection if no items
   */
  function handleMenuButtonClick(e) {
    e.preventDefault();
    const menu = e.target?.closest?.('.p2p4vsc-menu');
    const menuId = menu?.getAttribute('id');
    const menuItems = menu?.querySelector('.p2p4vsc-menu-items');
    
    // Menu items may be regular items or have flyouts; both require a dropdown.
    // If no items, treat button click as direct selection
    if (!menuItems) {
      postMenuItemSelected(menuId, menuId);
      return;
    }
    
    // Menu has items - toggle dropdown (items may or may not have flyouts)
    closeAllMenus();
    
    const btn = e.target;
    const isOpen = menuItems.style.display === 'block';
    menuItems.style.display = isOpen ? 'none' : 'block';
    btn.setAttribute('aria-expanded', isOpen ? 'false' : 'true');
  }

  /**
   * Find flyout menu element by ID, searching within item first, then document-wide
   */
  function findFlyoutMenu(itemEl, flyoutMenuId) {
    if (!flyoutMenuId) return null;
    
    // Flyouts are embedded as children of menu items - search within item first
    let flyoutMenu = itemEl.querySelector(`#${flyoutMenuId}`);
    if (flyoutMenu) return flyoutMenu;
    
    // Fallback: search document-wide (flyout menu may be elsewhere in DOM)
    return document.getElementById(flyoutMenuId);
  }

  /**
   * Get ancestor flyout menus (for proper z-index and closing logic)
   */
  function getAncestorFlyouts(menu, excludeFlyout) {
    const ancestorFlyouts = [];
    let currentMenu = menu;
    while (currentMenu) {
      if (currentMenu.classList.contains('is-flyout') && currentMenu !== excludeFlyout) {
        ancestorFlyouts.push(currentMenu);
      }
      currentMenu = currentMenu.parentElement?.closest('.p2p4vsc-menu.is-flyout') || null;
    }
    return ancestorFlyouts;
  }

  /**
   * Position and show flyout menu relative to item
   */
  function showFlyoutMenu(flyoutMenu, itemEl, e, ancestorFlyouts) {
    // Ensure flyout is child of item (should already be from HTML generation)
    if (flyoutMenu.parentElement !== itemEl) {
      itemEl.appendChild(flyoutMenu);
    }
    
    // Position flyout
    const itemRect = itemEl.getBoundingClientRect();
    const textElement = itemEl.querySelector('.menu-item-text');
    let lineY = e.clientY - itemRect.top; // Fallback to mouse position
    if (textElement) {
      const textRect = textElement.getBoundingClientRect();
      lineY = textRect.top - itemRect.top;
    }
    
    flyoutMenu.style.position = 'absolute';
    // Use CSS variable for flyout positioning (97% leaves 3% gap for menu item gutters)
    const flyoutLeft = getComputedStyle(document.documentElement)
      .getPropertyValue('--flyout-left')
      .trim() || '97%'; // Fallback to 97% if CSS var not found
    flyoutMenu.style.left = flyoutLeft;
    flyoutMenu.style.top = `${lineY}px`;
    flyoutMenu.style.zIndex = String(1000 + ancestorFlyouts.length + 1);
    flyoutMenu.style.display = 'block';
    
    // Ensure menu items inside flyout are visible
    const flyoutMenuItems = flyoutMenu.querySelector('.p2p4vsc-menu-items');
    if (flyoutMenuItems) {
      flyoutMenuItems.style.display = 'block';
      flyoutMenuItems.style.visibility = 'visible';
      flyoutMenuItems.style.opacity = '1';
    }
  }

  /**
   * Handle flyout menu toggle (open/close flyout)
   * Single return point - returns early only if flyout menu not found
   */
  function handleFlyoutToggle(e, itemEl, menu, flyoutMenuId) {
    e.preventDefault();
    e.stopPropagation();
    
    const flyoutMenu = findFlyoutMenu(itemEl, flyoutMenuId);
    
    if (flyoutMenu) {
      const ancestorFlyouts = getAncestorFlyouts(menu, flyoutMenu);
      const wasVisible = flyoutMenu.style.display === 'block';
      
      // Close all other flyouts except the one being toggled and its ancestors
      document.querySelectorAll('.p2p4vsc-menu.is-flyout').forEach(flyout => {
        if (flyout !== flyoutMenu && !ancestorFlyouts.includes(flyout)) {
          flyout.style.display = 'none';
        }
      });
      
      if (wasVisible) {
        flyoutMenu.style.display = 'none';
      } else {
        showFlyoutMenu(flyoutMenu, itemEl, e, ancestorFlyouts);
      }
    }
  }

  /**
   * Handle menu item click - either toggle flyout or select item
   * Uses is-flyout class which is set from static flyoutMenuItemIds list
   */
  function handleMenuItemClick(e, itemEl) {
    const menu = itemEl.closest('.p2p4vsc-menu');
    const menuId = menu?.getAttribute('id');
    
    // Check if item has flyout using is-flyout class (set from static flyoutMenuItemIds)
    // This uses the source of truth: the static list from kFoo constants
    if (itemEl.classList.contains('is-flyout')) {
      // Get flyout menu ID - strip 'flyout-' prefix if present, or use item ID directly
      const itemId = itemEl.id.startsWith('flyout-') ? itemEl.id.substring(7) : itemEl.id;
      const flyoutMenuId = itemId; // Flyout menu ID matches the item ID
      handleFlyoutToggle(e, itemEl, menu, flyoutMenuId);
    } else {
      // Terminal selection - update UI and post message
      if (menu.classList.contains('has-gutter-before')) {
        menu.querySelectorAll('.p2p4vsc-menu-item').forEach(item => {
          item.classList.remove('selected');
        });
        itemEl.classList.add('selected');
      }
      
      postMenuItemSelected(menuId, itemEl.id);
      closeAllMenus();
    }
  }

  // Main event handler - single entry point
  document.addEventListener('click', (e) => {
    // Safety checks
    if (!e || !e.target || !e.target.closest) return;
    
    // Handle menu button clicks
    if (e.target.matches('.p2p4vsc-menu-btn')) {
      handleMenuButtonClick(e);
      return;
    }
    
    // Handle menu item clicks
    const itemEl = e.target.closest('.p2p4vsc-menu-item');
    if (itemEl) {
      handleMenuItemClick(e, itemEl);
      return;
    }
    
    // Click outside any menu - close everything
    closeAllMenus();
  });

uimenu_item: |
  <div class="p2p4vsc-menu-item {{itemClasses}}" id="{{itemId}}"{{flyoutMenuIdRef}}>
    <div class="gutter-before">{{contentGutterBefore}}</div>
    <div class="menu-item-text">{{itemDisplayName}}</div>
    <div class="gutter-after">{{contentGutterAfter}}</div>
    {{flyout}}
  </div>
