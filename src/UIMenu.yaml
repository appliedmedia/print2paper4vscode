ui_menu_html: |
  <div class="p2p4vsc-menu" id="{{MENU_ID}}">
    <button class="p2p4vsc-menu-btn"
            title="{{TITLE}}">{{ICON}}</button>
    <div class="p2p4vsc-menu-items" id="{{MENU_ID}}-items">
      {{MENU_ITEMS}}
    </div>
  </div>

ui_menu_generic_handlers: |
  // Generic handlers for all menus - just pass events to extension
  document.addEventListener('click', (e) => {
    // Handle menu button clicks to show/hide dropdowns
    if (e.target.matches('.p2p4vsc-menu-btn')) {
      e.preventDefault();
      const menu = e.target.closest('.p2p4vsc-menu');
      const menuItems = menu.querySelector('.p2p4vsc-menu-items');

      // Close all other menus first
      document.querySelectorAll('.p2p4vsc-menu-items').forEach(items => {
        if (items !== menuItems) {
          items.style.display = 'none';
        }
      });

      // Toggle this menu
      if (menuItems.style.display === 'block') {
        menuItems.style.display = 'none';
      } else {
        menuItems.style.display = 'block';
      }
      return;
    }

    // Handle menu item clicks
    if (e.target.matches('.p2p4vsc-menu-item')) {
      // Send minimal selection data to extension
      vscode.postMessage({
        type: 'menuItemSelected',
        targetId: e.target.id,
        parentId: e.target.closest('.p2p4vsc-menu')?.getAttribute('id'),
        x: e.clientX,
        y: e.clientY
      });

      // Close the menu after selection
      const menu = e.target.closest('.p2p4vsc-menu');
      const menuItems = menu.querySelector('.p2p4vsc-menu-items');
      menuItems.style.display = 'none';
      return;
    }

    // Close all menus when clicking outside
    if (!e.target.closest('.p2p4vsc-menu')) {
      document.querySelectorAll('.p2p4vsc-menu-items').forEach(items => {
        items.style.display = 'none';
      });
    }
  });

ui_drag_handlers: |
  // Drag state tracking
  let isDragging = false;
  let dragStartX = 0;
  let dragStartLeft = 0;
  let currentToolbarLeft = 8;



  // Drag event handlers
  document.addEventListener('mousedown', (e) => {
    if (e.target.matches('.p2p4vsc-toolbar-grip')) {
      e.preventDefault();
      isDragging = true;
      dragStartX = e.clientX;
      dragStartLeft = currentToolbarLeft;
      document.body.style.cursor = 'grabbing';

      // Notify extension that drag started
      vscode.postMessage({
        type: 'dragStart',
        clientX: e.clientX,
        startLeft: currentToolbarLeft
      });
    }
  });

  document.addEventListener('mousemove', (e) => {
    if (isDragging && e.buttons > 0) { // Check if mouse button is actually down
      e.preventDefault();
      const dx = e.clientX - dragStartX;
      const maxLeft = Math.max(8, window.innerWidth - 200 - 8);
      const newLeft = Math.max(8, Math.min(dragStartLeft + dx, maxLeft));
      currentToolbarLeft = newLeft;

      // Update toolbar position
      const toolbar = document.querySelector('.p2p4vsc-toolbar');
      if (toolbar) {
        toolbar.style.left = newLeft + 'px';
      }
    } else if (isDragging && e.buttons === 0) {
      // Mouse button released but we're still in dragging state - clean up
      isDragging = false;
      document.body.style.cursor = '';
    }
  });

  document.addEventListener('mouseup', (e) => {
    if (isDragging) {
      isDragging = false;
      document.body.style.cursor = '';

      // Notify extension that drag ended
      vscode.postMessage({
        type: 'dragEnd',
        clientX: e.clientX
      });
    }
  });

  // Prevent text selection during drag
  document.addEventListener('selectstart', (e) => {
    if (isDragging) {
      e.preventDefault();
    }
  });

ui_menu_item: |
  <div class="p2p4vsc-menu-item {{ITEM_CLASSES}}" id="{{ITEM_ID}}">
    <span class="item-prefix">{{ITEM_PREFIX}}</span>
    {{ITEM_LABEL}}
    <span class="item-suffix">{{ITEM_SUFFIX}}</span>
  </div>
