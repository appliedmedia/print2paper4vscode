# OSMac.yaml - AppleScript templates for macOS operations
# ⚠️ Keep comments in this file minimal because it has to get copied at runtime. ⚠️

apple_script_print_via_finder: |
  tell application "Finder" to print POSIX file "{{file_path}}"

apple_script_open_preview_print_dialog: |
  tell application "Preview" to open POSIX file "{{file_path}}"
  tell application "Preview" to activate
  tell application "System Events" to keystroke "p" using command down
