# PaperPrinter.yaml - SVG icons and templates for PaperPrinter

icon_orient_portrait_svg: |
  <svg width="32" height="32" viewBox="0 0 32 32" aria-hidden="true" focusable="false" style="display: inline-block; vertical-align: middle; margin-right: 4px;">
    <!-- Tall box for portrait orientation - 50% wider -->
    <rect x="4" y="2" width="24" height="28" fill="none" stroke="currentColor" stroke-width="2"/>
    <!-- Portrait stick figure (tall) - centered in box -->
    <!-- Head (oval) -->
    <ellipse cx="16" cy="8" rx="2" ry="2.5" fill="none" stroke="currentColor" stroke-width="1"/>
    <!-- Neck -->
    <line x1="16" y1="10.5" x2="16" y2="12" stroke="currentColor" stroke-width="1"/>
    <!-- Shoulders/arms -->
    <line x1="13" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="1"/>
    <!-- Arms with hands -->
    <line x1="13" y1="12" x2="11" y2="14" stroke="currentColor" stroke-width="1"/>
    <ellipse cx="11" cy="14" rx="1" ry="0.8" fill="currentColor"/>
    <line x1="19" y1="12" x2="21" y2="14" stroke="currentColor" stroke-width="1"/>
    <ellipse cx="21" cy="14" rx="1" ry="0.8" fill="currentColor"/>
    <!-- Torso -->
    <line x1="16" y1="12" x2="16" y2="18" stroke="currentColor" stroke-width="1"/>
  </svg>

icon_orient_landscape_svg: |
  <svg width="32" height="32" viewBox="0 0 32 32" aria-hidden="true" focusable="false" style="display: inline-block; vertical-align: middle; margin-right: 4px;">
    <!-- Wide box for landscape orientation - same width as before -->
    <rect x="2" y="6" width="28" height="20" fill="none" stroke="currentColor" stroke-width="2"/>
    <!-- Stick figure (same size as portrait) - centered in box -->
    <!-- Head (oval) -->
    <ellipse cx="16" cy="10" rx="2" ry="2.5" fill="none" stroke="currentColor" stroke-width="1"/>
    <!-- Neck -->
    <line x1="16" y1="12.5" x2="16" y2="14" stroke="currentColor" stroke-width="1"/>
    <!-- Shoulders/arms -->
    <line x1="13" y1="14" x2="19" y2="14" stroke="currentColor" stroke-width="1"/>
    <!-- Arms with hands -->
    <line x1="13" y1="14" x2="11" y2="16" stroke="currentColor" stroke-width="1"/>
    <ellipse cx="11" cy="16" rx="1" ry="0.8" fill="currentColor"/>
    <line x1="19" y1="14" x2="21" y2="16" stroke="currentColor" stroke-width="1"/>
    <ellipse cx="21" cy="16" rx="1" ry="0.8" fill="currentColor"/>
    <!-- Torso -->
    <line x1="16" y1="14" x2="16" y2="20" stroke="currentColor" stroke-width="1"/>
  </svg>

