# PaperPrinter.yaml - SVG icons and templates for PaperPrinter
# ⚠️ Keep comments in this file minimal because it has to get copied at runtime. ⚠️

icon_box_portrait_svg: |
  <rect x="4" y="2" width="24" height="28" fill="none" stroke="currentColor" stroke-width="2"/>

icon_orient_figure_svg: |
  <!-- Head (oval) -->
  <ellipse cx="16" cy="11" rx="2" ry="2.5" fill="none" stroke="currentColor" stroke-width="1"/>
  <line x1="16" y1="13.5" x2="16" y2="15" stroke="currentColor" stroke-width="1"/>
  <line x1="13" y1="15" x2="19" y2="15" stroke="currentColor" stroke-width="1"/>
  <line x1="13" y1="15" x2="11" y2="17" stroke="currentColor" stroke-width="1"/>
  <ellipse cx="11" cy="17" rx="1" ry="0.8" fill="currentColor"/>
  <line x1="19" y1="15" x2="21" y2="17" stroke="currentColor" stroke-width="1"/>
  <ellipse cx="21" cy="17" rx="1" ry="0.8" fill="currentColor"/>
  <line x1="16" y1="15" x2="16" y2="21" stroke="currentColor" stroke-width="1"/>

icon_orient_portrait_svg: |
  <svg width="32" height="32" viewBox="0 0 32 32" aria-hidden="true" focusable="false" style="display: inline-block; vertical-align: middle; margin-right: 4px;">
    {{icon_box_portrait_svg}}
    {{icon_orient_figure_svg}}
  </svg>

icon_orient_landscape_svg: |
  <svg width="32" height="32" viewBox="0 0 32 32" aria-hidden="true" focusable="false" style="display: inline-block; vertical-align: middle; margin-right: 4px;">
    <rect x="2" y="6" width="28" height="20" fill="none" stroke="currentColor" stroke-width="2"/>
    <g transform="translate(0, 2)">
      {{icon_orient_figure_svg}}
    </g>
  </svg>

