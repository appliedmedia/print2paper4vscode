# PaperPrinter.yaml - SVG icons and templates for PaperPrinter

icon_orient_portrait_svg: |
  <svg width="16" height="16" viewBox="0 0 16 16" aria-hidden="true" focusable="false" style="display: inline-block; vertical-align: middle; margin-right: 4px;">
    <!-- Portrait stick figure (tall) -->
    <!-- Head (oval) -->
    <ellipse cx="8" cy="3" rx="2" ry="2.5" fill="none" stroke="currentColor" stroke-width="1"/>
    <!-- Neck -->
    <line x1="8" y1="5.5" x2="8" y2="7" stroke="currentColor" stroke-width="1"/>
    <!-- Shoulders/arms -->
    <line x1="5" y1="7" x2="11" y2="7" stroke="currentColor" stroke-width="1"/>
    <!-- Arms with hands -->
    <line x1="5" y1="7" x2="3" y2="9" stroke="currentColor" stroke-width="1"/>
    <ellipse cx="3" cy="9" rx="1" ry="0.8" fill="currentColor"/>
    <line x1="11" y1="7" x2="13" y2="9" stroke="currentColor" stroke-width="1"/>
    <ellipse cx="13" cy="9" rx="1" ry="0.8" fill="currentColor"/>
    <!-- Start of torso -->
    <line x1="8" y1="7" x2="8" y2="11" stroke="currentColor" stroke-width="1"/>
  </svg>

icon_orient_landscape_svg: |
  <svg width="16" height="16" viewBox="0 0 16 16" aria-hidden="true" focusable="false" style="display: inline-block; vertical-align: middle; margin-right: 4px;">
    <!-- Landscape stick figure (wide) -->
    <!-- Head (oval) -->
    <ellipse cx="8" cy="4" rx="2.5" ry="2" fill="none" stroke="currentColor" stroke-width="1"/>
    <!-- Neck -->
    <line x1="8" y1="6" x2="8" y2="7.5" stroke="currentColor" stroke-width="1"/>
    <!-- Shoulders/arms (wider) -->
    <line x1="4" y1="7.5" x2="12" y2="7.5" stroke="currentColor" stroke-width="1"/>
    <!-- Arms with hands -->
    <line x1="4" y1="7.5" x2="2" y2="9" stroke="currentColor" stroke-width="1"/>
    <ellipse cx="2" cy="9" rx="1" ry="0.8" fill="currentColor"/>
    <line x1="12" y1="7.5" x2="14" y2="9" stroke="currentColor" stroke-width="1"/>
    <ellipse cx="14" cy="9" rx="1" ry="0.8" fill="currentColor"/>
    <!-- Start of torso -->
    <line x1="8" y1="7.5" x2="8" y2="11" stroke="currentColor" stroke-width="1"/>
  </svg>

icon_margin_none_svg: |
  <svg width="16" height="16" viewBox="0 0 16 16" aria-hidden="true" focusable="false" style="display: inline-block; vertical-align: middle; margin-right: 4px;">
    <!-- No margins - content edge-to-edge -->
    <rect x="1" y="1" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"/>
  </svg>

icon_margin_minimal_svg: |
  <svg width="16" height="16" viewBox="0 0 16 16" aria-hidden="true" focusable="false" style="display: inline-block; vertical-align: middle; margin-right: 4px;">
    <!-- Thin margins -->
    <rect x="2" y="2" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1"/>
  </svg>

icon_margin_normal_svg: |
  <svg width="16" height="16" viewBox="0 0 16 16" aria-hidden="true" focusable="false" style="display: inline-block; vertical-align: middle; margin-right: 4px;">
    <!-- Standard margins -->
    <rect x="3" y="3" width="10" height="10" fill="none" stroke="currentColor" stroke-width="1.5"/>
  </svg>

icon_margin_wide_svg: |
  <svg width="16" height="16" viewBox="0 0 16 16" aria-hidden="true" focusable="false" style="display: inline-block; vertical-align: middle; margin-right: 4px;">
    <!-- Generous margins -->
    <rect x="4" y="4" width="8" height="8" fill="none" stroke="currentColor" stroke-width="2"/>
  </svg>
