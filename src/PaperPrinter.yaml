    {{icon_box_portrait_svg}}
    <line x1="8" y1="8" x2="24" y2="8" stroke="currentColor" stroke-width="1"/>
    <line x1="8" y1="12" x2="24" y2="12" stroke="currentColor" stroke-width="1"/>
    <line x1="8" y1="16" x2="24" y2="16" stroke="currentColor" stroke-width="1"/>
    <line x1="8" y1="20" x2="24" y2="20" stroke="currentColor" stroke-width="1"/>
    <line x1="8" y1="24" x2="24" y2="24" stroke="currentColor" stroke-width="1"/>
  </svg>

icon_margin_normal_svg: |
  <svg width="32" height="32" viewBox="0 0 32 32" aria-hidden="true" focusable="false" style="display: inline-block; vertical-align: middle; margin-right: 4px;">
    {{icon_box_portrait_svg}}
    <line x1="10" y1="10" x2="22" y2="10" stroke="currentColor" stroke-width="1"/>
    <line x1="10" y1="14" x2="22" y2="14" stroke="currentColor" stroke-width="1"/>
    <line x1="10" y1="18" x2="22" y2="18" stroke="currentColor" stroke-width="1"/>
    <line x1="10" y1="22" x2="22" y2="22" stroke="currentColor" stroke-width="1"/>
