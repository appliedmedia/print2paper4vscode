  <svg width="32" height="32" viewBox="0 0 32 32" aria-hidden="true" focusable="false" style="display: inline-block; vertical-align: middle; margin-right: 4px;">
    {{icon_box_portrait_svg}}
    <line x1="5" y1="5" x2="27" y2="5" stroke="currentColor" stroke-width="1"/>
    <line x1="5" y1="9" x2="27" y2="9" stroke="currentColor" stroke-width="1"/>
    <line x1="5" y1="13" x2="27" y2="13" stroke="currentColor" stroke-width="1"/>
    <line x1="5" y1="17" x2="27" y2="17" stroke="currentColor" stroke-width="1"/>
    <line x1="5" y1="21" x2="27" y2="21" stroke="currentColor" stroke-width="1"/>
    <line x1="5" y1="25" x2="27" y2="25" stroke="currentColor" stroke-width="1"/>
  </svg>

icon_margin_minimal_svg: |
