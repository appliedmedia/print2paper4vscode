icon_margin_wide_svg: |
  <svg width="32" height="32" viewBox="0 0 32 32" aria-hidden="true" focusable="false" style="display: inline-block; vertical-align: middle; margin-right: 4px;">
    {{icon_box_portrait_svg}}
    <line x1="12" y1="12" x2="20" y2="12" stroke="currentColor" stroke-width="1"/>
    <line x1="12" y1="16" x2="20" y2="16" stroke="currentColor" stroke-width="1"/>
    <line x1="12" y1="20" x2="20" y2="20" stroke="currentColor" stroke-width="1"/>
  </svg>
