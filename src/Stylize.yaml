# Stylize.yaml - Syntax highlighting preview templates
# ⚠️ Keep comments in this file minimal because it has to get copied at runtime. ⚠️

stylize_html: |
  <!DOCTYPE html>
  <html>
    <head>
      <meta charset="utf-8">
      <meta name="color-scheme" content="light dark">
      <style>
        body { 
          margin: 24px;
          font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace; 
        }
        /* Collapse whitespace between .line nodes, preserve spaces within each line */
        pre { 
          white-space: pre; 
          word-wrap: normal; 
          margin: 0; 
        }
        code { 
          font-size: {{fontSizePx}}px; 
          display: block; 
          margin: 0; 
          white-space: normal; 
        }
        pre.shiki code { 
          line-height: {{lineHeightPx}}px; 
        }
        pre.shiki .line { 
          display: block; 
          line-height: {{lineHeightPx}}px; 
          min-height: {{lineHeightPx}}px; 
          margin: 0; 
          padding: 0; 
          white-space: pre; 
        }
      </style>
      <title>{{varTitle}}</title>
    </head>
    <body>
      {{code}}
    </body>
  </html>

stylize_token_pre: |
  <pre style="font-size: {{fontSize}}px; line-height: {{lineHeight}}px; margin: 0; white-space: pre;">{{lines}}</pre>

stylize_token_line: |
  <div class="line" style="line-height: {{lineHeight}}px; min-height: {{lineHeight}}px; margin: 0; padding: 0; white-space: pre;">{{tokens}}</div>

stylize_token_span: |
  <span style="{{style}}">{{text}}</span>
