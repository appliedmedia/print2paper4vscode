webview_html: |
  <!DOCTYPE html>
  <html>
  <head>
    <title>{{title}}</title>
    <style>
      {{base_css}}
      {{webview_css}}
    </style>
  </head>
  <body>
    {{toolbar}}
    <div class="pdfviewer-container">
      <div id="loading" style="display: block; text-align: center; padding: 50px;">
        Loading PDF...
      </div>
      <div id="error" style="display: none; text-align: center; padding: 50px; color: red;">
        Error loading PDF
      </div>
      <div id="pdf-viewer" style="display: none;">
        <!-- PDF pages will be rendered here by PDF.js -->
      </div>
      <div id="pdf-zoom-controls" class="pdf-zoom-controls" style="display: none;">
        <button id="zoom-out" class="zoom-btn" title="Zoom Out (Ctrl/Cmd + -)" aria-label="Zoom Out">−</button>
        <span id="zoom-level" class="zoom-level">100%</span>
        <button id="zoom-in" class="zoom-btn" title="Zoom In (Ctrl/Cmd + +)" aria-label="Zoom In">+</button>
        <button id="zoom-fit-width" class="zoom-btn" title="Fit Width" aria-label="Fit Width">↔</button>
        <button id="zoom-fit-page" class="zoom-btn" title="Fit Page" aria-label="Fit Page">⤢</button>
        <button id="zoom-actual-size" class="zoom-btn" title="Actual Size (Ctrl/Cmd + 0)" aria-label="Actual Size">1:1</button>
      </div>
    </div>
    <script>
      {{pdfjs_library}}
    </script>
    <script>
      {{webview_js}}
      
      // Initialize PDF viewer with embedded PDF data
      initPdfViewer('{{pdf_data_url}}', {{page_total}});
    </script>
  </body>
  </html>

webview_css: |
  .pdfviewer-container {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: auto;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
  }

  #pdf-viewer {
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: center;
  }

  #pdf-viewer canvas {
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    border: 1px solid #ddd;
    background: white;
    margin-left: var(--page-gutter-horizontal, 8px);
    margin-right: var(--page-gutter-horizontal, 8px);
    margin-bottom: var(--page-gutter-vertical, 4px);
  }
  
  :root {
    --page-gutter-horizontal: 8px;
    --page-gutter-vertical: 4px;
  }

  .pdf-zoom-controls {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    align-items: center;
    gap: 4px;
    background: rgba(255, 255, 255, 0.95);
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 6px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    z-index: 1000;
  }

  .zoom-btn {
    background: #f7f7f7;
    border: 1px solid #d0d0d0;
    border-radius: 4px;
    cursor: pointer;
    width: 32px;
    height: 32px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    line-height: 1;
    padding: 0;
    color: #333;
  }

  .zoom-btn:hover {
    background: #e8e8e8;
  }

  .zoom-btn:active {
    background: #d0d0d0;
  }

  .zoom-level {
    min-width: 50px;
    text-align: center;
    font-size: 12px;
    font-weight: 500;
    color: #333;
    padding: 0 8px;
  }

webview_js: |
  // PDF Viewer JavaScript - Minimal skeleton for PDF.js to render into
  
  // Send diagnostic message to extension
  function dx(message) {
    if (window.vscode) {
      window.vscode.postMessage({
        type: 'dx',
        message
      });
    }
  }
  
  let pdfDoc = null;
  let currentScale = {{pdf_zoom_level}} || 1.0; // Dynamic zoom level from persistence
  let pageWidthPx = {{page_width_px}} || 0;
  let pageHeightPx = {{page_height_px}} || 0;
  
  // Zoom constants
  const ZOOM_MIN = 0.25;
  const ZOOM_MAX = 3.0;
  const ZOOM_STEP = 0.1;
  
  // Use existing vscode API from toolbar (or create if not available)
  const vscode = window.vscode || (typeof acquireVsCodeApi !== 'undefined' ? acquireVsCodeApi() : null);
  
  // Listen for zoom messages from extension
  if (vscode) {
    window.addEventListener('message', event => {
      const message = event.data;
      if (message.type === 'zoom') {
        if (message.zoomLevel !== undefined) {
          setZoom(message.zoomLevel);
        } else if (message.zoomAction) {
          handleZoomAction(message.zoomAction);
        }
      }
    });
  }

  /**
   * Initialize PDF viewer with PDF data
   * @param {string} pdfDataUrl - Base64 data URL of the PDF
   * @param {number} pageTotal - Total number of pages
   */
  function initPdfViewer(pdfDataUrl, pageTotal) {

    if (typeof pdfjsLib === 'undefined') {
      dx('❌ PDF.js library not loaded');
      onDocumentLoadError(new Error('PDF.js library not loaded'));
      return;
    }

    // Set worker source
    pdfjsLib.GlobalWorkerOptions.workerSrc = '{{as_uri:src/lib/pdf.worker.min.js}}';

    // Load PDF document
    const loadingTask = pdfjsLib.getDocument({
      url: pdfDataUrl
    });

    loadingTask.promise.then(
      function(pdf) {
        onDocumentLoadSuccess(pdf);
      },
      function(error) {
        onDocumentLoadError(error);
      }
    );
  }

  /**
   * Handle successful PDF document load
   */
  function onDocumentLoadSuccess(pdf) {
    pdfDoc = pdf;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('pdf-viewer').style.display = 'block';
    document.getElementById('pdf-zoom-controls').style.display = 'flex';
    
    // Get first page dimensions for fit calculations
    pdf.getPage(1).then(function(page) {
      const viewport = page.getViewport({ scale: 1.0 });
      pageWidthPx = viewport.width;
      pageHeightPx = viewport.height;
      
      // Initialize zoom controls
      initZoomControls();
      
      // Update zoom level display to match current scale
      const zoomLevelEl = document.getElementById('zoom-level');
      if (zoomLevelEl) {
        zoomLevelEl.textContent = Math.round(currentScale * 100) + '%';
      }
      
      // Render all pages with initial zoom level
      renderAllPages();
    }).catch(function(error) {
      dx(`❌ Error getting page dimensions: ${error.message}`);
      renderAllPages();
    });
  }
  
  /**
   * Initialize zoom control buttons and keyboard shortcuts
   */
  function initZoomControls() {
    // Zoom buttons
    document.getElementById('zoom-in').addEventListener('click', () => handleZoomAction('in'));
    document.getElementById('zoom-out').addEventListener('click', () => handleZoomAction('out'));
    document.getElementById('zoom-fit-width').addEventListener('click', () => handleZoomAction('fitWidth'));
    document.getElementById('zoom-fit-page').addEventListener('click', () => handleZoomAction('fitPage'));
    document.getElementById('zoom-actual-size').addEventListener('click', () => handleZoomAction('actualSize'));
    
    // Keyboard shortcuts
    document.addEventListener('keydown', function(e) {
      // Check for Cmd/Ctrl modifier
      const isModifier = e.metaKey || e.ctrlKey;
      
      if (isModifier) {
        if (e.key === '=' || e.key === '+') {
          e.preventDefault();
          handleZoomAction('in');
        } else if (e.key === '-' || e.key === '_') {
          e.preventDefault();
          handleZoomAction('out');
        } else if (e.key === '0') {
          e.preventDefault();
          handleZoomAction('actualSize');
        }
      }
    });
  }
  
  /**
   * Handle zoom actions
   */
  function handleZoomAction(action) {
    let newScale = currentScale;
    
    switch (action) {
      case 'in':
        newScale = Math.min(currentScale + ZOOM_STEP, ZOOM_MAX);
        break;
      case 'out':
        newScale = Math.max(currentScale - ZOOM_STEP, ZOOM_MIN);
        break;
      case 'fitWidth':
        if (pageWidthPx > 0) {
          const containerWidth = window.innerWidth - 40; // Account for padding
          newScale = containerWidth / pageWidthPx;
        }
        break;
      case 'fitPage':
        if (pageWidthPx > 0 && pageHeightPx > 0) {
          const containerWidth = window.innerWidth - 40;
          const containerHeight = window.innerHeight - 120; // Account for toolbar and padding
          const scaleX = containerWidth / pageWidthPx;
          const scaleY = containerHeight / pageHeightPx;
          newScale = Math.min(scaleX, scaleY);
        }
        break;
      case 'actualSize':
        newScale = 1.0;
        break;
    }
    
    setZoom(newScale);
  }
  
  /**
   * Set zoom level and re-render pages
   */
  function setZoom(scale) {
    // Clamp scale to valid range
    currentScale = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, scale));
    
    // Update zoom level display
    const zoomLevelEl = document.getElementById('zoom-level');
    if (zoomLevelEl) {
      zoomLevelEl.textContent = Math.round(currentScale * 100) + '%';
    }
    
    // Save zoom level to extension
    if (vscode) {
      vscode.postMessage({
        type: 'zoom',
        zoomLevel: currentScale
      });
    }
    
    // Re-render all pages with new scale
    renderAllPages();
  }

  /**
   * Handle PDF document load error
   */
  function onDocumentLoadError(error) {
    dx(`❌ PDF load error: ${error.message}`);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = 'Error loading PDF: ' + error.message;
  }

  /**
   * Render all pages in the PDF - just create canvases and let PDF.js render
   */
  function renderAllPages() {
    if (!pdfDoc) return;

    const viewer = document.getElementById('pdf-viewer');
    viewer.innerHTML = ''; // Clear existing content

    // Render each page as a separate canvas
    for (let pageNum = 1; pageNum <= pdfDoc.numPages; pageNum++) {
      renderPage(pageNum, viewer);
    }
  }

  /**
   * Render a single page - PDF.js does all the work
   */
  function renderPage(pageNum, container) {
    pdfDoc.getPage(pageNum).then(function(page) {
      const viewport = page.getViewport({ scale: currentScale });
      
      // Create canvas for this page
      const canvas = document.createElement('canvas');
      canvas.id = 'pdf-canvas-' + pageNum;
      const ctx = canvas.getContext('2d');
      if (!ctx) {
        dx('❌ 2D canvas context not available');
        return;
      }

      canvas.height = viewport.height;
      canvas.width = viewport.width;

      const renderContext = {
        canvasContext: ctx,
        viewport: viewport
      };
      
      const renderTask = page.render(renderContext);

      renderTask.promise.then(function() {
        container.appendChild(canvas);
      });
    }).catch(function(error) {
      dx(`❌ Error rendering page ${pageNum}: ${error.message}`);
    });
  }
