# UIScrollView templates for the Print2Paper extension

scroll_css: |
  /* Scrollable viewer styles */
  .scrollable-viewer {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: auto;
    background: #f5f5f5;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  .scrollable-content {
    position: relative;
    width: 100%;
    min-height: 100%;
    padding: 20px;
  }

  .page-container {
    position: relative;
    margin: 0 auto 20px auto;
    background: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    border-radius: 4px;
    overflow: hidden;
    max-width: 100%;
    width: 100%;
  }

  .page-canvas {
    display: block;
    width: 100%;
    height: auto;
    max-width: 100%;
  }

  .page-placeholder {
    position: relative;
    background: #f8f9fa;
    border: 2px dashed #dee2e6;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #6c757d;
    font-size: 14px;
    min-height: 200px;
    margin: 0 auto 20px auto;
  }


  .page-placeholder.loading {
    background: #e3f2fd;
    border-color: #2196f3;
    color: #1976d2;
  }

  .page-placeholder.error {
    background: #ffebee;
    border-color: #f44336;
    color: #d32f2f;
  }

  .page-label {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 4px 8px;
    border-radius: 3px;
    font-size: 12px;
    font-weight: 500;
  }

  .loading-text {
    text-align: center;
    padding: 20px;
  }

  .error-text {
    text-align: center;
    padding: 20px;
    color: #d32f2f;
  }

  /* Performance indicators */
  .performance-info {
    position: fixed;
    top: 10px;
    right: 10px;
    background: rgba(0,0,0,0.8);
    color: white;
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 11px;
    font-family: monospace;
    z-index: 1000;
    opacity: 0.7;
  }

  .performance-info.hidden {
    display: none;
  }

  /* Canvas buffer container */
  .canvas-buffer-container {
    position: absolute;
    top: -9999px;
    left: -9999px;
    visibility: hidden;
  }

  /* Scroll performance optimizations */
  .scrollable-viewer.smooth-scroll {
    scroll-behavior: smooth;
  }

  .scrollable-viewer.performance-mode {
    will-change: scroll-position;
  }

scroll_html: |
  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <style>
      {{baseCss}}
      {{scrollCss}}
    </style>
    <script>
      {{pdfjsLibrary}}
    </script>
  </head>
  <body>
    <div class="scrollable-viewer" id="scrollable-viewer">
      <div class="scrollable-content" id="scrollable-content">
        <!-- Pages will be dynamically inserted here -->
      </div>
      
      <!-- Canvas buffer container -->
      <div class="canvas-buffer-container" id="canvas-buffer-container">
        <!-- Canvas buffer elements will be managed here -->
      </div>
    </div>

    <!-- Performance indicators -->
    <div class="performance-info" id="performance-info">
      <div>Pages: <span id="page-count">0</span>/<span id="page-total">{{pageTotal}}</span> | Canvases: <span id="canvas-count">0</span>/<span id="canvas-buffers-size">{{canvasBuffersSize}}</span></div>
      <div><span id="canvas-assignments">cb1:pg0 cb2:pg0 cb3:pg0 cb4:pg0 cb5:pg0 cb6:pg0</span></div>
    </div>


    <!-- Toolbar integration -->
    {{toolbar}}

    <script>
      {{scrollJs}}
    </script>
  </body>
  </html>

scroll_js: |
  // Scrollable Viewer Implementation
  (function() {
    'use strict';

    try {
      // Send diagnostic message early (before everything else)
      function dx(message) {
        if (window.vscode) {
          window.vscode.postMessage({
            type: 'dx',
            message
          });
        }
      }

    // Initialize PDF.js
    if (typeof pdfjsLib !== 'undefined') {
      pdfjsLib.GlobalWorkerOptions.workerSrc = '{{as_uri:src/lib/pdf.worker.min.js}}';
    } else {
      dx('ERROR: PDF.js library not loaded!');
    }

    // Configuration from template (static values only)
    const kConfig = {
      canvasBuffersSize: {{canvasBuffersSize}},
      scale: 1.0,
      pageGap: 20,
      debug: false, // Set to true for debugging
    };

    // Calculated values derived from kConfig
    // Center visible page is always rendered, split remaining buffers 60/40
    const remainingBuffers = kConfig.canvasBuffersSize - 1; // Subtract 1 for center visible page
    const bufferSize_trailing = Math.floor(remainingBuffers * 0.4); // 40% opposite scroll direction
    const bufferSize_leading = remainingBuffers - bufferSize_trailing; // Remainder toward scroll direction

    // Database state management (POC approach - simple object)
    const db = {
      // Canvas buffers: db.cb1 = { pg: 'pg5', status: 'render', domElementRef, renderTask }
      // Pages: db.pg5 = { cb: 'cb1', placeholder, wrapper, label }
      // Canvas buffers (cb1...cb6) and pages (pg1...pgN) will be added dynamically
      pdfDoc: null, // Single PDF.js document (canonical source for pageTotal via .numPages)
      initialPageTotal: {{pageTotal}}, // Initial page count before PDF loads
      lastScrollTop: -999,
      scrollDirection: 'down',
      isScrolling: false,
      
      // Performance tracking
      renderStartTime: 0,
      renderCount: 0,
      perfUpdateCounter: 0
    };

    // Helper: Get page total from PDF or initial value
    function getPageTotal() {
      return db.pdfDoc ? db.pdfDoc.numPages : db.initialPageTotal;
    }

    // DOM elements
    const viewer = document.getElementById('scrollable-viewer');
    const content = document.getElementById('scrollable-content');
    const canvasBufferContainer = document.getElementById('canvas-buffer-container');
    const performanceInfo = document.getElementById('performance-info');

    // ID constants for unassigned/reset state
    const kPageId_Reset = 0;
    const kCanvasId_Reset = 0;

    // Canvas buffer status constants
    const kCBStatus_Ready = 'ready';
    const kCBStatus_Requesting = 'requesting';
    const kCBStatus_Assigned = 'assigned';
    const kCBStatus_Clearing = 'clearing';
    const kCBStatus_Failed = 'failed';

    const kCBStatus = {
      [kCBStatus_Ready]: '.',
      [kCBStatus_Requesting]: '❓',
      [kCBStatus_Assigned]: ':',
      [kCBStatus_Clearing]: '❌',
      [kCBStatus_Failed]: '☠️'
    };

    // Helper functions for canvas↔page management (POC approach)

    // Assign canvas to page (bidirectional)
    function assignCanvasToPage(cbId, pgId) {
      // Clear old assignments from BOTH directions
      const oldPgId = db[cbId]?.pg;
      if (db[oldPgId]) {
        db[oldPgId].cb = canvasId(kCanvasId_Reset);
      }

      const oldCbId = db[pgId]?.cb;
      if (db[oldCbId]) {
        db[oldCbId].pg = pageId(kPageId_Reset);
        db[oldCbId].status = kCBStatus_Ready;
      }

      // Set new assignment
      db[cbId].pg = pgId;
      db[cbId].status = kCBStatus_Requesting;

      if (!db[pgId]) {
        db[pgId] = {};
      }
      db[pgId].cb = cbId;

      updateHud();
    }

    // Unassign canvas (clear both directions)
    function unassignCanvas(cbId) {
      if (!cbId || !db[cbId]) return; // Robust: handle cb0 or invalid canvas
      
      const oldPgId = db[cbId].pg;
      if (!oldPgId || oldPgId === pageId(kPageId_Reset)) return; // Already unassigned
      
      // Set clearing status
      db[cbId].status = kCBStatus_Clearing;
      updateHud();
      
      const pageNum = pageNumber(oldPgId);
      
      // Clear canvas and move to pool
      const canvas = db[cbId].domElementRef;
      if (canvas) {
        // Clear canvas pixels
        const ctx = canvas.getContext('2d');
        if (ctx) {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
        
        // Move back to buffer container
        if (canvas.parentElement) {
          canvasBufferContainer.appendChild(canvas);
        }
      }
      
      // Clear bidirectional link
      if (db[oldPgId]) {
        db[oldPgId].cb = null;
        
        // Reset placeholder to loading state
        const placeholder = db[oldPgId].domElementRef;
        if (placeholder) {
          placeholder.className = 'page-placeholder loading';
          placeholder.innerHTML = `
            <div class="page-label">Page ${pageNum}</div>
          `;
        }
      }

      // Clear canvas assignment
      db[cbId].pg = pageId(kPageId_Reset);
      db[cbId].status = kCBStatus_Ready;

      updateHud();
    }

    // Get available canvas
    function getAvailableCanvas() {
      // First try available canvases
      const availableIds = getAllAvailableCanvasIds();
      if (availableIds.length > 0) {
        return db[availableIds[0]].domElementRef;
      }


      return null;
    }

    // Helper: Get all canvas IDs
    function getAllCanvasIds() {
      return Object.keys(db).filter(k => k.startsWith('cb'));
    }

    // Helper: Get available canvas IDs
    function getAllAvailableCanvasIds() {
      return getAllCanvasIds().filter(cbId => db[cbId].status === kCBStatus_Ready);
    }


    // Helper: Get all page IDs
    function getAllPageIds() {
      return Object.keys(db).filter(k => k.startsWith('pg'));
    }

    // ID generation helpers - centralized for easy maintenance
    function pageId(pageNumber) {
      return `pg${pageNumber}`;
    }

    function canvasId(canvasNumber) {
      return `cb${canvasNumber}`;
    }

    // Parse canvas index from canvas ID (robust version using data-index)
    function canvasIndex(cbId) {
      const canvas = db[cbId] && db[cbId].domElementRef;
      if (canvas && canvas.dataset.index) {
        return parseInt(canvas.dataset.index);
      }
      // Fallback to ID parsing if data-index not available
      return parseInt(cbId.replace('cb', ''));
    }

    // Parse page number from page ID (robust version using data-index)
    function pageNumber(pgId) {
      const placeholder = db[pgId]?.domElementRef;
      if (placeholder && placeholder.dataset.index) {
        return parseInt(placeholder.dataset.index);
      }
      // Fallback to ID parsing if data-index not available
      return parseInt(pgId.replace('pg', ''));
    }

    // Simple HUD display - just gather and return data for display
    function hud() {
      // Canvas assignments (cb1, cb2, cb3, cb4, cb5, cb6)
      const canvasLine = [];
      for (let i = 1; i <= kConfig.canvasBuffersSize; i++) {
        const cbId = canvasId(i);
        const cb = db[cbId];
        const statusChar = kCBStatus[cb.status];
        const pgId = cb.pg;
        canvasLine.push(`${cbId}${statusChar}${pgId}`);
      }
      return canvasLine.join(' ');
    }

    // Update HUD display
    function updateHud() {
      const hudElement = document.getElementById('canvas-assignments');
      const hudText = hud();
      if (hudElement) {
        hudElement.textContent = hudText;
      }
      dx(hudText);
    }

    // Initialize the scrollable viewer
    function initScrollableViewer() {
      // Set up canvas buffers
      createCanvasBuffers();
      
      // Initial HUD display
      updateHud();
      
      // Create page placeholders
      configurePlaceholders(0, getPageTotal());
      
      // Set up scroll handling
      setupScrollHandling();
      
      // Set up performance monitoring
      setupPerformanceMonitoring();
      
      // Initial render
      handleScroll();
    }

    // Create canvas buffers
    function createCanvasBuffers() {
      for (let i = 1; i <= kConfig.canvasBuffersSize; i++) {
        const canvas = document.createElement('canvas');
        canvas.id = `canvas-${i}`;
        canvas.className = 'page-canvas';
        canvas.dataset.index = i; // Store canvas index for robust access
        canvasBufferContainer.appendChild(canvas);

        // Store in db with cb prefix
        db[canvasId(i)] = {
          pg: pageId(kPageId_Reset),
          status: kCBStatus_Ready,
          domElementRef: canvas,
          renderTask: null,
        };
      }
    }

    // Configure page placeholders
    function configurePlaceholders(fromPageTotal, toPageTotal) {
      if (toPageTotal === undefined) {
        toPageTotal = fromPageTotal;
      }
      
      const content = document.getElementById('scrollable-content');
      if (!content) return;
      
      if (toPageTotal < fromPageTotal) {
        // Fewer pages - hide the extra ones
        for (let i = toPageTotal + 1; i <= fromPageTotal; i++) {
          const pgId = pageId(i);
          const placeholder = db[pgId]?.domElementRef;
          if (placeholder) {
            placeholder.style.display = 'none';
          }
        }
      } else if (toPageTotal > fromPageTotal) {
        // More pages - create the new ones
        for (let i = fromPageTotal + 1; i <= toPageTotal; i++) {
          const placeholder = document.createElement('div');
          const pgId = pageId(i);
          placeholder.id = pgId;
          placeholder.className = 'page-placeholder loading';
          placeholder.style.width = '{{pageWidthPx}}px';
          placeholder.style.height = '{{pageHeightPx}}px';
          placeholder.innerHTML = `
            <div class="page-label">Page ${i}</div>
          `;
          content.appendChild(placeholder);

          // Store in db with pg prefix
          if (!db[pgId]) db[pgId] = {};
          db[pgId].domElementRef = placeholder;
          db[pgId].cb = canvasId(kCanvasId_Reset); // No canvas assigned yet
        }
      }
      
      // Reset existing pages (only if they don't have canvases assigned)
      for (let i = 1; i <= Math.min(fromPageTotal, toPageTotal); i++) {
        const pgId = pageId(i);
        const placeholder = db[pgId]?.domElementRef;
        if (placeholder) {
          placeholder.style.display = 'block';
          // Only reset HTML if no canvas is assigned
          const cbId = db[pgId]?.cb;
          if (!db[cbId]?.status || db[cbId].status === kCBStatus_Ready) {
            placeholder.className = 'page-placeholder loading';
            placeholder.innerHTML = `
              <div class="page-label">Page ${i}</div>
            `;
          }
        }
      }
      
    }

    // Set up scroll handling with RAF-based throttling
    function setupScrollHandling() {
      let rafPending = false;
      
      viewer.addEventListener('scroll', () => {
        if (rafPending) return; // One request per frame
        
        rafPending = true;
        requestAnimationFrame(() => {
          handleScroll();
          rafPending = false;
        });
      });
    }

    // Handle scroll events
    function handleScroll() {
      const scrollTop = viewer.scrollTop;
      
      // Only process if scroll position actually changed significantly
      const scrollDelta = Math.abs(scrollTop - db.lastScrollTop);
      if (scrollDelta < 10) {
        return; // Ignore small scroll changes
      }
      
      // Update scroll direction
      if (scrollTop > db.lastScrollTop) {
        db.scrollDirection = 'down';
      } else if (scrollTop < db.lastScrollTop) {
        db.scrollDirection = 'up';
      }
      db.lastScrollTop = scrollTop;
      
      // Get visible page range and assign canvases
      const visibleRange = getVisiblePageRange();
      assignCanvasesToPages(visibleRange);
      
      // Update performance info every 10th call
      db.perfUpdateCounter++;
      if (db.perfUpdateCounter >= 10) {
        db.perfUpdateCounter = 0;
        updatePerformanceInfo();
      }
    }

    // Get visible page range
    function getVisiblePageRange() {
      const scrollTop = viewer.scrollTop;
      const clientHeight = viewer.clientHeight;
        const pageGap = kConfig.pageGap;
      
      // Use exact page dimensions from config
      const pageHeightPx = kConfig.pageHeightPx;
      const totalHeight = kConfig.pageTotal * (pageHeightPx + pageGap) - pageGap;
      
      const visiblePagesBegin = Math.max(1, Math.floor(scrollTop / (pageHeightPx + pageGap)) + 1);
      const visiblePagesEnd = Math.min(
        kConfig.pageTotal,
        Math.ceil((scrollTop + clientHeight) / (pageHeightPx + pageGap))
      );
      
      return { start: visiblePagesBegin, end: visiblePagesEnd };
    }

    // Assign canvases to pages
    function assignCanvasesToPages(visibleRange) {
      const { start: visiblePagesBegin, end: visiblePagesEnd } = visibleRange;
      
      // Calculate which pages need canvases based on visibility + buffer
      const remainingBuffers = kConfig.canvasBuffersSize - 1;
      const bufferSize_trailing = Math.floor(remainingBuffers * 0.4);
      const bufferSize_leading = remainingBuffers - bufferSize_trailing;
      
      // Apply buffers based on scroll direction
      const isScrollingDown = (db.scrollDirection === 'down');
      const bufferBefore = isScrollingDown ? bufferSize_trailing : bufferSize_leading;
      const bufferAfter = isScrollingDown ? bufferSize_leading : bufferSize_trailing;
      
      // Compute window bounds - ONLY scan this range
      const windowBegin = Math.max(1, visiblePagesBegin - bufferBefore);
      const windowEnd = Math.min(getPageTotal(), visiblePagesEnd + bufferAfter);
      
      const pagesToLoad = [];
      for (let pageNum = windowBegin; pageNum <= windowEnd; pageNum++) {
        const pgId = pageId(pageNum);
        // Check if page needs a canvas
        if (!db[pgId] || !db[pgId].cb || db[pgId].cb === canvasId(kCanvasId_Reset)) {
          pagesToLoad.push(pageNum);
        }
      }
      
      // Assign canvases to pages that need them
      for (const pageNum of pagesToLoad) {
        const availableIds = getAllAvailableCanvasIds();
        if (availableIds.length === 0) break;

        const cbId = availableIds[0];
        const pgId = pageId(pageNum);
        const canvas = db[cbId].domElementRef;

        assignCanvasToPage(cbId, pgId);

        const placeholder = db[pgId].domElementRef;
        if (placeholder) {
          placeholder.innerHTML = '';
          placeholder.className = 'page-container';
          placeholder.appendChild(canvas);
        }

        if (db[pgId] && db[pgId].dataUrl) {
          const pageData = {
            pageNumber: pageNum,
            dataUrl: db[pgId].dataUrl,
            widthPx: db[pgId].widthPx,
            heightPx: db[pgId].heightPx
          };
          renderPageToCanvas(pageData, cbId);
        } else {
          requestPageRender(pageNum);
        }
      }

      // Unassign canvases outside the window
      const allCanvasIds = getAllCanvasIds();
      for (const cbId of allCanvasIds) {
        const assignedPgId = db[cbId].pg;
        if (assignedPgId && assignedPgId !== pageId(kPageId_Reset)) {
          const assignedPageNum = pageNumber(assignedPgId);
          if (assignedPageNum < windowBegin || assignedPageNum > windowEnd) {
            unassignCanvas(cbId);
          }
        }
      }

      updateHud();
    }

    // Assign canvas to page
    function assignCanvasToPage(pageNumber) {
      dx(`assignCanvasToPage called for page ${pageNumber}`);
      
      if (db.availableCanvases.size === 0) {
        dx(`No available canvases for page ${pageNumber}`);
        return;
      }
      
      // Check if page already has a canvas assigned
      if (db.assignedCanvases.has(pageNumber)) {
        dx(`Page ${pageNumber} already has canvas assigned, skipping`);
        return;
      }
      
      const canvasId = db.availableCanvases.values().next().value;
      const canvas = document.getElementById(canvasId);
      if (!canvas) {
        return;
      }
      
      // Show attempting to assign indicator
      const canvasIndex = parseInt(canvasId.split('-')[1]);
      const hudElement = document.getElementById('canvas-assignments');
      if (hudElement) {
        const currentText = hudElement.textContent;
        const assignments = currentText.split(' ');
        assignments[canvasIndex] = `c${canvasIndex}?p${pageNumber}`;
        hudElement.textContent = assignments.join(' ');
        dx(`HUD: ${assignments.join(' ')}`);
      }
      
      // Remove from available pool
      db.availableCanvases.delete(canvasId);
      db.assignedCanvases.set(pageNumber, canvasId);
      
      // Move canvas to page placeholder
      const placeholder = document.getElementById(`page-${pageNumber}`);
      if (placeholder) {
        placeholder.innerHTML = '';
        placeholder.className = 'page-container';
        placeholder.appendChild(canvas);
      }
      
      // Check if page already rendered
      if (db.renderedPages.has(pageNumber)) {
        const pageData = db.renderedPages.get(pageNumber);
        dx(`Page ${pageNumber} already rendered, using cached data`);
        renderPageToCanvas(pageData, canvasId);
      } else {
        dx(`Page ${pageNumber} not rendered yet, requesting render`);
        requestPageRender(pageNumber);
      }
      
      updateCanvasAssignments();
    }

    // Unassign canvas from page
    function unassignCanvas(pageNumber) {
      const canvasId = db.assignedCanvases.get(pageNumber);
      if (!canvasId) return;
      
      // Show unassigning indicator in HUD
      const canvasIndex = parseInt(canvasId.split('-')[1]);
      const hudElement = document.getElementById('canvas-assignments');
      if (hudElement) {
        const currentText = hudElement.textContent;
        const assignments = currentText.split(' ');
        assignments[canvasIndex] = `c${canvasIndex}xp${pageNumber}`;
        hudElement.textContent = assignments.join(' ');
      }
      
      const canvas = document.getElementById(canvasId);
      if (canvas) {
        // Clear canvas
        const ctx = canvas.getContext('2d');
        if (ctx) {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
        
        // Move back to pool
        canvasPool.appendChild(canvas);
      }
      
      // Update state
      db.assignedCanvases.delete(pageNumber);
      db.availableCanvases.add(canvasId);
      
      // Reset placeholder
      const placeholder = document.getElementById(`page-${pageNumber}`);
      if (placeholder) {
        placeholder.className = 'page-placeholder loading';
        placeholder.innerHTML = `
          <div class="page-label">Page ${pageNumber}</div>
        `;
      }
      
      updateHud();
    }

    // Request page render from extension
    function requestPageRender(pageNumber) {
      const pgId = pageId(pageNumber);
      
      // Check if page data already cached
      if (db[pgId]?.dataUrl) {
        return;
      }
      
      // Send message to extension
      if (window.vscode) {
        window.vscode.postMessage({
          type: 'requestPageRender',
          pageNumber: pageNumber
        });
      }
    }

    // Handle page render response
    function handlePageRenderResponse(pageData) {
      const { pageNumber, dataUrl, widthPx, heightPx } = pageData;
      
      // Store page data (flatten into page object)
      const pgId = pageId(pageNumber);
      if (!db[pgId]) {
        db[pgId] = {};
      }
      db[pgId].dataUrl = dataUrl;
      db[pgId].widthPx = widthPx;
      db[pgId].heightPx = heightPx;
      
      // Render to canvas
      const canvasId = db.assignedCanvases.get(pageNumber);
      if (canvasId) {
        renderPageToCanvas(pageData, canvasId);
      }
    }

    // Handle page render error
    function handlePageRenderError(error, pageNumber) {
      const pgId = pageId(pageNumber);
      const cbId = db[pgId]?.cb;
      
      // Mark canvas as failed
      if (db[cbId]) {
        db[cbId].status = kCBStatus_Failed;
      }
      
      // Show error in placeholder
      const placeholder = db[pgId]?.domElementRef;
      if (placeholder) {
        placeholder.className = 'page-placeholder error';
        placeholder.innerHTML = `
          <div class="page-label">Page ${pageNumber}</div>
          <div class="error-text">Failed to render page</div>
        `;
      }
      
      updateHud();
      
      console.error(`Page ${pageNumber} render failed:`, error);
    }

    // Render page data to canvas using PDF.js
    // ⚠️ CRITICAL: PDF.js COORDINATE SYSTEM ⚠️
    // PDF.js has TWO coordinate systems:
    // - PDF Content Rendering: Bottom-left origin (standard PDF)
    // - Viewer Interface/Canvas: Top-left origin (web standard)
    // We use the VIEWER INTERFACE system for canvas rendering
    // This matches jsPDF's coordinate system (top-left origin, Y increases downward)
    // This ensures consistent coordinates between PDF generation and webview display
    async function renderPageToCanvas(pageData, canvasId) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;
      
      const { dataUrl, widthPx, heightPx, pageNumber } = pageData;
      if (!dataUrl) return;
      
      const pgId = pageId(pageNumber);
      
      // Check if this specific canvas is already being used for rendering
      if (canvas.dataset.rendering === 'true') {
        return;
      }
      
      try {
        // Mark canvas as being rendered
        canvas.dataset.rendering = 'true';
        
        // Load PDF document once
        if (!db.pdfDoc) {
          const loadingTask = pdfjsLib.getDocument({
            url: dataUrl,
          });
          db.pdfDoc = await loadingTask.promise;
        }
        
        const pdfDoc = db.pdfDoc;
        const page = await pdfDoc.getPage(pageNumber); // Multi-page PDF
        
        const viewport = page.getViewport({ scale: kConfig.scale });
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        
        // Set CSS dimensions
        const container = canvas.parentElement;
        if (container) {
          canvas.style.width = '100%';
          canvas.style.height = 'auto';
        }
        
        const ctx = canvas.getContext('2d');
        if (!ctx) return;
        
        await page.render({
          canvasContext: ctx,
          viewport: viewport
        }).promise;
        
      } catch (error) {
        dx(`🖼️ PDF render error for canvas ${canvasId}: ${error.message}`);
      } finally {
        // Mark canvas as no longer being rendered
        canvas.dataset.rendering = 'false';
        
        // Update canvas status to assigned
        const cbId = db[pgId]?.cb;
        if (db[cbId]) {
          db[cbId].status = kCBStatus_Assigned;
        }
        
        updateHud();
      }
    }

    // Set up performance monitoring
    function setupPerformanceMonitoring() {
      setInterval(() => {
        updatePerformanceInfo();
      }, 1000);
    }

    // Update performance info display
    function updatePerformanceInfo() {
      const pageCount = getAllPageIds().filter(pgId => {
        const cbId = db[pgId]?.cb;
        return db[cbId]?.status && db[cbId].status !== kCBStatus_Ready;
      }).length;
      const canvasCount = getAllCanvasIds().filter(cbId => db[cbId].status && db[cbId].status !== kCBStatus_Ready).length;
      
      document.getElementById('page-count').textContent = pageCount;
      document.getElementById('canvas-count').textContent = canvasCount;
      
      updateHud();
    }


    // Message handling from extension
    async function handleExtensionMessage(message) {
      const messageStr = JSON.stringify(message);
      switch (message.type) {
        case 'pageRenderResponse':
          handlePageRenderResponse(message.pageData);
          break;
        case 'pageRenderError':
          handlePageRenderError(message.error, message.error.pageNumber ?? 0);
          break;
        case 'clearAllPages': {
          const oldPageTotal = getPageTotal();
          const newPageTotal = message.pageTotal ?? 0; // Default to 0 if not provided
          
          // Unassign canvases for pages that will be hidden (including if newTotal is 0)
          if (newPageTotal < oldPageTotal) {
            for (let i = newPageTotal + 1; i <= oldPageTotal; i++) {
              const pgId = pageId(i);
              const cbId = db[pgId]?.cb;
              unassignCanvas(cbId);
            }
          }
          
          // Update page total and UI
          db.initialPageTotal = newPageTotal;
          const pageTotalElement = document.getElementById('page-total');
          if (pageTotalElement) {
            pageTotalElement.textContent = newPageTotal.toString();
          }
          
          // Handle scroll position if needed
          if (newPageTotal < oldPageTotal) {
            const currentScrollTop = viewer.scrollTop;
            const viewerHeight = viewer.clientHeight;
            const scrollBottom = currentScrollTop + viewerHeight;
            const pageHeight = {{pageHeightPx}} || 800;
            const lastPageHeight = (newPageTotal * (pageHeight + kConfig.pageGap)) + kConfig.pageGap;
            
            if (scrollBottom > lastPageHeight) {
              viewer.scrollTop = Math.max(0, lastPageHeight - viewerHeight);
            }
          }
          
          // Clear data for all pages (including if newTotal is 0)
          for (let i = 1; i <= Math.max(oldPageTotal, newPageTotal); i++) {
            const pgId = pageId(i);
            if (db[pgId]) {
              delete db[pgId].dataUrl;
              delete db[pgId].widthPx;
              delete db[pgId].heightPx;
            }
          }
          db.pdfDoc = null;
          
          // Reset scroll tracking and trigger re-render
          db.lastScrollTop = -999;
          handleScroll();
          break;
        }
        case 'updatePdf': {
          // Validate that pdfDataUrl is provided
          if (!message.pdfDataUrl) {
            dx('updatePdf requires pdfDataUrl - use clearAllPages for clearing/reloading');
            break;
          }
          
          try {
            let newDoc = null;
            
            // Load new doc first (don't destroy old yet)
            if (message.pdfDataUrl) {
              const loadingTask = pdfjsLib.getDocument({ url: message.pdfDataUrl });
              newDoc = await loadingTask.promise;
            }
            
            // Use pageTotal from message (already calculated), only fall back to numPages if missing
            const newTotal = (typeof message.pageTotal === 'number')
              ? message.pageTotal
              : (newDoc?.numPages ?? getPageTotal());
            
            // Now swap: destroy old doc, assign new
            if (db.pdfDoc && typeof db.pdfDoc.destroy === 'function') {
              db.pdfDoc.destroy();
            }
            db.pdfDoc = newDoc;
            
            // Use the same robust clearing logic as clearAllPages
            const oldPageTotal = getPageTotal();
            
            // Unassign canvases for pages that will be hidden
            if (newTotal < oldPageTotal) {
              for (let i = newTotal + 1; i <= oldPageTotal; i++) {
                const pgId = pageId(i);
                const cbId = db[pgId]?.cb;
                unassignCanvas(cbId);
              }
            }
            
            // Update page total and UI
            db.initialPageTotal = newTotal;
            const pageTotalElement = document.getElementById('page-total');
            if (pageTotalElement) {
              pageTotalElement.textContent = newTotal.toString();
            }
            
            // Handle scroll position if needed
            if (newTotal < oldPageTotal) {
              const currentScrollTop = viewer.scrollTop;
              const viewerHeight = viewer.clientHeight;
              const scrollBottom = currentScrollTop + viewerHeight;
              const pageHeight = {{pageHeightPx}} || 800;
              const lastPageHeight = (newTotal * (pageHeight + kConfig.pageGap)) + kConfig.pageGap;
              
              if (scrollBottom > lastPageHeight) {
                viewer.scrollTop = Math.max(0, lastPageHeight - viewerHeight);
              }
            }
            
            // Clear data for all pages and trigger re-render
            for (let i = 1; i <= newTotal; i++) {
              const pgId = pageId(i);
              if (db[pgId]) {
                delete db[pgId].dataUrl;
                delete db[pgId].widthPx;
                delete db[pgId].heightPx;
              }
            }
            
            // Reset scroll tracking and trigger re-render
            db.lastScrollTop = -999;
            handleScroll();
          } catch (e) {
            dx(`updatePdf failed: ${e?.message || e}`);
          }
          break;
        }
        case 'restorePosition':
          if (message.left !== undefined) {
            const toolbar = document.getElementById('p2p4vsc-toolbar');
            if (toolbar) {
              const maxLeft = Math.max(8, window.innerWidth - toolbar.offsetWidth - 8);
              toolbar.style.left = Math.min(Math.max(8, message.left), maxLeft) + 'px';
            }
          }
          break;
        default:
      }
    }



    // Set up message handling
    window.addEventListener('message', (event) => {
      handleExtensionMessage(event.data);
    });

    // Initialize when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initScrollableViewer);
    } else {
      initScrollableViewer();
    }

    // Export for external access
    window.UIScrollView = {
      init: initScrollableViewer,
      handlePageRenderResponse,
      handlePageRenderError,
      updatePerformanceInfo
    };

    } catch (error) {
      console.error('FATAL ERROR in scroll_js:', error);
      if (window.vscode) {
        window.vscode.postMessage({
          type: 'dx',
          message: `❌ FATAL: ${error.message} at ${error.stack}`
        });
      }
    }

  })();
