# UIScrollView templates for the Print2Paper extension

scroll_css: |
  /* Scrollable viewer styles */
  .scrollable-viewer {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: auto;
    background: #f5f5f5;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  .scrollable-content {
    position: relative;
    width: 100%;
    min-height: 100%;
    padding: 20px;
  }

  .page-container {
    position: relative;
    margin: 0 auto 20px auto;
    background: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    border-radius: 4px;
    overflow: hidden;
    max-width: 100%;
    width: 100%;
  }

  .page-canvas {
    display: block;
    width: 100%;
    height: auto;
    max-width: 100%;
  }

  .page-placeholder {
    position: relative;
    background: #f8f9fa;
    border: 2px dashed #dee2e6;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #6c757d;
    font-size: 14px;
    min-height: 200px;
    margin: 0 auto 20px auto;
  }


  .page-placeholder.loading {
    background: #e3f2fd;
    border-color: #2196f3;
    color: #1976d2;
  }

  .page-placeholder.error {
    background: #ffebee;
    border-color: #f44336;
    color: #d32f2f;
  }

  .page-label {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 4px 8px;
    border-radius: 3px;
    font-size: 12px;
    font-weight: 500;
  }

  .loading-text {
    text-align: center;
    padding: 20px;
  }

  .error-text {
    text-align: center;
    padding: 20px;
    color: #d32f2f;
  }

  /* Performance indicators */
  .performance-info {
    position: fixed;
    top: 10px;
    right: 10px;
    background: rgba(0,0,0,0.8);
    color: white;
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 11px;
    font-family: monospace;
    z-index: 1000;
    opacity: 0.7;
  }

  .performance-info.hidden {
    display: none;
  }

  /* Canvas pool management */
  .canvas-pool {
    position: absolute;
    top: -9999px;
    left: -9999px;
    visibility: hidden;
  }

  /* Scroll performance optimizations */
  .scrollable-viewer.smooth-scroll {
    scroll-behavior: smooth;
  }

  .scrollable-viewer.performance-mode {
    will-change: scroll-position;
  }

scroll_html: |
  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <style>
      {{BASE_CSS}}
      {{SCROLL_CSS}}
    </style>
    <script>
      {{PDFJS_LIBRARY}}
    </script>
  </head>
  <body>
    <div class="scrollable-viewer" id="scrollable-viewer">
      <div class="scrollable-content" id="scrollable-content">
        <!-- Pages will be dynamically inserted here -->
      </div>
      
      <!-- Canvas pool for performance -->
      <div class="canvas-pool" id="canvas-pool">
        <!-- Canvas elements will be managed here -->
      </div>
    </div>

    <!-- Performance indicators -->
    <div class="performance-info" id="performance-info">
      <div>Pages: <span id="page-count">0</span>/<span id="total-pages">{{TOTAL_PAGES}}</span> | Canvases: <span id="canvas-count">0</span>/<span id="max-canvases">{{MAX_CANVASES}}</span> | Memory: <span id="memory-usage">0MB</span></div>
      <div><span id="canvas-assignments">c1:p0 c2:p0 c3:p0 c4:p0 c5:p0 c6:p0 c7:p0</span></div>
    </div>


    <!-- Toolbar integration -->
    {{TOOLBAR}}

    <script>
      {{SCROLL_JS}}
    </script>
  </body>
  </html>

scroll_js: |
  // Scrollable Viewer Implementation
  (function() {
    'use strict';

    // Initialize PDF.js
    if (typeof pdfjsLib !== 'undefined') {
      pdfjsLib.GlobalWorkerOptions.workerSrc = '{{as_uri:src/lib/pdf.worker.min.js}}';
      dx('PDF.js initialized');
    } else {
      dx('ERROR: PDF.js library not loaded!');
    }

    // Configuration from template
    const CONFIG = {
      pageTotal: {{PAGE_TOTAL}},
      maxCanvases: {{MAX_CANVASES}},
      scale: 1.0,
      pageGap: 20,
      scrollDebounceMs: Math.max({{SCROLL_DEBOUNCE_MS}}, 50), // Minimum 50ms debounce
      loadDistance: {{LOAD_DISTANCE}}, // Pages distance to start loading canvas
      unloadDistance: {{UNLOAD_DISTANCE}}, // Pages distance to unload canvas
      debug: false, // Set to true for debugging
      pageRenderService: null // Will be set by extension
    };

    // Database state management (POC approach - simple object)
    const db = {
      // Canvas buffers: db.cb1 = { pg: 'pg5', status: 'render', domElementRef, renderTask }
      // Pages: db.pg5 = { cb: 'cb1', placeholder, wrapper, label }
      // Canvas buffers (cb1...cb6) and pages (pg1...pgN) will be added dynamically
      pdfDoc: null, // Single PDF.js document
      lastScrollTop: -999,
      scrollDirection: 'down',
      perfUpdateCounter: 0,
    };

    // DOM elements
    const viewer = document.getElementById('scrollable-viewer');
    const content = document.getElementById('scrollable-content');
    const canvasPool = document.getElementById('canvas-pool');
    const performanceInfo = document.getElementById('performance-info');

    // ID constants for unassigned/reset state
    const kPageId_Reset = 0;
    const kCanvasId_Reset = 0;

    // Canvas buffer status constants
    const kCBStatus_Requesting = 'requesting';
    const kCBStatus_Clearing = 'clearing';
    const kCBStatus_Assigned = 'assigned';
    const kCBStatus_Ready = 'ready';

    const kCBStatus = {
      [kCBStatus_Requesting]: '❓',
      [kCBStatus_Clearing]: '❌',
      [kCBStatus_Assigned]: ':',
      [kCBStatus_Ready]: '.'
    };

    // Helper functions for canvas↔page management (POC approach)
    
    // Get canvas element for page
    function getCanvasForPage(pgId) {
      const cbId = db[pgId] && db[pgId].cb;
      return cbId ? db[cbId].domElementRef : null;
    }

    // Assign canvas to page (bidirectional)
    function assignCanvasToPage(cbId, pgId) {
      // Clear old assignments from BOTH directions
      const oldPgId = db[cbId] && db[cbId].pg;
      if (oldPgId && db[oldPgId]) {
        db[oldPgId].cb = null;
      }

      const oldCbId = db[pgId] && db[pgId].cb;
      if (oldCbId && db[oldCbId]) {
        db[oldCbId].pg = pageId(kPageId_Reset);
        db[oldCbId].status = kCBStatus_Ready;
      }

      // Set new assignment
      db[cbId].pg = pgId;
      db[cbId].status = kCBStatus_Requesting;

      if (!db[pgId]) db[pgId] = {};
      db[pgId].cb = cbId;

      // Update HUD display
      const hudElement = document.getElementById('canvas-assignments');
      if (hudElement) hudElement.textContent = hud();
      dx(`HUD: ${hud()}`);
    }

    // Unassign canvas (clear both directions)
    function unassignCanvas(cbId) {
      const oldPgId = db[cbId] && db[cbId].pg;
      if (oldPgId && db[oldPgId]) {
        db[oldPgId].cb = null;

        // Show "Loading page X..." when canvas removed
        const placeholder = db[oldPgId].placeholder;
        if (placeholder) {
          const loadingText = placeholder.querySelector('.loading-text');
          if (loadingText) loadingText.style.display = 'block';
        }
      }

      // Remove canvas from DOM
      const canvas = db[cbId].domElementRef;
      if (canvas && canvas.parentElement) {
        canvas.parentElement.removeChild(canvas);
      }

      db[cbId].pg = pageId(kPageId_Reset);
      db[cbId].status = kCBStatus_Ready;

      // Update HUD display
      const hudElement = document.getElementById('canvas-assignments');
      if (hudElement) hudElement.textContent = hud();
      dx(`HUD: ${hud()}`);
    }

    // Get available canvas
    function getAvailableCanvas() {
      // First try available canvases
      const availableIds = getAllAvailableCanvasIds();
      if (availableIds.length > 0) {
        return db[availableIds[0]].domElementRef;
      }

      // Then try cancelled canvases
      const cancelledIds = getAllCancelledCanvasIds();
      if (cancelledIds.length > 0) {
        return db[cancelledIds[0]].domElementRef;
      }

      return null;
    }

    // Helper: Get all canvas IDs
    function getAllCanvasIds() {
      return Object.keys(db).filter(k => k.startsWith('cb'));
    }

    // Helper: Get available canvas IDs
    function getAllAvailableCanvasIds() {
      return getAllCanvasIds().filter(cbId => !db[cbId].pg && !db[cbId].status);
    }

    // Helper: Get cancelled canvas IDs
    function getAllCancelledCanvasIds() {
      return getAllCanvasIds().filter(cbId => db[cbId].status === 'cancel');
    }

    // Helper: Get all page IDs
    function getAllPageIds() {
      return Object.keys(db).filter(k => k.startsWith('pg'));
    }

    // ID generation helpers - centralized for easy maintenance
    function pageId(pageNumber) {
      return `pg${pageNumber}`;
    }

    function canvasId(canvasNumber) {
      return `cb${canvasNumber}`;
    }

    // Parse canvas index from canvas ID (robust version using data-index)
    function canvasIndex(cbId) {
      const canvas = db[cbId] && db[cbId].domElementRef;
      if (canvas && canvas.dataset.index) {
        return parseInt(canvas.dataset.index);
      }
      // Fallback to ID parsing if data-index not available
      return parseInt(cbId.replace('cb', ''));
    }

    // Parse page number from page ID (robust version using data-index)
    function pageNumber(pgId) {
      const pageData = db[pgId];
      if (pageData && pageData.placeholder && pageData.placeholder.dataset.index) {
        return parseInt(pageData.placeholder.dataset.index);
      }
      // Fallback to ID parsing if data-index not available
      return parseInt(pgId.replace('pg', ''));
    }

    // Helper: Calculate memory usage for a rendered page
    function calculatePageMemoryUsage(pgId) {
      const cbId = db[pgId]?.cb;
      const canvas = db[cbId]?.domElementRef;
      const canvasSizeMB = (canvas?.width * canvas?.height * 4) / (1024 * 1024); // RGBA bytes to MB

      // Add PDF data size (passed from extension during PDF generation)
      const pageNum = pageNumber(pgId);
      const pdfSizeMB = db.pageSizes?.[pageNum] || 0; // Stored in webview db

      return canvasSizeMB + pdfSizeMB;
    }

    // Simple HUD display - just gather and return data for display
    function hud() {
      // Canvas assignments (cb1, cb2, cb3, cb4, cb5, cb6)
      const canvasLine = [];
      for (let i = 1; i <= CONFIG.CANVAS_BUFFERS_SIZE; i++) {
        const cbId = canvasId(i);
        const cb = db[cbId];
        const statusChar = kCBStatus[cb.status] || '?';
        const pgId = cb.pg || 'null';
        canvasLine.push(`${cbId}${statusChar}${pgId}`);
      }
      return canvasLine.join(' ');
    }

    // Send diagnostic message to extension
    function dx(message) {
      if (window.vscode) {
        window.vscode.postMessage({
          type: 'dx',
          message
        });
      }
    }

    // Initialize the scrollable viewer
    function initScrollableViewer() {
      dx(`Initializing scrollable viewer with config: ${JSON.stringify(CONFIG)}`);
      
      // Set up canvas pool
      createCanvasPool();
      
      // Create page placeholders
      configurePlaceholders(0, CONFIG.pageTotal);
      
      // Set up scroll handling
      setupScrollHandling();
      
      // Set up performance monitoring
      setupPerformanceMonitoring();
      
      // Initial render
      handleScroll();
      
      dx('Scrollable viewer initialized');
    }

    // Create canvas pool for performance
    function createCanvasPool() {
      for (let i = 1; i <= 6; i++) { // cb1...cb6 (cb0 reserved for null)
        const canvas = document.createElement('canvas');
        canvas.id = canvasId(i); // Use helper function
        canvas.className = 'page-canvas';
        canvas.dataset.index = i; // Store canvas index for robust access
        canvasPool.appendChild(canvas);

        // Store in db with cb prefix
        db[canvasId(i)] = {
          pg: pageId(kPageId_Reset),
          status: '',
          domElementRef: canvas,
          renderTask: null,
        };
      }
      dx(`Created canvas buffer pool with 6 buffers (cb1-cb6)`); // CONFIG.canvasBuffersSize = 6
    }

    // Configure page placeholders
    function configurePlaceholders(fromPageTotal, toPageTotal) {
      if (toPageTotal === undefined) {
        toPageTotal = fromPageTotal;
      }
      
      const content = document.getElementById('scrollable-content');
      if (!content) return;
      
      if (toPageTotal < fromPageTotal) {
        // Fewer pages - hide the extra ones
        dx(`Hiding pages ${toPageTotal + 1} to ${fromPageTotal}`);
        for (let i = toPageTotal + 1; i <= fromPageTotal; i++) {
          const placeholder = document.getElementById(`page-${i}`);
          if (placeholder) {
            placeholder.style.display = 'none';
          }
        }
      } else if (toPageTotal > fromPageTotal) {
        // More pages - create the new ones
        dx(`Creating pages ${fromPageTotal + 1} to ${toPageTotal}`);
        for (let i = fromPageTotal + 1; i <= toPageTotal; i++) {
          const placeholder = document.createElement('div');
          placeholder.id = `page-${i}`;
          placeholder.className = 'page-placeholder loading';
          placeholder.style.width = '{{PAGE_WIDTH_PX}}px';
          placeholder.style.height = '{{PAGE_HEIGHT_PX}}px';
          placeholder.innerHTML = `
            <div class="page-label">Page ${i}</div>
          `;
          content.appendChild(placeholder);

          // Store in db with pg prefix
          const pgId = pageId(i);
          if (!db[pgId]) db[pgId] = {};
          db[pgId].placeholder = placeholder;
          db[pgId].cb = canvasId(kCanvasId_Reset); // No canvas assigned yet
          dx(`Created placeholder for ${pgId}`);
        }
      }
      
      // Reset existing pages (only if they don't have canvases assigned)
      for (let i = 1; i <= Math.min(fromPageTotal, toPageTotal); i++) {
        const placeholder = document.getElementById(`page-${i}`);
        if (placeholder) {
          placeholder.style.display = 'block';
          // Only reset HTML if no canvas is assigned
          const pgId = pageId(i);
          if (!db[pgId] || !db[pgId].cb) {
            placeholder.className = 'page-placeholder loading';
            placeholder.innerHTML = `
              <div class="page-label">Page ${i}</div>
            `;
          }
        }
      }
      
      dx(`Configured placeholders from ${fromPageTotal} to ${toPageTotal} pages`);
    }

    // Set up scroll handling with RAF-based throttling
    function setupScrollHandling() {
      let rafPending = false;
      
      viewer.addEventListener('scroll', () => {
        if (rafPending) return; // One request per frame
        
        rafPending = true;
        requestAnimationFrame(() => {
          handleScroll();
          rafPending = false;
        });
      });
    }

    // Handle scroll events
    function handleScroll() {
      const scrollTop = viewer.scrollTop;
      
      // Only process if scroll position actually changed significantly
      const scrollDelta = Math.abs(scrollTop - db.lastScrollTop);
      if (scrollDelta < 10) {
        return; // Ignore small scroll changes
      }
      
      // Update scroll direction
      if (scrollTop > db.lastScrollTop) {
        db.scrollDirection = 'down';
      } else if (scrollTop < db.lastScrollTop) {
        db.scrollDirection = 'up';
      }
      db.lastScrollTop = scrollTop;
      
      // Get visible page range and assign canvases
      const visibleRange = getVisiblePageRange();
      assignCanvasesToPages(visibleRange);
      
      // Update performance info every 10th call
      db.perfUpdateCounter++;
      if (db.perfUpdateCounter >= 10) {
        db.perfUpdateCounter = 0;
        updatePerformanceInfo();
      }
    }

    // Get visible page range
    function getVisiblePageRange() {
      const scrollTop = viewer.scrollTop;
      const clientHeight = viewer.clientHeight;
      const pageGap = CONFIG.pageGap;
      
      // Use exact page dimensions from config
      const pageHeightPx = {{PAGE_HEIGHT_PX}};
      
      const startPage = Math.max(1, Math.floor(scrollTop / (pageHeightPx + pageGap)) + 1);
      const endPage = Math.min(CONFIG.pageTotal, Math.ceil((scrollTop + clientHeight) / (pageHeightPx + pageGap)) + 1);
      
      // dx(`CANVAS:Visible range: scrollTop=${scrollTop}, clientHeight=${clientHeight}, pageHeightPx=${pageHeightPx}, startPage=${startPage}, endPage=${endPage}`);
      
      return { start: startPage, end: endPage };
    }

    // Assign canvases to pages
    function assignCanvasesToPages(visibleRange) {
      const { start, end } = visibleRange;
      
      // Calculate which pages need canvases based on visibility + buffer
      const pagesToLoad = [];
      
      // Always load visible pages + buffer around them
      const minVisible = start;
      const maxVisible = end;
      const centerVisible = Math.round((minVisible + maxVisible) / 2);
      
      for (let pageNum = 1; pageNum <= CONFIG.pageTotal; pageNum++) {
        // Distance from visible range
        let distanceFromVisible;
        if (pageNum >= minVisible && pageNum <= maxVisible) {
          distanceFromVisible = 0; // Page is visible
        } else if (pageNum < minVisible) {
          distanceFromVisible = minVisible - pageNum; // Pages before visible range
        } else {
          distanceFromVisible = pageNum - maxVisible; // Pages after visible range
        }
        
        // Smart directional loading: keep buffer pages behind, load as much ahead as possible
        let shouldLoad = false;
        
        if (pageNum >= minVisible && pageNum <= maxVisible) {
          // Always load visible pages (must have)
          shouldLoad = true;
        } else if (distanceFromVisible <= CONFIG.loadDistance) {
          // Keep buffer pages in each direction (nice to have)
          shouldLoad = true;
        }
        
        if (shouldLoad) {
          pagesToLoad.push(pageNum);
          dx(`Added page ${pageNum} to pagesToLoad (distance: ${distanceFromVisible})`);
        }
      }
      
      // Step 1: Find pages that need canvases (don't already have them)
      const pagesNeedingCanvases = pagesToLoad.filter(pageNum => {
        const pgId = pageId(pageNum);
        const hasCanvas = db[pgId] && db[pgId].cb;
        dx(`Page ${pageNum}: hasCanvas=${hasCanvas}, in pagesToLoad=${pagesToLoad.includes(pageNum)}`);
        return !hasCanvas;
      });
      
      // Step 2: Check if we have enough available canvases
      const availableCanvasCount = getAllAvailableCanvasIds().length;
      const totalNeeded = pagesNeedingCanvases.length;
      
      // Step 3: Only unassign canvases if we need more space
      if (totalNeeded > availableCanvasCount) {
        const canvasesNeeded = totalNeeded - availableCanvasCount;
        dx(`Need ${canvasesNeeded} more canvases, currently have ${availableCanvasCount} available`);
        
        // Find pages that are furthest from center to unassign
        const pagesToUnassign = [];
        const allPageIds = getAllPageIds();
        for (const pgId of allPageIds) {
          const pageNum = pageNumber(pgId);
          const canvasId = db[pgId]?.cb;
          if (!canvasId) continue; // Skip pages without canvases
          
          // Don't unassign visible pages
          if (pageNum >= minVisible && pageNum <= maxVisible) {
            continue;
          }
          
          // Calculate distance from center for priority
          const distanceFromCenter = Math.abs(pageNum - centerVisible);
          pagesToUnassign.push({ pageNumber: pageNum, canvasId, distanceFromCenter });
        }
        
        // Sort by distance (furthest first) and unassign what we need
        pagesToUnassign.sort((a, b) => b.distanceFromCenter - a.distanceFromCenter);
        for (let i = 0; i < Math.min(canvasesNeeded, pagesToUnassign.length); i++) {
          const { pageNumber } = pagesToUnassign[i];
          unassignCanvas(pageNumber);
          dx(`Unassigned page ${pageNumber} to free up canvas (distance: ${pagesToUnassign[i].distanceFromCenter})`);
        }
      }
      
      // Step 4: Assign canvases to pages that need them
      dx(`Pages needing canvases: [${pagesNeedingCanvases.join(', ')}], available: ${getAllAvailableCanvasIds().length}`);
      for (const pageNum of pagesNeedingCanvases) {
        if (getAllAvailableCanvasIds().length > 0) {
          dx(`Assigning canvas to page ${pageNum}`);
          assignCanvasToPage(pageNum);
        } else {
          dx(`No available canvases for page ${pageNum}`);
        }
      }
    }

    // Assign canvas to page
    function assignCanvasToPage(pageNumber) {
      dx(`assignCanvasToPage called for page ${pageNumber}`);
      
      if (getAllAvailableCanvasIds().length === 0) {
        dx(`No available canvases for page ${pageNumber}`);
        return;
      }
      
      // Check if page already has a canvas assigned
      const pgId = pageId(pageNumber);
      if (db[pgId] && db[pgId].cb) {
        dx(`Page ${pageNumber} already has canvas assigned, skipping`);
        return;
      }
      
      const availableIds = getAllAvailableCanvasIds();
      const canvasId = availableIds[0];
      const canvas = document.getElementById(canvasId);
      if (!canvas) {
        return;
      }
      
      // Show attempting to assign indicator
      const canvasIndex = parseInt(canvasId.split('-')[1]);
      const hudElement = document.getElementById('canvas-assignments');
      if (hudElement) {
        const currentText = hudElement.textContent;
        hudElement.textContent = hud();
        dx(`HUD: ${hud()}`);
      }
      
      // Assign canvas to page using helper function
      assignCanvasToPage(canvasId, pgId);
      
      // Move canvas to page placeholder
      const placeholder = document.getElementById(`page-${pageNumber}`);
      if (placeholder) {
        placeholder.innerHTML = '';
        placeholder.className = 'page-container';
        placeholder.appendChild(canvas);
      }
      
      // Check if page already rendered
      const pgId = pageId(pageNumber);
      if (db[pgId] && db[pgId].pageData) {
        const pageData = db[pgId].pageData;
        dx(`Page ${pageNumber} already rendered, using buffered data`);
        renderPageToCanvas(pageData, canvasId);
      } else {
        dx(`Page ${pageNumber} not rendered yet, requesting render`);
        requestPageRender(pageNumber);
      }
      
      updateCanvasAssignments();
    }

    // Unassign canvas from page
    function unassignCanvas(pageNumber) {
      const pgId = pageId(pageNumber);
      const canvasId = db[pgId]?.cb;
      if (!canvasId) return;
      
      // Show unassigning indicator in HUD
      const canvasIndex = parseInt(canvasId.split('-')[1]);
      const hudElement = document.getElementById('canvas-assignments');
      if (hudElement) {
        const currentText = hudElement.textContent;
        const assignments = currentText.split(' ');
        assignments[canvasIndex] = `c${canvasIndex}xp${pageNumber}`;
        hudElement.textContent = assignments.join(' ');
      }
      
      const canvas = document.getElementById(canvasId);
      if (canvas) {
        // Clear canvas
        const ctx = canvas.getContext('2d');
        if (ctx) {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
        
        // Move back to pool
        canvasPool.appendChild(canvas);
      }
      
      // Update state using helper function
      unassignCanvas(canvasId);
      
      // Reset placeholder
      const placeholder = document.getElementById(`page-${pageNumber}`);
      if (placeholder) {
        placeholder.className = 'page-placeholder loading';
        placeholder.innerHTML = `
          <div class="page-label">Page ${pageNumber}</div>
        `;
      }
      
      dx(`Unassigned canvas ${canvasId} from page ${pageNumber}`);
      updateCanvasAssignments();
    }

    // Request page render from extension
    function requestPageRender(pageNumber) {
      dx(`Requesting page render for page ${pageNumber}`);
      
      const pgId = pageId(pageNumber);
      if (db[pgId] && db[pgId].status === 'rendering') {
        dx(`Page ${pageNumber} already pending, skipping`);
        return;
      }
      
      if (db[pgId] && db[pgId].pageData) {
        dx(`Page ${pageNumber} already rendered, skipping`);
        return;
      }
      
      db[pgId].status = 'rendering';
      dx(`Set page ${pageNumber} status to rendering`);
      
      // Send message to extension
      if (window.vscode) {
        dx(`Sending requestPageRender message for page ${pageNumber}`);
        window.vscode.postMessage({
          type: 'requestPageRender',
          pageNumber: pageNumber
        });
      } else {
        dx(`window.vscode not available for page ${pageNumber}`);
      }
    }

    // Handle page render response
    function handlePageRenderResponse(pageData) {
      const { pageNumber, dataUrl, widthPx, heightPx } = pageData;
      
      dx(`Received page render response for page ${pageNumber}`);
      
      // Update page status and store data
      const pgId = pageId(pageNumber);
      db[pgId].status = 'rendered';
      db[pgId].pageData = pageData;
      dx(`Updated page ${pageNumber} status to rendered and stored data`);
      dx(`Stored page ${pageNumber} in renderedPages map`);
      
      // Render to canvas
      const canvasId = db[pgId]?.cb;
      if (canvasId) {
        dx(`Rendering page ${pageNumber} to canvas ${canvasId}`);
        renderPageToCanvas(pageData, canvasId);
      } else {
        dx(`No canvas assigned for page ${pageNumber}, cannot render`);
      }
    }

    // Handle page render error
    function handlePageRenderError(error, pageNumber) {
      const pgId = pageId(pageNumber);
      db[pgId].status = 'failed';
      db[pgId].error = error;
      
      // Show error in placeholder
      const placeholder = document.getElementById(`page-${pageNumber}`);
      if (placeholder) {
        placeholder.className = 'page-placeholder error';
        placeholder.innerHTML = `
          <div class="page-label">Page ${pageNumber}</div>
          <div class="error-text">Failed to render page</div>
        `;
      }
      
      console.error(`Page ${pageNumber} render failed:`, error);
    }

    // Render page data to canvas using PDF.js
    // ⚠️ CRITICAL: PDF.js COORDINATE SYSTEM ⚠️
    // PDF.js has TWO coordinate systems:
    // - PDF Content Rendering: Bottom-left origin (standard PDF)
    // - Viewer Interface/Canvas: Top-left origin (web standard)
    // We use the VIEWER INTERFACE system for canvas rendering
    // This matches jsPDF's coordinate system (top-left origin, Y increases downward)
    // This ensures consistent coordinates between PDF generation and webview display
    async function renderPageToCanvas(pageData, canvasId) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;
      
      const { dataUrl, widthPx, heightPx, pageNumber } = pageData;
      if (!dataUrl) return;
      
      // Check if this specific canvas is already being used for rendering
      if (canvas.dataset.rendering === 'true') {
        dx(`Canvas ${canvasId} is already being rendered, skipping`);
        return;
      }
      
      // Check if page is already being rendered
      const pgId = pageId(pageNumber);
      if (db[pgId]?.status === 'rendering') {
        dx(`Page ${pageNumber} is already being rendered, skipping canvas ${canvasId}`);
        return;
      }
      
      try {
        // Mark canvas as being rendered
        canvas.dataset.rendering = 'true';
        // Mark page as being rendered
        db[pgId].status = 'rendering'; // I think this needs to become canvas-based.
        
        // Load PDF document once
        if (!db.pdfDoc) {
          const loadingTask = pdfjsLib.getDocument({
            url: dataUrl,
            disableAutoFetch: true,
            disableStream: true,
            disableRange: true
          });
          db.pdfDoc = await loadingTask.promise;
        }
        
        const pdfDoc = db.pdfDoc;
        const page = await pdfDoc.getPage(pageNumber); // Multi-page PDF
        
        const viewport = page.getViewport({ scale: CONFIG.scale });
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        
        // Set CSS dimensions
        const container = canvas.parentElement;
        if (container) {
          canvas.style.width = '100%';
          canvas.style.height = 'auto';
        }
        
        const ctx = canvas.getContext('2d');
        if (!ctx) return;
        
        await page.render({
          canvasContext: ctx,
          viewport: viewport
        }).promise;
        
      } catch (error) {
        dx(`🖼️ PDF render error for canvas ${canvasId}: ${error.message}`);
      } finally {
        // Mark canvas as no longer being rendered
        canvas.dataset.rendering = 'false';
        // Mark page as no longer being rendered
        db[pgId].status = 'rendered';
      }
    }

    // Set up performance monitoring
    function setupPerformanceMonitoring() {
      setInterval(() => {
        updatePerformanceInfo();
      }, 1000);
    }

    // Update performance info display
    function updatePerformanceInfo() {
      const pageCount = getAllPageIds().filter(pgId => db[pgId]?.cb).length;
      const canvasCount = getAllCanvasIds().filter(cbId => db[cbId]?.pg).length;
      
      document.getElementById('page-count').textContent = pageCount;
      document.getElementById('canvas-count').textContent = canvasCount;
      
      // Calculate and display memory usage
      const memoryUsage = calculateMemoryUsage();
      document.getElementById('memory-usage').textContent = memoryUsage;
      
      updateCanvasAssignments();
    }

    // Calculate estimated memory usage for PDF pages
    function calculateMemoryUsage() {
      const totalPages = CONFIG.pageTotal;
      const renderedPages = getAllPageIds().filter(pgId => db[pgId]?.cb).length;
      
      // Estimate memory usage:
      // - Buffered pages (first 7): ~2MB per page (PDF data + canvas)
      // - Additional pages: ~1MB per page (PDF data only)
      const bufferedPageCount = Math.min(renderedPages, CONFIG.maxCanvases);
      const additionalPages = Math.max(0, totalPages - CONFIG.maxCanvases);
      
      const bufferedMemoryMB = bufferedPageCount * 2; // 2MB per buffered page
      const additionalMemoryMB = additionalPages * 1; // 1MB per additional page
      const totalMemoryMB = bufferedMemoryMB + additionalMemoryMB;
      
      return `${totalMemoryMB}MB`;
    }

    // Update canvas assignments display
    function updateCanvasAssignments() {
      const hudElement = document.getElementById('canvas-assignments');
      if (hudElement) hudElement.textContent = hud();
      dx(`HUD: ${hud()}`);
    }


    // Message handling from extension
    function handleExtensionMessage(message) {
      const messageStr = JSON.stringify(message);
      const truncated = messageStr.length > 100 ? messageStr.substring(0, 100) + '...' : messageStr;
      dx(`Received message from extension: ${truncated}`);
      switch (message.type) {
        case 'pageRenderResponse':
          handlePageRenderResponse(message.pageData);
          break;
        case 'pageRenderError':
          handlePageRenderError(message.error, message.pageNumber);
          break;
        case 'clearAllPages':
          if (message.pageTotal !== undefined) {
            const oldPageTotal = CONFIG.pageTotal;
            const newPageTotal = message.pageTotal;
            
            // Unassign canvases for pages that will be hidden
            if (newPageTotal < oldPageTotal) {
              for (let i = newPageTotal + 1; i <= oldPageTotal; i++) {
                unassignCanvas(i);
              }
            }
            
            // Update page total
            updatePageTotal(newPageTotal);
            
            // Configure placeholders
            configurePlaceholders(oldPageTotal, newPageTotal);
            
            // Invalidate all pages to force re-render with fresh data
            dx(`Invalidating all pages for fresh render`);
            const allPageIds = getAllPageIds();
            for (const pgId of allPageIds) {
              delete db[pgId].pageData;
              delete db[pgId].status;
              delete db[pgId].error;
            }
            db.pdfDoc = null;
          } else {
            // No page total provided - do full clear
            clearAllRenderedPages();
          }
          break;
        case 'restorePosition':
          if (message.left !== undefined) {
            const toolbar = document.getElementById('p2p4vsc-toolbar');
            if (toolbar) {
              const maxLeft = Math.max(8, window.innerWidth - toolbar.offsetWidth - 8);
              toolbar.style.left = Math.min(Math.max(8, message.left), maxLeft) + 'px';
              dx(`Restored toolbar position to: ${message.left}px`);
            }
          }
          break;
        default:
          dx(`Unknown message type: ${message.type}`);
      }
    }

    // Clear all rendered pages and reset to loading state
    function clearAllRenderedPages() {
      dx('Clearing all rendered pages');
      
      // Clear all rendered page data
      const allPageIds = getAllPageIds();
      for (const pgId of allPageIds) {
        delete db[pgId].pageData;
        delete db[pgId].status;
        delete db[pgId].error;
      }
      
      // Clear buffered PDF document to force reload with new data
      db.pdfDoc = null;
      
      // Clear all pages
      handleClearAllPages();
    }
    
    // Helper function for the actual clearing logic
    function handleClearAllPages() {
      // Unassign all canvases
      for (let i = 1; i <= CONFIG.pageTotal; i++) {
        unassignCanvas(i);
      }
      
      // Reset all placeholders to loading state
      for (let i = 1; i <= CONFIG.pageTotal; i++) {
        const placeholder = document.getElementById(`page-${i}`);
        if (placeholder) {
          placeholder.className = 'page-placeholder loading';
          placeholder.innerHTML = `
            <div class="page-label">Page ${i}</div>
            <div class="page-number-box">Page ${i}</div>
          `;
        }
      }
      
      // Force scroll handler to re-render by resetting lastScrollTop
      db.lastScrollTop = -999;
      
      // Trigger initial render
      handleScroll();
    }

    // Update page total and re-render
    function updatePageTotal(newPageTotal) {
      const oldPageTotal = CONFIG.pageTotal;
      dx(`Updating page total from ${oldPageTotal} to ${newPageTotal}`);
      CONFIG.pageTotal = newPageTotal;
      
      // Update the displayed page count in the UI
      const totalPagesElement = document.getElementById('total-pages');
      if (totalPagesElement) {
        totalPagesElement.textContent = newPageTotal.toString();
        dx(`Updated total-pages display to ${newPageTotal}`);
      }
      
      // Check if we need to adjust scroll position
      if (newPageTotal < oldPageTotal) {
        // Fewer pages - check if we're viewing beyond the new total
        const currentScrollTop = viewer.scrollTop;
        const viewerHeight = viewer.clientHeight;
        const scrollBottom = currentScrollTop + viewerHeight;
        
        // Calculate the height of the new last page
        // Each page is PAGE_HEIGHT_PX + pageGap, plus final pageGap
        const pageHeight = {{PAGE_HEIGHT_PX}} || 800; // Fallback to 800px if not available
        const lastPageHeight = (newPageTotal * (pageHeight + CONFIG.pageGap)) + CONFIG.pageGap;
        
        if (scrollBottom > lastPageHeight) {
          // We're viewing beyond the new page count - snap to bottom
          dx(`Snapping to bottom: was viewing beyond page ${newPageTotal}, lastPageHeight=${lastPageHeight}`);
          viewer.scrollTop = Math.max(0, lastPageHeight - viewerHeight);
        }
      }
      
      // Clear all pages and re-render with new total
      clearAllRenderedPages();
    }

    // Set up message handling
    window.addEventListener('message', (event) => {
      handleExtensionMessage(event.data);
    });

    // Initialize when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initScrollableViewer);
    } else {
      initScrollableViewer();
    }

    // Export for external access
    window.UIScrollView = {
      init: initScrollableViewer,
      handlePageRenderResponse,
      handlePageRenderError,
      updatePerformanceInfo
    };

  })();
