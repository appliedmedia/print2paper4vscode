pdf_html: |
  <!DOCTYPE html>
  <html>
  <head>
    <title>{{TITLE}}</title>
    <style>
      {{PDF_CSS}}
    </style>
    <script>
      {{PDFJS_LIBRARY}}
    </script>
  </head>
  <body>
    {{TOOLBAR}}
    <div class="pdf-container">
      <div id="loading" style="display: block; text-align: center; padding: 50px;">
        Loading PDF...
      </div>
      <div id="error" style="display: none; text-align: center; padding: 50px; color: red;">
        Error loading PDF
      </div>
      <canvas id="pdf-canvas" style="display: none;"></canvas>
    </div>
    <script>
      {{PDF_JS}}
      
      // Initialize PDF viewer with embedded data
      initPdfViewer('{{PDF_DATA_URL}}');
    </script>
  </body>
  </html>

pdf_css: |
  {{BASE_CSS}}

  .pdf-container {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: auto;
    background: white;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
  }

  #pdf-canvas {
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    border: 1px solid #ddd;
  }

pdf_js: |
  // PDF Viewer JavaScript
  let pdfDoc = null;
  let pageNum = 1;
  let pageRendering = false;
  let pageNumPending = null;
  const scale = 1.0; // Reduced from 1.5 for better fit
  const canvas = document.getElementById('pdf-canvas');
  const ctx = canvas.getContext('2d');

  function renderPage(num) {
    pageRendering = true;
    pdfDoc.getPage(num).then(function (page) {
      const viewport = page.getViewport({ scale: scale });
      canvas.height = viewport.height;
      canvas.width = viewport.width;

      const renderContext = {
        canvasContext: ctx,
        viewport: viewport
      };
      const renderTask = page.render(renderContext);

      renderTask.promise.then(function () {
        pageRendering = false;
        if (pageNumPending !== null) {
          renderPage(pageNumPending);
          pageNumPending = null;
        }
      });
    });
  }

  function queueRenderPage(num) {
    if (pageRendering) {
      pageNumPending = num;
    } else {
      renderPage(num);
    }
  }

  function onPrevPage() {
    if (pageNum <= 1) {
      return;
    }
    pageNum--;
    queueRenderPage(pageNum);
  }

  function onNextPage() {
    if (pageNum >= pdfDoc.numPages) {
      return;
    }
    pageNum++;
    queueRenderPage(pageNum);
  }

  function onDocumentLoadSuccess(pdf) {
    pdfDoc = pdf;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('pdf-canvas').style.display = 'block';
    renderPage(pageNum);
  }

  function onDocumentLoadError(error) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = 'Error loading PDF: ' + error.message;
  }

  // One-time setup + optional initial load
  function initPdfViewer(pdfDataUrl) {
    // Setup phase (always runs)
    if (typeof pdfjsLib === 'undefined') {
      onDocumentLoadError(new Error('PDF.js library not loaded'));
      return;
    }
    
    // Set worker source once
    pdfjsLib.GlobalWorkerOptions.workerSrc = '{{as_uri:src/lib/pdf.worker.min.js}}';
    
    // If PDF data provided, load it
    if (pdfDataUrl) {
      updatePdfData(pdfDataUrl);
    }
  }

  // Pure PDF loading/rendering function
  function updatePdfData(pdfDataUrl) {
    if (!pdfDataUrl) {
      onDocumentLoadError(new Error('No PDF data URL provided'));
      return;
    }
    
    // Load the data URL directly
    const loadingTask = pdfjsLib.getDocument({
      url: pdfDataUrl,
      disableAutoFetch: true,
      disableStream: true,
      disableRange: true,
      cMapUrl: null,
      standardFontDataUrl: null,
      useSystemFonts: false,
      disableFontFace: true
    });
    
    loadingTask.promise.then(onDocumentLoadSuccess, onDocumentLoadError);
  }

  // Make functions available globally
  window.initPdfViewer = initPdfViewer;
  window.updatePdfData = updatePdfData;

  // Listen for PDF update messages
  window.addEventListener('message', (event) => {
    if (event.data.type === 'updatePdf') {
      updatePdfData(event.data.pdfDataUrl);
    }
  });
