pdf_html: |
  <!DOCTYPE html>
  <html>
  <head>
    <title>{{TITLE}}</title>
    <style>
      {{PDF_CSS}}
    </style>
  </head>
  <body>
    {{TOOLBAR}}
    <div class="pdf-container">
      <iframe 
        id="pdf-viewer" 
        src="{{PDF_DATA_URL}}" 
        type="application/pdf"
        style="width: 100%; height: 100vh; border: none;">
      </iframe>
    </div>
  </body>
  </html>

pdf_css: |
  {{BASE_CSS}}

  .pdf-container {
    width: 100%;
    height: 100vh;
    background: white;
  }

  #pdf-viewer {
    width: 100%;
    height: 100%;
    border: none;
  }

pdf_js: |
  // Simple PDF viewer - no JavaScript needed for iframe display
  // The iframe handles PDF rendering natively
