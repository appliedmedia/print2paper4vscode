pdf_viewer_html: |
  <!DOCTYPE html>
  <html>
  <head>
    <title>{{TITLE}}</title>
    <style>
      {{PDF_CSS}}
    </style>
  </head>
  <body>
    <div class="pdf-container">
      <div id="loading" class="loading">Loading PDF...</div>
      <canvas id="pdf-canvas" style="display: none;"></canvas>
      <div id="error" class="error" style="display: none;"></div>
    </div>
    <script>
      {{PDFJS_LIBRARY}}
      {{PDF_VIEWER}}
      // Initialize PDF viewer with the data URL
      initPdfViewer('{{PDF_DATA_URL}}');
    </script>
  </body>
  </html>

pdf_css: |
  {{BASE_CSS}}

  .pdf-container {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: auto;
    background: white;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
  }

  #pdf-canvas {
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    border: 1px solid #ddd;
  }

pdf_viewer: |
  // PDF Viewer TypeScript
  // Browser environment globals
  declare const pdfjsLib: any;
  declare const document: Document;
  declare const window: Window;

  // PDF document type
  interface PDFDocument {
    numPages: number;
    getPage(pageNumber: number): Promise<PDFPage>;
  }

  interface PDFPage {
    getViewport(options: { scale: number }): PDFViewport;
    render(context: PDFRenderContext): PDFRenderTask;
  }

  interface PDFViewport {
    height: number;
    width: number;
  }

  interface PDFRenderContext {
    canvasContext: CanvasRenderingContext2D;
    viewport: PDFViewport;
  }

  interface PDFRenderTask {
    promise: Promise<void>;
  }

  let pdfDoc: PDFDocument | null = null;
  let pageNum: number = 1;
  let pageRendering: boolean = false;
  let pageNumPending: number | null = null;
  const scale: number = 1.5;
  const canvas = document.getElementById('pdf-canvas') as HTMLCanvasElement;
  const ctx = canvas.getContext('2d') as CanvasRenderingContext2D;

  function renderPage(num: number): void {
    pageRendering = true;
    pdfDoc!.getPage(num).then(function (page) {
      const viewport = page.getViewport({ scale: scale });
      canvas.height = viewport.height;
      canvas.width = viewport.width;

      const renderContext = {
        canvasContext: ctx,
        viewport: viewport,
      };
      const renderTask = page.render(renderContext);

      renderTask.promise.then(function () {
        pageRendering = false;
        if (pageNumPending !== null) {
          renderPage(pageNumPending);
          pageNumPending = null;
        }
      });
    });
  }

  function queueRenderPage(num: number): void {
    if (pageRendering) {
      pageNumPending = num;
    } else {
      renderPage(num);
    }
  }

  // Navigation functions (currently unused but available for future features)
  // eslint-disable-next-line @typescript-eslint/no-unused-vars
  function onPrevPage(): void {
    if (pageNum <= 1) {
      return;
    }
    pageNum--;
    queueRenderPage(pageNum);
  }

  // eslint-disable-next-line @typescript-eslint/no-unused-vars
  function onNextPage(): void {
    if (pageNum >= pdfDoc!.numPages) {
      return;
    }
    pageNum++;
    queueRenderPage(pageNum);
  }

  function onDocumentLoadSuccess(pdf: PDFDocument): void {
    pdfDoc = pdf;
    document.getElementById('loading')!.style.display = 'none';
    document.getElementById('pdf-canvas')!.style.display = 'block';
    renderPage(pageNum);
  }

  function onDocumentLoadError(error: Error): void {
    document.getElementById('loading')!.style.display = 'none';
    document.getElementById('error')!.style.display = 'block';
    (document.getElementById('error') as HTMLElement).textContent =
      'Error loading PDF: ' + error.message;
  }

  // Initialize PDF viewer when page loads
  function initPdfViewer(pdfDataUrl: string): void {
    pdfjsLib.getDocument(pdfDataUrl).promise.then(onDocumentLoadSuccess, onDocumentLoadError);
  }

  // Make initPdfViewer available globally
  window.initPdfViewer = initPdfViewer;
