# UI.yaml - Base UI templates and toolbar
# ⚠️ Keep comments in this file minimal because it has to get copied at runtime. ⚠️

base_css: |
  body {
    margin: 0;
    padding: 0;
  }

toolbar_css: |
  #{{ns_}}toolbar {
    position: fixed;
    top: 12px;
    left: {{toolbar_pos}}px;
    z-index: 9999;
    display: inline-flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0;
    background: transparent;
    font: 12px -apple-system, Segoe UI, Arial, sans-serif;
  }
  .{{ns_}}toolbarMenubar {
    position: relative;
    display: inline-flex;
    gap: 4px;
    background: rgba(210,210,210,.95);
    border: 1px solid #bbb;
    border-radius: 10px;
    padding: 14px 3px 3px 3px; /* top padding reserves space for grip */
    box-shadow: 0 4px 12px rgba(0,0,0,.15);
  }
  .{{ns_}}toolbarGrip {
    position: absolute;
    top: 2px;
    left: 0;
    right: 0;
    height: 12px;
    border-top-left-radius: 10px;
    border-top-right-radius: 10px;
    cursor: ew-resize;
    z-index: 10;
    background: radial-gradient(circle at 2px 3px, rgba(120,120,120,.6) 1px, transparent 1px) 0 0 / 4px 6px, radial-gradient(circle at 0px 3px, rgba(120,120,120,.6) 1px, transparent 1px) 2px 0 / 4px 6px;
  }
  #{{ns_}}toolbar.dragging { user-select: none; }
  .{{ns_}}menuBtn {
    border: 1px solid #d0d0d0;
    background: #f7f7f7;
    color: #333;
    border-radius: 6px;
    cursor: pointer;
    width: 32px;
    height: 32px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    font-size: 18px;
    padding: 0;
  }

toolbar_js: |
  window.vscode = acquireVsCodeApi();
  const toolbar = document.getElementById('{{ns_}}toolbar');
  const drag = document.getElementById('{{ns_}}toolbarGrip');
  const toolbar_pos_min_px = {{toolbar_pos_min_px}};

  // Note: handleFlyoutHover() removed - dead code
  // Old .{{ns_}}flyout class selector is never generated
  // Flyouts now use .{{ns_}}menu.isFlyout instead

  let isDragging = false;
  let dragStartX = 0;
  let dragStartLeft = 0;

  window.addEventListener('resize', ()=>{
    const rawLeft = getComputedStyle(toolbar).left;
    let left = parseFloat(rawLeft);
    if (Number.isNaN(left)) left = toolbar_pos_min_px;
    const maxLeft = Math.max(toolbar_pos_min_px, document.documentElement.clientWidth - toolbar.offsetWidth - toolbar_pos_min_px);
    toolbar.style.left = Math.min(left, maxLeft) + 'px';
  });

  function postDragEnd() {
    isDragging = false;
    document.body.style.cursor = '';
    const rawLeft = getComputedStyle(toolbar).left;
    const left = Number.isNaN(parseFloat(rawLeft)) ? toolbar_pos_min_px : parseFloat(rawLeft);
    vscode.postMessage({
      type: 'dragEnd',
      left
    });
  }

  function endIfDragging(/* e */) {
    if (isDragging) {
      postDragEnd();
    }
  }

  drag.addEventListener('mousedown', (e)=>{
    e.preventDefault();
    isDragging = true;
    dragStartX = e.clientX;
    const rawLeft = getComputedStyle(toolbar).left;
    dragStartLeft = Number.isNaN(parseFloat(rawLeft)) ? toolbar_pos_min_px : parseFloat(rawLeft);
    document.body.style.cursor = 'grabbing';
  });

  document.addEventListener('mousemove', (e)=>{
    if (isDragging) {
      if (e.buttons > 0) {
        e.preventDefault();
        const dx = e.clientX - dragStartX;
        const maxLeft = Math.max(toolbar_pos_min_px, document.documentElement.clientWidth - toolbar.offsetWidth - toolbar_pos_min_px);
        const newLeft = Math.min(Math.max(toolbar_pos_min_px, dragStartLeft + dx), maxLeft);
        toolbar.style.left = newLeft + 'px';
      } else {
        postDragEnd();
      }
    }
  });

  ['mouseup', 'mouseleave'].forEach(eventType => {
    document.addEventListener(eventType, endIfDragging);
  });

toolbar_html: |
  <style>
    {{toolbarCss}}
    {{baseCss}}
  </style>
  <div id="{{ns_}}toolbar" role="toolbar" aria-label="Print2Paper toolbar">
    <div class="{{ns_}}toolbarGrip" id="{{ns_}}toolbarGrip" title="Click and hold to drag left and right" aria-label="Drag toolbar" tabindex="0"></div>
    <div class="{{ns_}}toolbarMenubar" role="menubar">
      {{menuHtml}}
    </div>
  </div>
  <script>
    {{toolbarJs}}
    {{additionalJs}}
  </script>
