# UI templates for the Print2Paper extension

base_css: |
  /* Base styles shared across all webviews */
  body {
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f5f5;
  }

  .loading {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 200px;
    color: #666;
    font-size: 16px;
  }

  .error {
    color: #d73a49;
    text-align: center;
    padding: 20px;
  }

  /* Common container styles */
  .container {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: auto;
    background: white;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
  }

toolbar_css: |
  #p2p4vsc-toolbar {
    position: fixed;
    top: 12px;
    left: {{TOOLBAR_LEFT}}px;
    z-index: 9999;
    display: inline-flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0;
    background: transparent;
    font: 12px -apple-system, Segoe UI, Arial, sans-serif;
  }
  .p2p4vsc-toolbar-menubar {
    position: relative;
    display: inline-flex;
    gap: 4px;
    background: rgba(210,210,210,.95);
    border: 1px solid #bbb;
    border-radius: 10px;
    padding: 14px 3px 3px 3px; /* top padding reserves space for grip */
    box-shadow: 0 4px 12px rgba(0,0,0,.15);
  }
  .p2p4vsc-toolbar-grip {
    position: absolute;
    top: 2px;
    left: 0;
    right: 0;
    height: 12px;
    border-top-left-radius: 10px;
    border-top-right-radius: 10px;
    cursor: ew-resize;
    z-index: 10;
    background:
      radial-gradient(circle at 3px 3px, rgba(120,120,120,.6) 1px, transparent 1px) 0 0 / 6px 6px,
      radial-gradient(circle at 0px 3px, rgba(120,120,120,.6) 1px, transparent 1px) 3px 0 / 6px 6px;
  }
  #p2p4vsc-toolbar.dragging { user-select: none; }
  .p2p4vsc-menu-btn {
    border: 1px solid #d0d0d0;
    background: #f7f7f7;
    color: #333;
    border-radius: 6px;
    cursor: pointer;
    width: 32px;
    height: 32px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    font-size: 18px;
    padding: 0;
  }
  .p2p4vsc-menu-btn:hover { background: #e9e9e9; }
  .p2p4vsc-menu {
    position: relative;
    display: inline-block;
  }
  .p2p4vsc-menu-items {
    position: absolute;
    background: #222;
    color: #fff;
    border-radius: 6px;
    box-shadow: 0 6px 18px rgba(0,0,0,.3);
    padding: 4px 0;
    display: none;
    min-width: 220px;
    top: 100%;
    left: 0;
    z-index: 1000;
  }
  .p2p4vsc-menu-item {
    padding: 3px 10px;
    cursor: pointer;
    white-space: nowrap;
  }
  .p2p4vsc-menu-item:hover, .p2p4vsc-menu-item.active {
    background: #444;
  }
  /* Item prefix (checkmark) and suffix (edit icon) */
  /* Gutter only for active menus (menus with a selected item) */
  .p2p4vsc-menu.active .p2p4vsc-menu-item::before {
    display: inline-block;
    width: 1em;
    margin-right: 6px;
    content: "";
  }

  /* Active item styling - checkmark in gutter */
  .p2p4vsc-menu.active .p2p4vsc-menu-item.active::before {
    content: "✓";
  }

  /* Default item styling - edit icon */
  .p2p4vsc-menu-item.default-item::after {
    content: "📝";
    display: inline-block;
    margin-left: 6px;
    opacity: 0.7;
  }

  /* Flyout arrow styling */
  .p2p4vsc-menu-item.flyout::after {
    content: "▶";
    font-size: 10px;
    opacity: 0.7;
    display: inline-block;
    margin-left: 6px;
  }


  /* Flyout submenu styling */
  .p2p4vsc-flyout {
    position: absolute;
    left: 100%;
    top: 0;
    background: #333;
    color: #fff;
    border-radius: 6px;
    box-shadow: 0 6px 18px rgba(0,0,0,.3);
    padding: 4px 0;
    display: none;
    min-width: 180px;
    z-index: 1001;
    margin-left: 4px;
  }

  .p2p4vsc-flyout .p2p4vsc-menu-item {
    padding: 3px 10px;
    cursor: pointer;
    white-space: nowrap;
  }

  .p2p4vsc-flyout .p2p4vsc-menu-item:hover {
    background: #555;
  }

  .p2p4vsc-group { position: relative; }

toolbar_js: |
  window.vscode = acquireVsCodeApi();
  const toolbar = document.getElementById('p2p4vsc-toolbar');
  const drag = document.getElementById('p2p4vsc-toolbar-grip');

  // Generic flyout hover handler
  function handleFlyoutHover() {
    document.addEventListener('mouseenter', (e) => {
      const menuItem = e.target.closest('.p2p4vsc-menu-item');
      if (menuItem) {
        const flyout = menuItem.querySelector('.p2p4vsc-flyout');
        if (flyout) {
          // Close all other flyouts
          document.querySelectorAll('.p2p4vsc-flyout').forEach(f => {
            if (f !== flyout) f.style.display = 'none';
          });
          // Show this flyout
          flyout.style.display = 'block';
        }
      }
    });
    
    document.addEventListener('mouseleave', (e) => {
      const menuItem = e.target.closest('.p2p4vsc-menu-item');
      if (menuItem) {
        const flyout = menuItem.querySelector('.p2p4vsc-flyout');
        if (flyout) {
          // Hide flyout after a short delay to allow moving to it
          setTimeout(() => {
            if (!flyout.matches(':hover') && !menuItem.matches(':hover')) {
              flyout.style.display = 'none';
            }
          }, 150);
        }
      }
    });
  }

  // Initialize flyout handling
  handleFlyoutHover();

  // Drag state tracking
  let isDragging = false;
  let dragStartX = 0;
  let dragStartLeft = 0;

  window.addEventListener('resize', ()=>{
    const left = parseFloat(getComputedStyle(toolbar).left || '8');
    const maxLeft = Math.max(8, window.innerWidth - toolbar.offsetWidth - 8);
    toolbar.style.left = Math.min(left, maxLeft) + 'px';
  });

  // Helper function to end dragging and notify extension
  function postDragEnd() {
    isDragging = false;
    document.body.style.cursor = '';
    
    // Save position to extension's global state
    const left = parseFloat(getComputedStyle(toolbar).left || '8');
    
    // Notify extension that drag ended
    vscode.postMessage({
      type: 'dragEnd',
      left
    });
  }

  // Helper function to end dragging if currently dragging
  function endIfDragging(/* e */) {
    if (isDragging) {
      postDragEnd();
    }
  }

  // Drag event handlers
  drag.addEventListener('mousedown', (e)=>{
    e.preventDefault();
    isDragging = true;
    dragStartX = e.clientX;
    dragStartLeft = parseFloat(getComputedStyle(toolbar).left || '8');
    document.body.style.cursor = 'grabbing';
  });

  document.addEventListener('mousemove', (e)=>{
    if (isDragging) {
      if (e.buttons > 0) { // Mouse button is still down - continue dragging
        e.preventDefault();
        const dx = e.clientX - dragStartX;
        const maxLeft = Math.max(8, window.innerWidth - toolbar.offsetWidth - 8);
        const newLeft = Math.min(Math.max(8, dragStartLeft + dx), maxLeft);
        toolbar.style.left = newLeft + 'px';
      } else { // Mouse button released - stop dragging
        postDragEnd();
      }
    }
  });

  ['mouseup', 'mouseleave'].forEach(eventType => {
    document.addEventListener(eventType, endIfDragging);
  });

toolbar_html: |
  <style>
    {{TOOLBAR_CSS}}
  </style>
  <div id="p2p4vsc-toolbar">
    <div class="p2p4vsc-toolbar-grip" id="p2p4vsc-toolbar-grip" title="Click and hold to drag left and right"></div>
    <div class="p2p4vsc-toolbar-menubar">
      {{UIMENU_HTML}}
    </div>
  </div>
  <script>
    {{TOOLBAR_JS}}
    {{UIMENU_JS}}
  </script>
