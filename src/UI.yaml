# UI templates for the Print2Paper extension

base_css: |
  /* Base styles shared across all webviews */
  body {
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f5f5;
  }

  .loading {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 200px;
    color: #666;
    font-size: 16px;
  }

  .error {
    color: #d73a49;
    text-align: center;
    padding: 20px;
  }

  /* Common container styles */
  .container {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: auto;
    background: white;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
  }

toolbar_css: |
  #p2p4vsc-toolbar {
    position: fixed;
    top: 12px;
    left: {{TOOLBAR_POS}}px;
    z-index: 9999;
    display: inline-flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0;
    background: transparent;
    font: 12px -apple-system, Segoe UI, Arial, sans-serif;
  }
  .p2p4vsc-toolbar-menubar {
    position: relative;
    display: inline-flex;
    gap: 4px;
    background: rgba(210,210,210,.95);
    border: 1px solid #bbb;
    border-radius: 10px;
    padding: 14px 3px 3px 3px; /* top padding reserves space for grip */
    box-shadow: 0 4px 12px rgba(0,0,0,.15);
  }
  .p2p4vsc-toolbar-grip {
    position: absolute;
    top: 2px;
    left: 0;
    right: 0;
    height: 12px;
    border-top-left-radius: 10px;
    border-top-right-radius: 10px;
    cursor: ew-resize;
    z-index: 10;
    background:
      radial-gradient(circle at 3px 3px, rgba(120,120,120,.6) 1px, transparent 1px) 0 0 / 6px 6px,
      radial-gradient(circle at 0px 3px, rgba(120,120,120,.6) 1px, transparent 1px) 3px 0 / 6px 6px;
  }
  #p2p4vsc-toolbar.dragging { user-select: none; }
  .p2p4vsc-menu-btn {
    border: 1px solid #d0d0d0;
    background: #f7f7f7;
    color: #333;
    border-radius: 6px;
    cursor: pointer;
    width: 32px;
    height: 32px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    font-size: 18px;
    padding: 0;
  }

toolbar_js: |
  window.vscode = acquireVsCodeApi();
  const toolbar = document.getElementById('p2p4vsc-toolbar');
  const drag = document.getElementById('p2p4vsc-toolbar-grip');

  // Generic flyout hover handler
  function handleFlyoutHover() {
    document.addEventListener('mouseenter', (e) => {
      if (!e || !e.target || !e.target.closest) return;
      const menuItem = e.target.closest('.p2p4vsc-menu-item');
      if (menuItem) {
        const flyout = menuItem.querySelector('.p2p4vsc-flyout');
        if (flyout) {
          // Close all other flyouts
          document.querySelectorAll('.p2p4vsc-flyout').forEach(f => {
            if (f !== flyout) f.style.display = 'none';
          });
          // Show this flyout
          flyout.style.display = 'block';
        }
      }
    });
    
    document.addEventListener('mouseleave', (e) => {
      if (!e || !e.target || !e.target.closest) return;
      const menuItem = e.target.closest('.p2p4vsc-menu-item');
      if (menuItem) {
        const flyout = menuItem.querySelector('.p2p4vsc-flyout');
        if (flyout) {
          // Hide flyout after a short delay to allow moving to it
          setTimeout(() => {
            if (!flyout.matches(':hover') && !menuItem.matches(':hover')) {
              flyout.style.display = 'none';
            }
          }, 150);
        }
      }
    });
  }

  // Initialize flyout handling
  handleFlyoutHover();

  // Drag state tracking
  let isDragging = false;
  let dragStartX = 0;
  let dragStartLeft = 0;

  window.addEventListener('resize', ()=>{
    const rawLeft = getComputedStyle(toolbar).left;
    let left = parseFloat(rawLeft);
    if (Number.isNaN(left)) left = 8;
    const maxLeft = Math.max(8, window.innerWidth - toolbar.offsetWidth - 8);
    toolbar.style.left = Math.min(left, maxLeft) + 'px';
  });

  // Helper function to end dragging and notify extension
  function postDragEnd() {
    isDragging = false;
    document.body.style.cursor = '';
    
    // Save position to extension's global state
    const rawLeft = getComputedStyle(toolbar).left;
    const left = Number.isNaN(parseFloat(rawLeft)) ? 8 : parseFloat(rawLeft);
    
    // Notify extension that drag ended
    vscode.postMessage({
      type: 'dragEnd',
      left
    });
  }

  // Helper function to end dragging if currently dragging
  function endIfDragging(/* e */) {
    if (isDragging) {
      postDragEnd();
    }
  }

  // Drag event handlers
  drag.addEventListener('mousedown', (e)=>{
    e.preventDefault();
    isDragging = true;
    dragStartX = e.clientX;
    const rawLeft = getComputedStyle(toolbar).left;
    dragStartLeft = Number.isNaN(parseFloat(rawLeft)) ? 8 : parseFloat(rawLeft);
    document.body.style.cursor = 'grabbing';
  });

  document.addEventListener('mousemove', (e)=>{
    if (isDragging) {
      if (e.buttons > 0) { // Mouse button is still down - continue dragging
        e.preventDefault();
        const dx = e.clientX - dragStartX;
        const maxLeft = Math.max(8, window.innerWidth - toolbar.offsetWidth - 8);
        const newLeft = Math.min(Math.max(8, dragStartLeft + dx), maxLeft);
        toolbar.style.left = newLeft + 'px';
      } else { // Mouse button released - stop dragging
        postDragEnd();
      }
    }
  });

  ['mouseup', 'mouseleave'].forEach(eventType => {
    document.addEventListener(eventType, endIfDragging);
  });

toolbar_html: |
  <style>
    {{TOOLBAR_CSS}}
    {{CSS}}
  </style>
  <div id="p2p4vsc-toolbar" role="toolbar" aria-label="Print2Paper toolbar">
    <div class="p2p4vsc-toolbar-grip" id="p2p4vsc-toolbar-grip" title="Click and hold to drag left and right" aria-label="Drag toolbar" tabindex="0"></div>
    <div class="p2p4vsc-toolbar-menubar" role="menubar">
      {{HTML}}
    </div>
  </div>
  <script>
    {{TOOLBAR_JS}}
    {{JS}}
  </script>

# ============================================================================
# Scrollable Viewer Templates
# ============================================================================

scroll_css: |
  /* Scrollable viewer styles */
  .scrollable-viewer {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: auto;
    background: #f5f5f5;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  .scrollable-content {
    position: relative;
    width: 100%;
    min-height: 100%;
    padding: 20px;
  }

  .page-container {
    position: relative;
    margin: 0 auto 20px auto;
    background: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    border-radius: 4px;
    overflow: hidden;
  }

  .page-canvas {
    display: block;
    width: 100%;
    height: auto;
    max-width: 100%;
  }

  .page-placeholder {
    position: relative;
    background: #f8f9fa;
    border: 2px dashed #dee2e6;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #6c757d;
    font-size: 14px;
    min-height: 200px;
    margin: 0 auto 20px auto;
  }

  .page-placeholder.loading {
    background: #e3f2fd;
    border-color: #2196f3;
    color: #1976d2;
  }

  .page-placeholder.error {
    background: #ffebee;
    border-color: #f44336;
    color: #d32f2f;
  }

  .page-label {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 4px 8px;
    border-radius: 3px;
    font-size: 12px;
    font-weight: 500;
  }

  .loading-text {
    text-align: center;
    padding: 20px;
  }

  .error-text {
    text-align: center;
    padding: 20px;
    color: #d32f2f;
  }

  /* Performance indicators */
  .performance-info {
    position: fixed;
    top: 10px;
    right: 10px;
    background: rgba(0,0,0,0.8);
    color: white;
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 11px;
    font-family: monospace;
    z-index: 1000;
    opacity: 0.7;
  }

  .performance-info.hidden {
    display: none;
  }

  /* Canvas pool management */
  .canvas-pool {
    position: absolute;
    top: -9999px;
    left: -9999px;
    visibility: hidden;
  }

  /* Scroll performance optimizations */
  .scrollable-viewer.smooth-scroll {
    scroll-behavior: smooth;
  }

  .scrollable-viewer.performance-mode {
    will-change: scroll-position;
  }

  /* Memory pressure indicators */
  .memory-warning {
    position: fixed;
    top: 50px;
    right: 10px;
    background: #ff9800;
    color: white;
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 12px;
    z-index: 1000;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.5; }
    100% { opacity: 1; }
  }

scroll_html: |
  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <style>
      {{BASE_CSS}}
      {{SCROLL_CSS}}
    </style>
  </head>
  <body>
    <div class="scrollable-viewer" id="scrollable-viewer">
      <div class="scrollable-content" id="scrollable-content">
        <!-- Pages will be dynamically inserted here -->
      </div>
      
      <!-- Canvas pool for performance -->
      <div class="canvas-pool" id="canvas-pool">
        <!-- Canvas elements will be managed here -->
      </div>
    </div>

    <!-- Performance indicators -->
    <div class="performance-info" id="performance-info">
      <div>Pages: <span id="page-count">0</span>/<span id="total-pages">{{TOTAL_PAGES}}</span></div>
      <div>Canvases: <span id="canvas-count">0</span>/<span id="max-canvases">{{MAX_CANVASES}}</span></div>
      <div>Memory: <span id="memory-usage">0</span>MB</div>
    </div>

    <!-- Memory warning -->
    <div class="memory-warning hidden" id="memory-warning">
      High memory usage detected
    </div>

    <!-- Toolbar integration -->
    {{TOOLBAR}}

    <script>
      {{SCROLL_JS}}
    </script>
  </body>
  </html>

scroll_js: |
  // Scrollable Viewer Implementation
  (function() {
    'use strict';

    // Configuration from template
    const CONFIG = {
      pageTotal: {{PAGE_TOTAL}},
      maxCanvases: {{MAX_CANVASES}},
      scale: 1.0,
      pageGap: 20,
      scrollDebounceMs: {{SCROLL_DEBOUNCE_MS}},
      performanceMode: '{{PERFORMANCE_MODE}}',
      pageRenderService: null // Will be set by extension
    };

    // Database state management
    const db = {
      // Canvas management
      canvasPool: [],
      assignedCanvases: new Map(), // pageNumber -> canvasId
      availableCanvases: new Set(),
      
      // Page management
      renderedPages: new Map(), // pageNumber -> PageData
      pendingPages: new Set(), // pageNumbers being rendered
      failedPages: new Set(), // pageNumbers that failed to render
      
      // Scroll state
      lastScrollTop: 0,
      scrollDirection: 'down',
      isScrolling: false,
      
      // Performance tracking
      renderStartTime: 0,
      renderCount: 0,
      memoryUsage: 0
    };

    // DOM elements
    const viewer = document.getElementById('scrollable-viewer');
    const content = document.getElementById('scrollable-content');
    const canvasPool = document.getElementById('canvas-pool');
    const performanceInfo = document.getElementById('performance-info');
    const memoryWarning = document.getElementById('memory-warning');

    // Initialize the scrollable viewer
    function initScrollableViewer() {
      console.log('Initializing scrollable viewer with config:', CONFIG);
      
      // Set up canvas pool
      createCanvasPool();
      
      // Create page placeholders
      createPagePlaceholders();
      
      // Set up scroll handling
      setupScrollHandling();
      
      // Set up performance monitoring
      setupPerformanceMonitoring();
      
      // Initial render
      handleScroll();
      
      console.log('Scrollable viewer initialized');
    }

    // Create canvas pool for performance
    function createCanvasPool() {
      for (let i = 0; i < CONFIG.maxCanvases; i++) {
        const canvas = document.createElement('canvas');
        canvas.id = `canvas-${i}`;
        canvas.className = 'page-canvas';
        canvasPool.appendChild(canvas);
        db.canvasPool.push(canvas);
        db.availableCanvases.add(canvas.id);
      }
      console.log(`Created canvas pool with ${CONFIG.maxCanvases} canvases`);
    }

    // Create page placeholders
    function createPagePlaceholders() {
      for (let i = 1; i <= CONFIG.pageTotal; i++) {
        const placeholder = document.createElement('div');
        placeholder.id = `page-${i}`;
        placeholder.className = 'page-placeholder loading';
        placeholder.innerHTML = `
          <div class="page-label">Page ${i}</div>
          <div class="loading-text">Loading page ${i}...</div>
        `;
        content.appendChild(placeholder);
      }
      console.log(`Created ${CONFIG.pageTotal} page placeholders`);
    }

    // Set up scroll handling with debouncing
    function setupScrollHandling() {
      let scrollTimeout;
      
      viewer.addEventListener('scroll', () => {
        if (scrollTimeout) {
          clearTimeout(scrollTimeout);
        }
        
        scrollTimeout = setTimeout(() => {
          handleScroll();
        }, CONFIG.scrollDebounceMs);
      });
    }

    // Handle scroll events
    function handleScroll() {
      const scrollTop = viewer.scrollTop;
      const scrollHeight = viewer.scrollHeight;
      const clientHeight = viewer.clientHeight;
      
      // Update scroll direction
      if (scrollTop > db.lastScrollTop) {
        db.scrollDirection = 'down';
      } else if (scrollTop < db.lastScrollTop) {
        db.scrollDirection = 'up';
      }
      db.lastScrollTop = scrollTop;
      
      // Get visible page range
      const visibleRange = getVisiblePageRange();
      console.log(`Visible pages: ${visibleRange.start}-${visibleRange.end}`);
      
      // Assign canvases to visible pages
      assignCanvasesToPages(visibleRange);
      
      // Update performance info
      updatePerformanceInfo();
    }

    // Get visible page range
    function getVisiblePageRange() {
      const scrollTop = viewer.scrollTop;
      const clientHeight = viewer.clientHeight;
      const pageHeight = 800; // Estimated page height
      const pageGap = CONFIG.pageGap;
      
      const startPage = Math.max(1, Math.floor(scrollTop / (pageHeight + pageGap)) + 1);
      const endPage = Math.min(CONFIG.pageTotal, Math.ceil((scrollTop + clientHeight) / (pageHeight + pageGap)) + 1);
      
      return { start: startPage, end: endPage };
    }

    // Assign canvases to pages
    function assignCanvasesToPages(visibleRange) {
      const { start, end } = visibleRange;
      
      // Free canvases for pages outside visible range
      for (let i = 1; i <= CONFIG.pageTotal; i++) {
        if (i < start || i > end) {
          unassignCanvas(i);
        }
      }
      
      // Assign canvases to visible pages
      for (let i = start; i <= end; i++) {
        if (!db.assignedCanvases.has(i)) {
          assignCanvasToPage(i);
        }
      }
    }

    // Assign canvas to page
    function assignCanvasToPage(pageNumber) {
      if (db.availableCanvases.size === 0) {
        console.warn('No available canvases for page', pageNumber);
        return;
      }
      
      const canvasId = db.availableCanvases.values().next().value;
      const canvas = document.getElementById(canvasId);
      
      if (!canvas) {
        console.error('Canvas not found:', canvasId);
        return;
      }
      
      // Remove from available pool
      db.availableCanvases.delete(canvasId);
      db.assignedCanvases.set(pageNumber, canvasId);
      
      // Move canvas to page placeholder
      const placeholder = document.getElementById(`page-${pageNumber}`);
      if (placeholder) {
        placeholder.innerHTML = '';
        placeholder.className = 'page-container';
        placeholder.appendChild(canvas);
      }
      
      // Request page render
      requestPageRender(pageNumber);
      
      console.log(`Assigned canvas ${canvasId} to page ${pageNumber}`);
    }

    // Unassign canvas from page
    function unassignCanvas(pageNumber) {
      const canvasId = db.assignedCanvases.get(pageNumber);
      if (!canvasId) return;
      
      const canvas = document.getElementById(canvasId);
      if (canvas) {
        // Clear canvas
        const ctx = canvas.getContext('2d');
        if (ctx) {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
        
        // Move back to pool
        canvasPool.appendChild(canvas);
      }
      
      // Update state
      db.assignedCanvases.delete(pageNumber);
      db.availableCanvases.add(canvasId);
      
      // Reset placeholder
      const placeholder = document.getElementById(`page-${pageNumber}`);
      if (placeholder) {
        placeholder.className = 'page-placeholder loading';
        placeholder.innerHTML = `
          <div class="page-label">Page ${pageNumber}</div>
          <div class="loading-text">Loading page ${pageNumber}...</div>
        `;
      }
      
      console.log(`Unassigned canvas ${canvasId} from page ${pageNumber}`);
    }

    // Request page render from extension
    function requestPageRender(pageNumber) {
      if (db.pendingPages.has(pageNumber) || db.renderedPages.has(pageNumber)) {
        return;
      }
      
      db.pendingPages.add(pageNumber);
      
      // Send message to extension
      if (window.vscode) {
        window.vscode.postMessage({
          type: 'requestPageRender',
          pageNumber: pageNumber
        });
      }
      
      console.log(`Requested render for page ${pageNumber}`);
    }

    // Handle page render response
    function handlePageRenderResponse(pageData) {
      const { pageNumber, dataUrl, width, height } = pageData;
      
      // Remove from pending
      db.pendingPages.delete(pageNumber);
      
      // Store rendered page data
      db.renderedPages.set(pageNumber, pageData);
      
      // Render to canvas
      const canvasId = db.assignedCanvases.get(pageNumber);
      if (canvasId) {
        renderPageToCanvas(pageData, canvasId);
      }
      
      console.log(`Rendered page ${pageNumber}`);
    }

    // Handle page render error
    function handlePageRenderError(error, pageNumber) {
      db.pendingPages.delete(pageNumber);
      db.failedPages.add(pageNumber);
      
      // Show error in placeholder
      const placeholder = document.getElementById(`page-${pageNumber}`);
      if (placeholder) {
        placeholder.className = 'page-placeholder error';
        placeholder.innerHTML = `
          <div class="page-label">Page ${pageNumber}</div>
          <div class="error-text">Failed to render page</div>
        `;
      }
      
      console.error(`Page ${pageNumber} render failed:`, error);
    }

    // Render page data to canvas
    function renderPageToCanvas(pageData, canvasId) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;
      
      const { dataUrl, width, height } = pageData;
      
      // Set canvas dimensions
      canvas.width = width;
      canvas.height = height;
      
      // Create image from data URL
      const img = new Image();
      img.onload = () => {
        const ctx = canvas.getContext('2d');
        if (ctx) {
          ctx.drawImage(img, 0, 0, width, height);
        }
      };
      img.src = dataUrl;
    }

    // Set up performance monitoring
    function setupPerformanceMonitoring() {
      setInterval(() => {
        updatePerformanceInfo();
        checkMemoryUsage();
      }, 1000);
    }

    // Update performance info display
    function updatePerformanceInfo() {
      const pageCount = db.assignedCanvases.size;
      const canvasCount = CONFIG.maxCanvases - db.availableCanvases.size;
      const memoryUsage = db.memoryUsage.toFixed(1);
      
      document.getElementById('page-count').textContent = pageCount;
      document.getElementById('canvas-count').textContent = canvasCount;
      document.getElementById('memory-usage').textContent = memoryUsage;
    }

    // Check memory usage
    function checkMemoryUsage() {
      // Rough memory estimation
      const estimatedMemory = (db.renderedPages.size * 2) + (db.assignedCanvases.size * 1);
      db.memoryUsage = estimatedMemory;
      
      // Show warning if memory usage is high
      if (estimatedMemory > CONFIG.maxCanvases * 3) {
        memoryWarning.classList.remove('hidden');
      } else {
        memoryWarning.classList.add('hidden');
      }
    }

    // Message handling from extension
    function handleExtensionMessage(message) {
      switch (message.type) {
        case 'pageRenderResponse':
          handlePageRenderResponse(message.pageData);
          break;
        case 'pageRenderError':
          handlePageRenderError(message.error, message.pageNumber);
          break;
        case 'scrollDiagnostic':
          console.log('Scroll diagnostic:', message.data);
          break;
        case 'clearAllPages':
          clearAllRenderedPages();
          break;
        default:
          console.log('Unknown message type:', message.type);
      }
    }

    // Clear all rendered pages and reset to loading state
    function clearAllRenderedPages() {
      console.log('Clearing all rendered pages');
      
      // Clear all rendered page data
      db.renderedPages.clear();
      db.pendingPages.clear();
      db.failedPages.clear();
      
      // Unassign all canvases
      for (let i = 1; i <= CONFIG.pageTotal; i++) {
        unassignCanvas(i);
      }
      
      // Reset all placeholders to loading state
      for (let i = 1; i <= CONFIG.pageTotal; i++) {
        const placeholder = document.getElementById(`page-${i}`);
        if (placeholder) {
          placeholder.className = 'page-placeholder loading';
          placeholder.innerHTML = `
            <div class="page-label">Page ${i}</div>
            <div class="loading-text">Loading page ${i}...</div>
          `;
        }
      }
      
      // Trigger initial render
      handleScroll();
    }

    // Set up message handling
    window.addEventListener('message', (event) => {
      handleExtensionMessage(event.data);
    });

    // Initialize when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initScrollableViewer);
    } else {
      initScrollableViewer();
    }

    // Export for external access
    window.UIScrollView = {
      init: initScrollableViewer,
      handlePageRenderResponse,
      handlePageRenderError,
      updatePerformanceInfo
    };

  })();
