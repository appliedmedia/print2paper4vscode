<svg xmlns="http://www.w3.org/2000/svg" version="1.1" xmlns:xlink="http://www.w3.org/1999/xlink" width="314" height="314"><svg xmlns="http://www.w3.org/2000/svg" version="1.1" xmlns:xlink="http://www.w3.org/1999/xlink" width="314" height="314"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 314 314">
  <!-- 
    Applied Media Logo - PNG Conversion Compatible Version
    
    NOTE: This SVG uses explicit x-position arrays for text instead of the more
    natural <tspan> elements with letter-spacing. This is intentional because
    PNG conversion works better with this approach.
    
    Problem: ImageMagick's MSVG renderer mishandles <tspan> elements inside 
    rotated text, causing character reordering (e.g., "APPLIED" renders as 
    "ALEDPP"). Even Inkscape can have issues with complex tspan arrangements.
    
    Solution: Use explicit x-position arrays. The SVG spec allows specifying 
    glyph positions as a space-separated list in the x attribute.
    
    Example: x="0 30 60 90" positions the 1st char at 0, 2nd at 30, etc.
    
    This approach is compatible with browsers, Inkscape, and ImageMagick MSVG.
  -->
  
  <!-- Shield interior white fill (drawn first as background) -->
  <path style="fill:white;stroke:none" d="M55.94,9.30 L299.23,9.17 L299.23,9.17 v260.16 c-46.12,-1.03 -83.52,-10.01 -113.85,-24.05 c-1.28,-2.45 -44.83,-15.21 -129.44,-235.48 L55.94,9.30 Z"></path>
  
  <!-- Shield outline -->
  <g>
    <!-- Right edge and bottom curve - BLACK FILL -->
    <path style="fill:black;stroke:#000;stroke-width:5px;stroke-miterlimit:10" d="M299.23,9.17v260.16c-46.12-1.03-83.52-10.01-113.85-24.05-1.28-2.45,113.85-39.64,113.85-236.11Z"></path>
    <!-- Top line - no fill, just stroke (drawn before left arc so arc overlaps) -->
    <path style="fill:none;stroke:#000;stroke-width:5px;stroke-linecap:square;stroke-miterlimit:10" d="M55.94,11.67 L299.23,11.67"></path>
    <!-- Left edge curve - WHITE fill (drawn last so it overlaps the top line junction) -->
    <path style="fill:white;stroke:#000;stroke-width:5px;stroke-miterlimit:10" d="M55.94,9.30c0,20 7.7,177.98 129.44,235.98"></path>
  </g>
  
  <!-- A symbol triangle -->
  <polygon style="fill:white;stroke:#000;stroke-width:5px;stroke-miterlimit:10" points="141.23 40.73 103.1 115.73 179.36 115.73 141.23 40.73"></polygon>
  
  <!-- M symbol -->
  <polygon style="fill:white;stroke:#000;stroke-width:5px;stroke-miterlimit:10" points="189.87 115.73 189.87 44.35 225.32 84.23 258.96 43.58 258.96 115.73 189.87 115.73"></polygon>
  
  <!-- Small triangle inside A (top layer) -->
  <polygon style="stroke:#fff;stroke-miterlimit:10" points="141.23 105.02 132.25 122.7 150.22 122.7 141.23 105.02"></polygon>
  
  <!-- Small square inside M (top layer) -->
  <rect style="stroke:#fff;stroke-miterlimit:10" x="216.88" y="107.63" width="15.07" height="15.07"></rect>
  
  <!-- MEDIA text (horizontal at bottom) - stroke adds boldness -->
  <!-- Using x-arrays for explicit character positioning to avoid MSVG tspan bugs -->
  <text style="font-size:92px;fill:#e53f3f;stroke:#e53f3f;stroke-width:1.5px;font-family:'EBGaramond12-Bold', 'EB Garamond 12 Bold', 'EB Garamond Bold', 'EB Garamond 12', 'EB Garamond', serif;font-weight:700" x="65" y="305">M</text>
  <!-- EDIA using x-array for character positions -->
  <text style="font-size:64px;fill:#e53f3f;stroke:#e53f3f;stroke-width:1px;font-family:'EBGaramond12-Bold', 'EB Garamond 12 Bold', 'EB Garamond Bold', 'EB Garamond 12', 'EB Garamond', serif;font-weight:700" x="151 191 233 258" y="305">EDIA</text>
  <text style="font-size:14px;fill:#e53f3f;font-family:'EBGaramond12-Bold', 'EB Garamond 12 Bold', 'EB Garamond Bold', 'EB Garamond 12', 'EB Garamond', serif;font-weight:700" x="286" y="262">®</text>
  
  <!-- 
    APPLIED text (vertical along left edge)
    
    Using translate+rotate with x-position array for each glyph.
    This avoids the MSVG tspan bug while maintaining correct character order.
    
    Character x-positions (after rotation, these control vertical spacing):
    - A (96px font): separate element at origin
    - P P L I E D (64px font): x="0 35 70 112 139 181" with adjusted kerning
  -->
  
  <!-- Large A - separate because of different font size (96px = 92 + 4) -->
  <text style="font-size:96px;fill:#e53f3f;stroke:#e53f3f;stroke-width:1.5px;font-family:'EBGaramond12-Bold', 'EB Garamond 12 Bold', 'EB Garamond Bold', 'EB Garamond 12', 'EB Garamond', serif;font-weight:700" transform="translate(13,10) rotate(90)">A</text>
  
  <!-- PPLIED - using x-array for character positions with looser kerning -->
  <text style="font-size:64px;fill:#e53f3f;stroke:#e53f3f;stroke-width:1px;font-family:'EBGaramond12-Bold', 'EB Garamond 12 Bold', 'EB Garamond Bold', 'EB Garamond 12', 'EB Garamond', serif;font-weight:700" transform="translate(13,81) rotate(90)" x="0 35 70 112 139 181">PPLIED</text>
</svg></svg><style>@media (prefers-color-scheme: light) { :root { filter: none; } }
@media (prefers-color-scheme: dark) { :root { filter: none; } }
</style></svg>